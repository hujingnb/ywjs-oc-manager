# 本地调试环境 Compose：一次性启动 manager、runtime-agent、new-api、Ollama 及其依赖。
# 生产部署请使用 deploy/<service>/docker-compose.yml，本文件只服务开发联调。

# 所有本地调试容器都注入 host.docker.internal，方便从容器访问宿主机上的代理、
# registry、调试端口或仅监听 127.0.0.1 的开发服务。
x-host-gateway: &host-gateway
  - "host.docker.internal:host-gateway"

services:
  # manager 本地 PostgreSQL，端口映射用于本机数据库工具调试。
  manager-postgres:
    image: postgres:17-alpine
    container_name: manager-postgres
    extra_hosts: *host-gateway
    environment:
      POSTGRES_USER: ocm
      POSTGRES_PASSWORD: ocm
      POSTGRES_DB: ocm
      TZ: Asia/Shanghai
    ports:
      - "${MANAGER_POSTGRES_PORT:-15432}:5432"
    volumes:
      - ./.local/data/manager-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocm -d ocm"]
      interval: 5s
      timeout: 3s
      retries: 20

  # manager 本地 Redis，使用固定开发密码，数据写入 ./.local。
  manager-redis:
    image: redis:7
    container_name: manager-redis
    extra_hosts: *host-gateway
    command: ["redis-server", "--requirepass", "123456", "--appendonly", "yes"]
    ports:
      - "${MANAGER_REDIS_PORT:-6379}:6379"
    volumes:
      - ./.local/data/manager-redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a 123456 ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  # new-api 本地 Redis，与 manager Redis 分离，避免调试时 key 空间互相污染。
  new-api-redis:
    image: redis:7
    container_name: new-api-redis
    extra_hosts: *host-gateway
    command: ["redis-server", "--requirepass", "123456", "--appendonly", "yes"]
    ports:
      - "${NEWAPI_REDIS_PORT:-6380}:6379"
    volumes:
      - ./.local/data/new-api/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a 123456 ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  # new-api 本地 PostgreSQL，使用独立数据目录和数据库名。
  new-api-postgres:
    image: postgres:17-alpine
    container_name: new-api-postgres
    extra_hosts: *host-gateway
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: new-api
      TZ: Asia/Shanghai
    volumes:
      - ./.local/data/new-api/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 5s
      timeout: 3s
      retries: 20

  # new-api 本地服务，用于模拟 OpenAI-compatible API 入口和 Ollama 渠道配置。
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    extra_hosts: *host-gateway
    command: --log-dir /app/logs
    ports:
      - "${NEWAPI_PORT:-3000}:3000"
    environment:
      SQL_DSN: postgresql://root:123456@new-api-postgres:5432/new-api
      REDIS_CONN_STRING: redis://:123456@new-api-redis:6379
      TZ: Asia/Shanghai
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
      NODE_NAME: new-api-node-1
      STREAMING_TIMEOUT: "600"
    depends_on:
      new-api-postgres:
        condition: service_healthy
      new-api-redis:
        condition: service_healthy
    volumes:
      - ./.local/data/new-api/data:/data
      - ./.local/data/new-api/logs:/app/logs

  # Ollama 本地模型服务。默认请求 NVIDIA GPU；无 GPU 环境可按需移除 deploy.resources。
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    extra_hosts: *host-gateway
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_ORIGINS: "*"
      TZ: Asia/Shanghai
    volumes:
      - ./.local/data/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # manager-api 开发容器，挂载源码并通过 air 热重载运行 Go API。
  manager-api:
    image: golang:1.25-bookworm
    container_name: manager-api
    extra_hosts: *host-gateway
    working_dir: /app
    # imageDistribution 依赖 docker CLI 来 inspect/save 本地 Hermes runtime
    # 镜像（不依赖 daemon，但用 docker save 输出 tar 流给 agent load）。开发环境复用宿主机
    # Docker CLI，避免容器每次启动都 apt install docker.io 阻塞 API 监听。
    command: sh -c "if ! command -v air >/dev/null 2>&1; then go install github.com/air-verse/air@latest; fi && /go/bin/air -c .air.toml"
    environment:
      OCM_CONFIG: /app/config/manager.yaml
      PATH: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      GOPATH: /go
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      GOPROXY: "https://goproxy.cn,direct"
      GOSUMDB: "off"
      TZ: Asia/Shanghai
    ports:
      - "${MANAGER_API_PORT:-8080}:8080"
    depends_on:
      manager-postgres:
        condition: service_healthy
      manager-redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./.local/data/go/pkg/mod:/go/pkg/mod
      - ./.local/data/go/cache:/root/.cache/go-build
      - ./.local/data/go/bin:/go/bin
      # 让 manager-api 容器内的 docker CLI 直连宿主机 daemon，
      # 这样 imagesync 能 inspect / save 本地 hermes-runtime:dev 镜像。
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/local/bin/docker:ro

  # manager-web 开发容器，挂载源码并运行 Vite dev server。
  manager-web:
    image: node:22-alpine
    container_name: manager-web
    extra_hosts: *host-gateway
    working_dir: /app/web
    command: sh -c "if [ -f package.json ]; then npm install && npm run dev -- --host 0.0.0.0; else sleep infinity; fi"
    ports:
      - "${MANAGER_WEB_PORT:-5173}:5173"
    volumes:
      - ./:/app
      - ./.local/data/node/npm:/root/.npm

  # runtime-agent 本地开发容器，挂载 Docker socket 管理本机调试容器。
  oc-runtime-agent:
    image: golang:1.25-bookworm
    container_name: oc-runtime-agent
    extra_hosts: *host-gateway
    working_dir: /app/runtime/agent
    command: sh -c "if [ -f main.go ]; then go run .; else sleep infinity; fi"
    environment:
      OC_AGENT_CONFIG: /app/config/agent.yaml
      PATH: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      GOPATH: /go
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      GOPROXY: "https://goproxy.cn,direct"
      GOSUMDB: "off"
      TZ: Asia/Shanghai
    ports:
      - "${RUNTIME_AGENT_GRPC_PORT:-7001}:7001"
      - "${RUNTIME_AGENT_HTTP_PORT:-7002}:7002"
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/run/docker.sock && true"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.local/data/agent:/var/lib/oc-agent
      - ./.local/data/go/pkg/mod:/go/pkg/mod
      - ./.local/data/go/cache:/root/.cache/go-build
