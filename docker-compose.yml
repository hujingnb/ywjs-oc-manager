services:
  manager-postgres:
    image: postgres:17-alpine
    container_name: manager-postgres
    environment:
      POSTGRES_USER: ocm
      POSTGRES_PASSWORD: ocm
      POSTGRES_DB: ocm
      TZ: Asia/Shanghai
    ports:
      - "${MANAGER_POSTGRES_PORT:-15432}:5432"
    volumes:
      - ./.local/data/manager-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocm -d ocm"]
      interval: 5s
      timeout: 3s
      retries: 20

  manager-redis:
    image: redis:7
    container_name: manager-redis
    command: ["redis-server", "--requirepass", "123456", "--appendonly", "yes"]
    ports:
      - "${MANAGER_REDIS_PORT:-6379}:6379"
    volumes:
      - ./.local/data/manager-redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a 123456 ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  new-api-redis:
    image: redis:7
    container_name: new-api-redis
    command: ["redis-server", "--requirepass", "123456", "--appendonly", "yes"]
    ports:
      - "${NEWAPI_REDIS_PORT:-6380}:6379"
    volumes:
      - ./.local/data/new-api/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a 123456 ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  new-api-postgres:
    image: postgres:17-alpine
    container_name: new-api-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: new-api
      TZ: Asia/Shanghai
    volumes:
      - ./.local/data/new-api/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 5s
      timeout: 3s
      retries: 20

  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    command: --log-dir /app/logs
    ports:
      - "${NEWAPI_PORT:-3000}:3000"
    environment:
      SQL_DSN: postgresql://root:123456@new-api-postgres:5432/new-api
      REDIS_CONN_STRING: redis://:123456@new-api-redis:6379
      TZ: Asia/Shanghai
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
      NODE_NAME: new-api-node-1
      STREAMING_TIMEOUT: "600"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      new-api-postgres:
        condition: service_healthy
      new-api-redis:
        condition: service_healthy
    volumes:
      - ./.local/data/new-api/data:/data
      - ./.local/data/new-api/logs:/app/logs

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_ORIGINS: "*"
      TZ: Asia/Shanghai
    volumes:
      - ./.local/data/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  manager-api:
    image: golang:1.25-bookworm
    container_name: manager-api
    working_dir: /app
    # Sprint 1 imageDistribution 依赖 docker CLI 来 inspect/save 本地 OpenClaw runtime
    # 镜像（不依赖 daemon，但用 docker save 输出 tar 流给 agent load）。base 镜像不含
    # docker CLI 需要在启动时 apt install。docker.sock mount 让 CLI 命中宿主机 daemon。
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends docker.io && go install github.com/air-verse/air@latest && /go/bin/air -c .air.toml"
    environment:
      OCM_CONFIG: /app/config/config.yaml.example
      DATABASE_URL: postgres://ocm:ocm@manager-postgres:5432/ocm?sslmode=disable
      REDIS_ADDR: manager-redis:6379
      REDIS_PASSWORD: "123456"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET:-dev-access-secret-change-me}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}"
      CSRF_SECRET: "${CSRF_SECRET:-dev-csrf-secret-change-me}"
      MASTER_KEY: "${MASTER_KEY}"
      NEWAPI_BASE_URL: "${NEWAPI_BASE_URL:-http://new-api:3000}"
      NEWAPI_ADMIN_TOKEN: "${NEWAPI_ADMIN_TOKEN}"
      NEWAPI_ADMIN_USER_ID: "${NEWAPI_ADMIN_USER_ID:-1}"
      # OpenClaw 容器调模型用的 OpenAI 兼容网关 + 默认 provider/model；详见 config.yaml.example openclaw.llm 注释
      OPENCLAW_LLM_BASE_URL: "${OPENCLAW_LLM_BASE_URL:-http://new-api:3000/v1}"
      OPENCLAW_LLM_DEFAULT_PROVIDER: "${OPENCLAW_LLM_DEFAULT_PROVIDER:-openai}"
      OPENCLAW_LLM_DEFAULT_MODEL: "${OPENCLAW_LLM_DEFAULT_MODEL:-qwen2.5:0.5b}"
      # 注入容器 OPENAI_API_KEY 的全局 sk- token；ops 在 new-api 后台手工创建后填入 .env
      OPENCLAW_LLM_OPENAI_API_KEY: "${OPENCLAW_LLM_OPENAI_API_KEY}"
      PATH: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      GOPATH: /go
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      GOPROXY: "https://goproxy.cn,direct"
      GOSUMDB: "off"
      TZ: Asia/Shanghai
    ports:
      - "${MANAGER_API_PORT:-8080}:8080"
    depends_on:
      manager-postgres:
        condition: service_healthy
      manager-redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./.local/data/go/pkg/mod:/go/pkg/mod
      - ./.local/data/go/cache:/root/.cache/go-build
      # 让 manager-api 容器内的 docker CLI 直连宿主机 daemon，
      # 这样 imagesync 能 inspect / save 本地 openclaw-runtime:dev 镜像。
      - /var/run/docker.sock:/var/run/docker.sock

  manager-web:
    image: node:22-alpine
    container_name: manager-web
    working_dir: /app/web
    command: sh -c "if [ -f package.json ]; then npm install && npm run dev -- --host 0.0.0.0; else sleep infinity; fi"
    ports:
      - "${MANAGER_WEB_PORT:-5173}:5173"
    volumes:
      - ./:/app
      - ./.local/data/node/npm:/root/.npm

  oc-runtime-agent:
    image: golang:1.25-bookworm
    container_name: oc-runtime-agent
    working_dir: /app/runtime/agent
    command: sh -c "if [ -f main.go ]; then go run .; else sleep infinity; fi"
    environment:
      TZ: Asia/Shanghai
      DATA_ROOT: /var/lib/oc-agent
      PATH: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      GOPATH: /go
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      GOPROXY: "https://goproxy.cn,direct"
      GOSUMDB: "off"
    ports:
      - "${RUNTIME_AGENT_GRPC_PORT:-7001}:7001"
      - "${RUNTIME_AGENT_HTTP_PORT:-7002}:7002"
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/run/docker.sock && true"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.local/data/agent:/var/lib/oc-agent
      - ./.local/data/go/pkg/mod:/go/pkg/mod
      - ./.local/data/go/cache:/root/.cache/go-build
