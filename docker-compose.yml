# 本地调试环境 Compose：一次性启动 manager、runtime-agent、new-api、Ollama 及其依赖。
# 生产部署请使用 deploy/<service>/docker-compose.yml，本文件只服务开发联调。

# 所有本地调试容器都注入 host.docker.internal，方便从容器访问宿主机上的代理、
# registry、调试端口或仅监听 127.0.0.1 的开发服务。
x-host-gateway: &host-gateway
  - "host.docker.internal:host-gateway"

services:
  # manager 本地 PostgreSQL，端口映射用于本机数据库工具调试。
  manager-postgres:
    image: postgres:17-alpine
    container_name: manager-postgres
    extra_hosts: *host-gateway
    environment:
      POSTGRES_USER: ocm
      POSTGRES_PASSWORD: ocm
      POSTGRES_DB: ocm
      TZ: Asia/Shanghai
    ports:
      - "${MANAGER_POSTGRES_PORT:-15432}:5432"
    volumes:
      - ./.local/data/manager-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocm -d ocm"]
      interval: 5s
      timeout: 3s
      retries: 20

  # manager 本地 Redis，使用固定开发密码，数据写入 ./.local。
  manager-redis:
    image: redis:7
    container_name: manager-redis
    extra_hosts: *host-gateway
    command: ["redis-server", "--requirepass", "123456", "--appendonly", "yes"]
    ports:
      - "${MANAGER_REDIS_PORT:-6379}:6379"
    volumes:
      - ./.local/data/manager-redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a 123456 ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  # new-api 本地 Redis，与 manager Redis 分离，避免调试时 key 空间互相污染。
  new-api-redis:
    image: redis:7
    container_name: new-api-redis
    extra_hosts: *host-gateway
    command: ["redis-server", "--requirepass", "123456", "--appendonly", "yes"]
    ports:
      - "${NEWAPI_REDIS_PORT:-6380}:6379"
    volumes:
      - ./.local/data/new-api/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a 123456 ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  # new-api 本地 PostgreSQL，使用独立数据目录和数据库名。
  new-api-postgres:
    image: postgres:17-alpine
    container_name: new-api-postgres
    extra_hosts: *host-gateway
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: new-api
      TZ: Asia/Shanghai
    volumes:
      - ./.local/data/new-api/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 5s
      timeout: 3s
      retries: 20

  # new-api 本地服务，用于模拟 OpenAI-compatible API 入口和 Ollama 渠道配置。
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    extra_hosts: *host-gateway
    command: --log-dir /app/logs
    ports:
      - "${NEWAPI_PORT:-3000}:3000"
    environment:
      SQL_DSN: postgresql://root:123456@new-api-postgres:5432/new-api
      REDIS_CONN_STRING: redis://:123456@new-api-redis:6379
      TZ: Asia/Shanghai
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
      NODE_NAME: new-api-node-1
      STREAMING_TIMEOUT: "600"
    depends_on:
      new-api-postgres:
        condition: service_healthy
      new-api-redis:
        condition: service_healthy
    volumes:
      - ./.local/data/new-api/data:/data
      - ./.local/data/new-api/logs:/app/logs

  # Ollama 本地模型服务。默认请求 NVIDIA GPU；无 GPU 环境可按需移除 deploy.resources。
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    extra_hosts: *host-gateway
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_ORIGINS: "*"
      TZ: Asia/Shanghai
    volumes:
      - ./.local/data/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # RAGFlow 本地 MySQL，保存 RAGFlow 自身账号、dataset 与任务元数据。
  ragflow-mysql:
    image: ${RAGFLOW_MYSQL_IMAGE:-mysql:8.0.39}
    container_name: ragflow-mysql
    extra_hosts: *host-gateway
    environment:
      MYSQL_ROOT_PASSWORD: ${RAGFLOW_MYSQL_PASSWORD:-infini_rag_flow}
      TZ: Asia/Shanghai
    command:
      - --max_connections=1000
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --tls_version=TLSv1.2,TLSv1.3
      - --init-file
      - /data/application/init.sql
      - --binlog_expire_logs_seconds=604800
    ports:
      - "${RAGFLOW_MYSQL_PORT:-13306}:3306"
    volumes:
      - ./.local/data/ragflow/mysql:/var/lib/mysql
      - ./deploy/ragflow/init.sql:/data/application/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${RAGFLOW_MYSQL_PASSWORD:-infini_rag_flow}"]
      interval: 10s
      timeout: 10s
      retries: 120

  # RAGFlow 本地 Redis/Valkey，仅供 RAGFlow 内部队列和缓存使用。
  ragflow-redis:
    image: ${RAGFLOW_REDIS_IMAGE:-valkey/valkey:8}
    container_name: ragflow-redis
    extra_hosts: *host-gateway
    command: ["redis-server", "--requirepass", "${RAGFLOW_REDIS_PASSWORD:-infini_rag_flow}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${RAGFLOW_REDIS_PORT:-16379}:6379"
    volumes:
      - ./.local/data/ragflow/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${RAGFLOW_REDIS_PASSWORD:-infini_rag_flow}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 120

  # RAGFlow 本地 MinIO，保存上传到 RAGFlow 的原始文件与解析中间产物。
  ragflow-minio:
    image: ${RAGFLOW_MINIO_IMAGE:-pgsty/minio:RELEASE.2026-03-25T00-00-00Z}
    container_name: ragflow-minio
    extra_hosts: *host-gateway
    command: ["server", "--console-address", ":9001", "/data"]
    environment:
      MINIO_ROOT_USER: ${RAGFLOW_MINIO_USER:-rag_flow}
      MINIO_ROOT_PASSWORD: ${RAGFLOW_MINIO_PASSWORD:-infini_rag_flow}
      TZ: Asia/Shanghai
    ports:
      - "${RAGFLOW_MINIO_PORT:-19000}:9000"
      - "${RAGFLOW_MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - ./.local/data/ragflow/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 120

  # RAGFlow 本地 Elasticsearch，作为默认向量/全文检索后端。
  ragflow-es:
    image: ${RAGFLOW_ELASTICSEARCH_IMAGE:-elasticsearch:8.11.3}
    container_name: ragflow-es
    extra_hosts: *host-gateway
    environment:
      node.name: ragflow-es
      ELASTIC_PASSWORD: ${RAGFLOW_ELASTIC_PASSWORD:-infini_rag_flow}
      bootstrap.memory_lock: "false"
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      cluster.routing.allocation.disk.watermark.low: 5gb
      cluster.routing.allocation.disk.watermark.high: 3gb
      cluster.routing.allocation.disk.watermark.flood_stage: 2gb
      TZ: Asia/Shanghai
    mem_limit: ${RAGFLOW_MEM_LIMIT:-4294967296}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${RAGFLOW_ES_PORT:-19200}:9200"
    volumes:
      - ./.local/data/ragflow/elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 120

  # RAGFlow 本地服务。manager 通过 http://ragflow:9380 访问 HTTP API；
  # RAGFlow 调模型时由管理员在 RAGFlow 控制台配置 existing new-api + DeepSeek key。
  ragflow:
    image: ${RAGFLOW_IMAGE:-infiniflow/ragflow:v0.25.6}
    container_name: ragflow
    extra_hosts: *host-gateway
    command:
      - --enable-adminserver
    environment:
      DOC_ENGINE: elasticsearch
      DEVICE: cpu
      STACK_VERSION: ${RAGFLOW_STACK_VERSION:-8.11.3}
      ES_HOST: ragflow-es
      ELASTIC_PASSWORD: ${RAGFLOW_ELASTIC_PASSWORD:-infini_rag_flow}
      MYSQL_HOST: ragflow-mysql
      MYSQL_PORT: 3306
      MYSQL_DBNAME: rag_flow
      MYSQL_PASSWORD: ${RAGFLOW_MYSQL_PASSWORD:-infini_rag_flow}
      MYSQL_MAX_PACKET: 1073741824
      MINIO_HOST: ragflow-minio
      MINIO_USER: ${RAGFLOW_MINIO_USER:-rag_flow}
      MINIO_PASSWORD: ${RAGFLOW_MINIO_PASSWORD:-infini_rag_flow}
      REDIS_HOST: ragflow-redis
      REDIS_PASSWORD: ${RAGFLOW_REDIS_PASSWORD:-infini_rag_flow}
      API_PROXY_SCHEME: python
      REGISTER_ENABLED: ${RAGFLOW_REGISTER_ENABLED:-1}
      TZ: Asia/Shanghai
    ports:
      - "${RAGFLOW_WEB_HTTP_PORT:-8088}:80"
      - "${RAGFLOW_HTTP_PORT:-9380}:9380"
      - "${RAGFLOW_ADMIN_HTTP_PORT:-9381}:9381"
    depends_on:
      ragflow-mysql:
        condition: service_healthy
      ragflow-redis:
        condition: service_healthy
      ragflow-minio:
        condition: service_healthy
      ragflow-es:
        condition: service_healthy
    volumes:
      - ./.local/data/ragflow/logs:/ragflow/logs
      - ./deploy/ragflow/service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template:ro

  # manager-api 开发容器，挂载源码并通过 air 热重载运行 Go API。
  manager-api:
    image: golang:1.25-bookworm
    container_name: manager-api
    extra_hosts: *host-gateway
    working_dir: /app
    # imageDistribution 依赖 docker CLI 来 inspect/save 本地 Hermes runtime
    # 镜像（不依赖 daemon，但用 docker save 输出 tar 流给 agent load）。开发环境复用宿主机
    # Docker CLI，避免容器每次启动都 apt install docker.io 阻塞 API 监听。
    command: sh -c "if ! command -v air >/dev/null 2>&1; then go install github.com/air-verse/air@latest; fi && /go/bin/air -c .air.toml"
    environment:
      OCM_CONFIG: /app/config/manager.yaml
      PATH: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      GOPATH: /go
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      GOPROXY: "https://goproxy.cn,direct"
      GOSUMDB: "off"
      TZ: Asia/Shanghai
    ports:
      - "${MANAGER_API_PORT:-8080}:8080"
    depends_on:
      manager-postgres:
        condition: service_healthy
      manager-redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./.local/data/go/pkg/mod:/go/pkg/mod
      - ./.local/data/go/cache:/root/.cache/go-build
      - ./.local/data/go/bin:/go/bin
      # 让 manager-api 容器内的 docker CLI 直连宿主机 daemon，
      # 这样 imagesync 能 inspect / save 本地 hermes-runtime:v2026.5.16-dev 镜像。
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/local/bin/docker:ro
      # 宿主机 ~/.docker/config.json：为镜像 pull 提供 registry 凭据（只读）。
      # LocalDockerSDKProvider 启动时读这里的 auths，作为 X-Registry-Auth 传给 daemon。
      - ${HOME}/.docker/config.json:/root/.docker/config.json:ro

  # manager-web 开发容器，挂载源码并运行 Vite dev server。
  manager-web:
    image: node:22-alpine
    container_name: manager-web
    extra_hosts: *host-gateway
    working_dir: /app/web
    command: sh -c "if [ -f package.json ]; then npm install && npm run dev -- --host 0.0.0.0; else sleep infinity; fi"
    ports:
      - "${MANAGER_WEB_PORT:-5173}:5173"
    volumes:
      - ./:/app
      - ./.local/data/node/npm:/root/.npm

  # runtime-agent 本地开发容器，挂载 Docker socket 管理本机调试容器。
  # 用 air hot-reload(与 manager-api 一致):改 runtime/agent/ 下任何 .go 文件
  # 自动重建并重启 agent 进程,无需手动 docker restart 这种基础设施操作。
  oc-runtime-agent:
    image: golang:1.25-bookworm
    container_name: oc-runtime-agent
    extra_hosts: *host-gateway
    working_dir: /app/runtime/agent
    command: sh -c "if [ -f main.go ]; then if ! command -v air >/dev/null 2>&1; then go install github.com/air-verse/air@latest; fi && /go/bin/air -c /app/.air.runtime-agent.toml; else sleep infinity; fi"
    environment:
      OC_AGENT_CONFIG: /app/config/agent.yaml
      PATH: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      GOPATH: /go
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      GOPROXY: "https://goproxy.cn,direct"
      GOSUMDB: "off"
      TZ: Asia/Shanghai
    ports:
      - "${RUNTIME_AGENT_GRPC_PORT:-7001}:7001"
      - "${RUNTIME_AGENT_HTTP_PORT:-7002}:7002"
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/run/docker.sock && true"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.local/data/agent:/var/lib/oc-agent
      - ./.local/data/go/pkg/mod:/go/pkg/mod
      - ./.local/data/go/cache:/root/.cache/go-build
