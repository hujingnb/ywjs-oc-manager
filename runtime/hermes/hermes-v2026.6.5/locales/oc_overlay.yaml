oc:
  run:
    timeout_inactive:
      en: "⏱️ Agent inactive for {timeout_mins} min — no tool calls or API responses."
      zh: "⏱️ 智能体已闲置 {timeout_mins} 分钟 —— 无工具调用也无 API 响应。"
    timeout_stuck_tool:
      en: "The agent appears stuck on tool `{cur_tool}` ({secs_ago:.0f}s since last activity, iteration {iter_n}/{iter_max})."
      zh: "智能体疑似卡在工具 `{cur_tool}` (距上次活动 {secs_ago:.0f} 秒, 迭代 {iter_n}/{iter_max})。"
    timeout_last_activity:
      en: "Last activity: {last_desc} ({secs_ago:.0f}s ago, iteration {iter_n}/{iter_max}). The agent may have been waiting on an API response."
      zh: "最近活动:{last_desc}(距今 {secs_ago:.0f} 秒, 迭代 {iter_n}/{iter_max})。 智能体可能正在等待 API 响应。"
    timeout_increase_limit:
      en: "To increase the limit, set agent.gateway_timeout in config.yaml (value in seconds, 0 = no limit) and restart the gateway.\nTry again, or use /reset to start fresh."
      zh: "如需提高上限,请在 config.yaml 中设置 agent.gateway_timeout (单位为秒,0 = 不限制),然后重启网关。\n请重试,或使用 /reset 开始新会话。"
    # _gateway_provider_error_reply：模型服务商错误回包（四个互斥分支各一条）。
    provider_auth_failed:
      en: "⚠️ Provider authentication failed. Check the configured credentials; raw provider details are in the gateway logs."
      zh: "⚠️ 模型服务商鉴权失败。请检查所配置的凭证;原始服务商错误详情见 gateway 日志。"
    provider_rejected:
      en: "⚠️ The model provider rejected the request. I kept the raw provider error out of chat; check gateway logs for details or try rephrasing."
      zh: "⚠️ 模型服务商拒绝了本次请求。我没有把原始服务商错误输出到对话中;详情见 gateway 日志,或换一种说法重试。"
    provider_rate_limited:
      en: "⏱️ The model provider is rate-limiting requests. Please wait a moment and try again."
      zh: "⏱️ 模型服务商正在限流。请稍候片刻后重试。"
    provider_failed_retries:
      en: "⚠️ The model provider failed after retries. I kept raw provider details out of chat; check gateway logs for diagnostics."
      zh: "⚠️ 模型服务商在多次重试后仍失败。我没有把原始服务商详情输出到对话中;诊断信息见 gateway 日志。"
    # 会话过大兜底（context overflow）；源码两处文案相同、缩进不同，复用同一 key。
    session_too_large:
      en: "⚠️ Session too large for the model's context window.\nUse /compact to compress the conversation, or /reset to start fresh."
      zh: "⚠️ 会话过大,超出了模型的上下文窗口。\n请用 /compact 压缩对话,或用 /reset 开始新会话。"
    # 通用请求失败兜底；{detail} 为截断后的原始错误文本。
    request_failed:
      en: "The request failed: {detail}\nTry again or use /reset to start a fresh session."
      zh: "请求失败:{detail}\n请重试,或用 /reset 开始一个新会话。"
    # 部分处理后中止；{err} 为截断后的错误说明。
    processing_stopped:
      en: "⚠️ Processing stopped: {err}. Try again."
      zh: "⚠️ 处理已中止:{err}。请重试。"
    # 处理完成但无回复生成（隐式拼接的整条消息合为一条）。
    no_response_generated:
      en: "⚠️ Processing completed but no response was generated. This may be a transient error — try sending your message again."
      zh: "⚠️ 处理已完成,但没有生成任何回复。这可能是临时性错误 —— 请再发送一次你的消息。"
    # 网关关闭/重启通知：action/hint 各自分支单独成 key，msg 拼装为 gateway_interrupt。
    action_restarting:
      en: "restarting"
      zh: "正在重启"
    action_shutting_down:
      en: "shutting down"
      zh: "正在关闭"
    task_interrupted_resume:
      en: "Your current task will be interrupted. Send any message after restart and I'll try to resume where you left off."
      zh: "你当前的任务将被中断。重启完成后发送任意消息,我会尝试从你上次离开的地方继续。"
    task_interrupted:
      en: "Your current task will be interrupted. "
      zh: "你当前的任务将被中断。"
    gateway_interrupt:
      en: "⚠️ Gateway {action} — {hint}"
      zh: "⚠️ 网关{action} —— {hint}"
    # 工具结果后模型无回复：源码三段相邻字面量隐式拼接，合为一条消息一个 key。
    no_response_after_tool:
      en: "⚠️ The model returned no response after processing tool results. This can happen with some models — try again or rephrase your question."
      zh: "⚠️ 模型在处理工具结果后没有返回任何回复。某些模型会出现这种情况 —— 请重试,或换一种方式提问。"
    # 会话自动重置：源码以 "\n\n" 前缀拼三段；前导换行保留在 en/zh 译文里。
    session_auto_reset:
      en: "\n\n🔄 Session auto-reset — the conversation exceeded the maximum context size and could not be compressed further. Your next message will start a fresh session."
      zh: "\n\n🔄 会话已自动重置 —— 对话超过了最大上下文上限,且已无法继续压缩。你的下一条消息将开始一个新会话。"
    # --- Steer / queue 命令文案 ---
    # /queue 用法提示（参数为空）。
    queue_usage:
      en: "Usage: /queue <prompt>"
      zh: "用法:/queue <prompt>"
    # /queue 排队成功（队列深度 <=1，无计数）。复用此 key 不与带计数的版本混用。
    queue_queued:
      en: "Queued for the next turn."
      zh: "已加入队列,将在下一轮处理。"
    # /queue 排队成功且队列深度 >1，附带 N 条排队计数。
    queue_queued_depth:
      en: "Queued for the next turn. ({depth} queued)"
      zh: "已加入队列,将在下一轮处理。 ({depth} 条排队)"
    # /steer 用法提示（参数为空，且智能体正在运行）。
    steer_usage:
      en: "Usage: /steer <prompt>"
      zh: "用法:/steer <prompt>"
    # /steer 用法提示（无智能体运行，将作普通消息发送）。
    steer_usage_no_agent:
      en: "Usage: /steer <prompt>  (no agent is running; sending as a normal message)"
      zh: "用法:/steer <prompt>(当前没有正在运行的智能体;将作为普通消息发送)"
    # 智能体仍在启动，/steer 退化为下一轮排队。
    steer_starting:
      en: "Agent still starting — /steer queued for the next turn."
      zh: "智能体仍在启动 —— /steer 已加入下一轮队列。"
    # steer() 调用抛异常的失败提示，{exc} 为异常文本。
    steer_failed:
      en: "⚠️ Steer failed: {exc}"
      zh: "⚠️ Steer 失败:{exc}"
    # steer 已接受并排队，{preview} 为截断后的内容预览。
    steer_queued:
      en: "⏩ Steer queued — arrives after the next tool call: '{preview}'"
      zh: "⏩ Steer 已排队 —— 将在下一次工具调用后送达:'{preview}'"
    # steer 内容为空被拒绝。
    steer_rejected_empty:
      en: "Steer rejected (empty payload)."
      zh: "Steer 被拒绝(内容为空)。"
    # 无活动智能体，/steer 退化为下一轮排队。
    steer_no_agent:
      en: "No active agent — /steer queued for the next turn."
      zh: "没有活动的智能体 —— /steer 已加入下一轮队列。"
    # --- 智能体运行中、命令受限 ---
    # /model 运行中受限。
    agent_running_switch_model:
      en: "Agent is running — wait or /stop first, then switch models."
      zh: "智能体正在运行 —— 请先等待或 /stop,再切换模型。"
    # /codex-runtime 运行中受限（源码两段相邻字面量隐式拼接）。
    agent_running_change_runtime:
      en: "Agent is running — wait or /stop first, then change runtime."
      zh: "智能体正在运行 —— 请先等待或 /stop,再切换运行时。"
    # /goal 设置新目标运行中受限。
    agent_running_goal:
      en: "Agent is running — use /goal status / pause / clear mid-run, or /stop before setting a new goal."
      zh: "智能体正在运行 —— 运行中可用 /goal status / pause / clear,或先 /stop 再设置新目标。"
    # 回合进行中、命令不可执行（源码两段 f-string 隐式拼接），{name} 为命令名。
    agent_running_midturn:
      en: "⏳ Agent is running — `/{name}` can't run mid-turn. Wait for the current response or `/stop` first."
      zh: "⏳ 智能体正在运行 —— `/{name}` 现在不能运行(回合进行中)。请等待当前回复结束,或先 `/stop`。"
    # 待启动阶段强制停止、会话解锁。
    force_stopped:
      en: "⚡ Force-stopped. The agent was still starting — session unlocked."
      zh: "⚡ 已强制停止。智能体仍在启动中 —— 会话已解锁。"
    # --- 网关 draining 排队/拒绝（{gerund} 为已翻译的状态动作，由 _status_action_gerund() 给出）---
    # draining 中、排队待恢复。
    gateway_draining_queued:
      en: "⏳ Gateway is {gerund} — queued for the next turn after it comes back."
      zh: "⏳ 网关{gerund} —— 已加入队列,待其恢复后于下一轮处理。"
    # draining 中、暂不接受新回合。
    gateway_not_accepting_turn:
      en: "⏳ Gateway is {gerund} and is not accepting another turn right now."
      zh: "⏳ 网关{gerund},当前暂不接受新的回合。"
    # draining 中、暂不接受新任务。
    gateway_not_accepting_work:
      en: "⏳ Gateway is {gerund} and is not accepting new work right now."
      zh: "⏳ 网关{gerund},当前暂不接受新任务。"
    # 命令被 hook 拦截（deny 决策无自定义消息时的兜底），{command} 为命令名。
    command_blocked_hook:
      en: "Command `/{command}` was blocked by a hook."
      zh: "命令 `/{command}` 被某个 hook 拦截。"
    # --- /new、/reset 销毁性确认与快捷命令 ---
    # /new 销毁性确认提示文案（源码两段相邻字面量隐式拼接）。
    destructive_confirm:
      en: "This starts a fresh session and discards the current conversation history."
      zh: "这将开始一个全新会话,并丢弃当前的对话历史。"
    # 销毁性确认被取消；{command} 为命令名（🟡 /{command} 前缀为源码字面量）。
    destructive_cancelled:
      en: "🟡 /{command} cancelled. Conversation unchanged."
      zh: "🟡 /{command} 已取消。对话内容未改变。"
    # 自定义快捷命令 exec 无输出兜底。
    quick_cmd_no_output:
      en: "Command returned no output."
      zh: "命令没有输出。"
    # 自定义快捷命令 exec 执行超时（固定 30 秒）。
    quick_cmd_timeout:
      en: "Quick command timed out (30s)."
      zh: "快捷命令超时(30 秒)。"
    # 自定义快捷命令 exec 异常；{err} 为异常文本。
    quick_cmd_error:
      en: "Quick command error: {err}"
      zh: "快捷命令出错:{err}"
    # 快捷命令配置缺 command 字段；{command} 为命令名。
    quick_cmd_no_command:
      en: "Quick command '/{command}' has no command defined."
      zh: "快捷命令 '/{command}' 未定义命令。"
    # 快捷命令 alias 配置缺 target 字段；{command} 为命令名。
    quick_cmd_no_target:
      en: "Quick command '/{command}' has no target defined."
      zh: "快捷命令 '/{command}' 未定义目标。"
    # 快捷命令 type 不在支持范围；{command} 为命令名。
    quick_cmd_unsupported_type:
      en: "Quick command '/{command}' has unsupported type (supported: 'exec', 'alias')."
      zh: "快捷命令 '/{command}' 类型不受支持(支持:'exec'、'alias')。"
    # --- 未知斜杠命令提示（源码四段相邻 f-string 隐式拼接，整条合一）；{command} 为命令名。---
    unknown_command:
      en: "Unknown command `/{command}`. Type /commands to see what's available, or resend without the leading slash to send as a regular message."
      zh: "未知命令 `/{command}`。输入 /commands 查看可用命令,或去掉开头的斜杠重新发送,即可作为普通消息处理。"
  base: {}
