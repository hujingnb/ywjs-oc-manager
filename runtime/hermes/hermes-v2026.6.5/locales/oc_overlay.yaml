oc:
  run:
    timeout_inactive:
      en: "⏱️ Agent inactive for {timeout_mins} min — no tool calls or API responses."
      zh: "⏱️ 智能体已闲置 {timeout_mins} 分钟 —— 无工具调用也无 API 响应。"
    timeout_stuck_tool:
      en: "The agent appears stuck on tool `{cur_tool}` ({secs_ago:.0f}s since last activity, iteration {iter_n}/{iter_max})."
      zh: "智能体疑似卡在工具 `{cur_tool}` (距上次活动 {secs_ago:.0f} 秒, 迭代 {iter_n}/{iter_max})。"
    timeout_last_activity:
      en: "Last activity: {last_desc} ({secs_ago:.0f}s ago, iteration {iter_n}/{iter_max}). The agent may have been waiting on an API response."
      zh: "最近活动:{last_desc}(距今 {secs_ago:.0f} 秒, 迭代 {iter_n}/{iter_max})。 智能体可能正在等待 API 响应。"
    timeout_increase_limit:
      en: "To increase the limit, set agent.gateway_timeout in config.yaml (value in seconds, 0 = no limit) and restart the gateway.\nTry again, or use /reset to start fresh."
      zh: "如需提高上限,请在 config.yaml 中设置 agent.gateway_timeout (单位为秒,0 = 不限制),然后重启网关。\n请重试,或使用 /reset 开始新会话。"
    # _gateway_provider_error_reply：模型服务商错误回包（四个互斥分支各一条）。
    provider_auth_failed:
      en: "⚠️ Provider authentication failed. Check the configured credentials; raw provider details are in the gateway logs."
      zh: "⚠️ 模型服务商鉴权失败。请检查所配置的凭证;原始服务商错误详情见 gateway 日志。"
    provider_rejected:
      en: "⚠️ The model provider rejected the request. I kept the raw provider error out of chat; check gateway logs for details or try rephrasing."
      zh: "⚠️ 模型服务商拒绝了本次请求。我没有把原始服务商错误输出到对话中;详情见 gateway 日志,或换一种说法重试。"
    provider_rate_limited:
      en: "⏱️ The model provider is rate-limiting requests. Please wait a moment and try again."
      zh: "⏱️ 模型服务商正在限流。请稍候片刻后重试。"
    provider_failed_retries:
      en: "⚠️ The model provider failed after retries. I kept raw provider details out of chat; check gateway logs for diagnostics."
      zh: "⚠️ 模型服务商在多次重试后仍失败。我没有把原始服务商详情输出到对话中;诊断信息见 gateway 日志。"
    # 会话过大兜底（context overflow）；源码两处文案相同、缩进不同，复用同一 key。
    session_too_large:
      en: "⚠️ Session too large for the model's context window.\nUse /compact to compress the conversation, or /reset to start fresh."
      zh: "⚠️ 会话过大,超出了模型的上下文窗口。\n请用 /compact 压缩对话,或用 /reset 开始新会话。"
    # 通用请求失败兜底；{detail} 为截断后的原始错误文本。
    request_failed:
      en: "The request failed: {detail}\nTry again or use /reset to start a fresh session."
      zh: "请求失败:{detail}\n请重试,或用 /reset 开始一个新会话。"
    # 部分处理后中止；{err} 为截断后的错误说明。
    processing_stopped:
      en: "⚠️ Processing stopped: {err}. Try again."
      zh: "⚠️ 处理已中止:{err}。请重试。"
    # 处理完成但无回复生成（隐式拼接的整条消息合为一条）。
    no_response_generated:
      en: "⚠️ Processing completed but no response was generated. This may be a transient error — try sending your message again."
      zh: "⚠️ 处理已完成,但没有生成任何回复。这可能是临时性错误 —— 请再发送一次你的消息。"
    # 网关关闭/重启通知：action/hint 各自分支单独成 key，msg 拼装为 gateway_interrupt。
    action_restarting:
      en: "restarting"
      zh: "正在重启"
    action_shutting_down:
      en: "shutting down"
      zh: "正在关闭"
    task_interrupted_resume:
      en: "Your current task will be interrupted. Send any message after restart and I'll try to resume where you left off."
      zh: "你当前的任务将被中断。重启完成后发送任意消息,我会尝试从你上次离开的地方继续。"
    task_interrupted:
      en: "Your current task will be interrupted. "
      zh: "你当前的任务将被中断。"
    gateway_interrupt:
      en: "⚠️ Gateway {action} — {hint}"
      zh: "⚠️ 网关{action} —— {hint}"
    # 工具结果后模型无回复：源码三段相邻字面量隐式拼接，合为一条消息一个 key。
    no_response_after_tool:
      en: "⚠️ The model returned no response after processing tool results. This can happen with some models — try again or rephrase your question."
      zh: "⚠️ 模型在处理工具结果后没有返回任何回复。某些模型会出现这种情况 —— 请重试,或换一种方式提问。"
    # 会话自动重置：源码以 "\n\n" 前缀拼三段；前导换行保留在 en/zh 译文里。
    session_auto_reset:
      en: "\n\n🔄 Session auto-reset — the conversation exceeded the maximum context size and could not be compressed further. Your next message will start a fresh session."
      zh: "\n\n🔄 会话已自动重置 —— 对话超过了最大上下文上限,且已无法继续压缩。你的下一条消息将开始一个新会话。"
    # --- Steer / queue 命令文案 ---
    # /queue 用法提示（参数为空）。
    queue_usage:
      en: "Usage: /queue <prompt>"
      zh: "用法:/queue <prompt>"
    # /queue 排队成功（队列深度 <=1，无计数）。复用此 key 不与带计数的版本混用。
    queue_queued:
      en: "Queued for the next turn."
      zh: "已加入队列,将在下一轮处理。"
    # /queue 排队成功且队列深度 >1，附带 N 条排队计数。
    queue_queued_depth:
      en: "Queued for the next turn. ({depth} queued)"
      zh: "已加入队列,将在下一轮处理。 ({depth} 条排队)"
    # /steer 用法提示（参数为空，且智能体正在运行）。
    steer_usage:
      en: "Usage: /steer <prompt>"
      zh: "用法:/steer <prompt>"
    # /steer 用法提示（无智能体运行，将作普通消息发送）。
    steer_usage_no_agent:
      en: "Usage: /steer <prompt>  (no agent is running; sending as a normal message)"
      zh: "用法:/steer <prompt>(当前没有正在运行的智能体;将作为普通消息发送)"
    # 智能体仍在启动，/steer 退化为下一轮排队。
    steer_starting:
      en: "Agent still starting — /steer queued for the next turn."
      zh: "智能体仍在启动 —— /steer 已加入下一轮队列。"
    # steer() 调用抛异常的失败提示，{exc} 为异常文本。
    steer_failed:
      en: "⚠️ Steer failed: {exc}"
      zh: "⚠️ Steer 失败:{exc}"
    # steer 已接受并排队，{preview} 为截断后的内容预览。
    steer_queued:
      en: "⏩ Steer queued — arrives after the next tool call: '{preview}'"
      zh: "⏩ Steer 已排队 —— 将在下一次工具调用后送达:'{preview}'"
    # steer 内容为空被拒绝。
    steer_rejected_empty:
      en: "Steer rejected (empty payload)."
      zh: "Steer 被拒绝(内容为空)。"
    # 无活动智能体，/steer 退化为下一轮排队。
    steer_no_agent:
      en: "No active agent — /steer queued for the next turn."
      zh: "没有活动的智能体 —— /steer 已加入下一轮队列。"
    # --- 智能体运行中、命令受限 ---
    # /model 运行中受限。
    agent_running_switch_model:
      en: "Agent is running — wait or /stop first, then switch models."
      zh: "智能体正在运行 —— 请先等待或 /stop,再切换模型。"
    # /codex-runtime 运行中受限（源码两段相邻字面量隐式拼接）。
    agent_running_change_runtime:
      en: "Agent is running — wait or /stop first, then change runtime."
      zh: "智能体正在运行 —— 请先等待或 /stop,再切换运行时。"
    # /goal 设置新目标运行中受限。
    agent_running_goal:
      en: "Agent is running — use /goal status / pause / clear mid-run, or /stop before setting a new goal."
      zh: "智能体正在运行 —— 运行中可用 /goal status / pause / clear,或先 /stop 再设置新目标。"
    # 回合进行中、命令不可执行（源码两段 f-string 隐式拼接），{name} 为命令名。
    agent_running_midturn:
      en: "⏳ Agent is running — `/{name}` can't run mid-turn. Wait for the current response or `/stop` first."
      zh: "⏳ 智能体正在运行 —— `/{name}` 现在不能运行(回合进行中)。请等待当前回复结束,或先 `/stop`。"
    # 待启动阶段强制停止、会话解锁。
    force_stopped:
      en: "⚡ Force-stopped. The agent was still starting — session unlocked."
      zh: "⚡ 已强制停止。智能体仍在启动中 —— 会话已解锁。"
    # --- 网关 draining 排队/拒绝（{gerund} 为已翻译的状态动作，由 _status_action_gerund() 给出）---
    # draining 中、排队待恢复。
    gateway_draining_queued:
      en: "⏳ Gateway is {gerund} — queued for the next turn after it comes back."
      zh: "⏳ 网关{gerund} —— 已加入队列,待其恢复后于下一轮处理。"
    # draining 中、暂不接受新回合。
    gateway_not_accepting_turn:
      en: "⏳ Gateway is {gerund} and is not accepting another turn right now."
      zh: "⏳ 网关{gerund},当前暂不接受新的回合。"
    # draining 中、暂不接受新任务。
    gateway_not_accepting_work:
      en: "⏳ Gateway is {gerund} and is not accepting new work right now."
      zh: "⏳ 网关{gerund},当前暂不接受新任务。"
    # 命令被 hook 拦截（deny 决策无自定义消息时的兜底），{command} 为命令名。
    command_blocked_hook:
      en: "Command `/{command}` was blocked by a hook."
      zh: "命令 `/{command}` 被某个 hook 拦截。"
    # --- /new、/reset 销毁性确认与快捷命令 ---
    # /new 销毁性确认提示文案（源码两段相邻字面量隐式拼接）。
    destructive_confirm:
      en: "This starts a fresh session and discards the current conversation history."
      zh: "这将开始一个全新会话,并丢弃当前的对话历史。"
    # 销毁性确认被取消；{command} 为命令名（🟡 /{command} 前缀为源码字面量）。
    destructive_cancelled:
      en: "🟡 /{command} cancelled. Conversation unchanged."
      zh: "🟡 /{command} 已取消。对话内容未改变。"
    # 自定义快捷命令 exec 无输出兜底。
    quick_cmd_no_output:
      en: "Command returned no output."
      zh: "命令没有输出。"
    # 自定义快捷命令 exec 执行超时（固定 30 秒）。
    quick_cmd_timeout:
      en: "Quick command timed out (30s)."
      zh: "快捷命令超时(30 秒)。"
    # 自定义快捷命令 exec 异常；{err} 为异常文本。
    quick_cmd_error:
      en: "Quick command error: {err}"
      zh: "快捷命令出错:{err}"
    # 快捷命令配置缺 command 字段；{command} 为命令名。
    quick_cmd_no_command:
      en: "Quick command '/{command}' has no command defined."
      zh: "快捷命令 '/{command}' 未定义命令。"
    # 快捷命令 alias 配置缺 target 字段；{command} 为命令名。
    quick_cmd_no_target:
      en: "Quick command '/{command}' has no target defined."
      zh: "快捷命令 '/{command}' 未定义目标。"
    # 快捷命令 type 不在支持范围；{command} 为命令名。
    quick_cmd_unsupported_type:
      en: "Quick command '/{command}' has unsupported type (supported: 'exec', 'alias')."
      zh: "快捷命令 '/{command}' 类型不受支持(支持:'exec'、'alias')。"
    # --- 未知斜杠命令提示（源码四段相邻 f-string 隐式拼接，整条合一）；{command} 为命令名。---
    unknown_command:
      en: "Unknown command `/{command}`. Type /commands to see what's available, or resend without the leading slash to send as a regular message."
      zh: "未知命令 `/{command}`。输入 /commands 查看可用命令,或去掉开头的斜杠重新发送,即可作为普通消息处理。"
    # --- 技能未安装/被禁用提示（源码两段 f-string 隐式拼接，换行为字面 \n）---
    # 技能已安装但被禁用；{name} 为技能名。
    skill_disabled:
      en: "The **{name}** skill is installed but disabled.\nEnable it with: `hermes skills config`"
      zh: "技能 **{name}** 已安装但被禁用。\n用 `hermes skills config` 启用"
    # 技能可用但尚未安装；{name} 为技能名，{install_path} 为安装路径。
    skill_not_installed:
      en: "The **{name}** skill is available but not installed.\nInstall it with: `hermes skills install {install_path}`"
      zh: "技能 **{name}** 可用但尚未安装。\n用 `hermes skills install {install_path}`"
    # 技能在指定平台被禁用；{name} 为技能名，{platform} 为平台标识。
    skill_disabled_platform:
      en: "The **{name}** skill is disabled for {platform}.\nEnable it with: `hermes skills config`"
      zh: "技能 **{name}** 已在以下平台被禁用:{platform}。\n用 `hermes skills config` 启用"
    # --- 配对流程（未识别用户首次私聊）---
    # 配对引导（源码前三段 f-string 隐式拼接，第四行 hermes pairing approve 命令保留字面）；{code} 为配对码。
    pairing_intro:
      en: "Hi~ I don't recognize you yet!\n\nHere's your pairing code: `{code}`\n\nAsk the bot owner to run:\n"
      zh: "你好~ 我还不认识你!\n\n这是你的配对码:`{code}`\n\n请让机器人管理员运行:\n"
    # 配对请求过于频繁、被限流（源码两段相邻字面量隐式拼接）。
    pairing_too_many:
      en: "Too many pairing requests right now~ Please try again later!"
      zh: "当前配对请求过多~ 请稍后再试!"
    # --- 更新进程交互（/approve 转发给更新子进程）---
    # 回复发送给更新进程失败；{err} 为异常文本。
    update_send_failed:
      en: "✗ Failed to send response to update process: {err}"
      zh: "✗ 发送回复到更新进程失败:{err}"
    # 回复已发送给更新进程；{label} 为回复内容预览。
    update_sent:
      en: "✓ Sent `{label}` to the update process."
      zh: "✓ 已发送 `{label}` 到更新进程。"
    # 更新进程需要用户输入（标题段，换行为字面 \n）。
    update_needs_input:
      en: "⚕ **Update needs your input:**\n\n"
      zh: "⚕ **更新需要你的输入:**\n\n"
    # 更新进程输入提示（源码两段相邻 f-string 隐式拼接，中间动态内容由调用点保留）。
    update_reply_hint:
      en: "Reply `/approve` (yes) or `/deny` (no), or type your answer directly."
      zh: "回复 `/approve`(同意)或 `/deny`(拒绝),或直接输入你的回答。"
    # --- 上下文压缩中止（源码六段相邻字面量隐式拼接，整条合一）；{err} 为压缩错误原因。---
    compression_aborted:
      en: "⚠️ Context compression aborted ({err}). No messages were dropped — conversation is unchanged. Run /compress to retry, /reset for a clean session, or check your auxiliary.compression model configuration."
      zh: "⚠️ 上下文压缩已中止({err})。没有丢弃任何消息 —— 对话内容未改变。请运行 /compress 重试,或用 /reset 开始干净会话,或检查你的 auxiliary.compression 模型配置。"
    # --- 目标 / 子目标命令（/goal、/subgoal）---
    # 当前没有活动目标，提示用 /goal 设置。
    goal_none:
      en: "No active goal. Set one with /goal <text>."
      zh: "当前没有活动目标。用 /goal <text> 设置一个。"
    # /subgoal remove 用法（缺参数）。
    subgoal_usage_remove:
      en: "Usage: /subgoal remove <n>"
      zh: "用法:/subgoal remove <n>"
    # /subgoal remove 序号非整数。
    subgoal_remove_not_int:
      en: "/subgoal remove: <n> must be an integer (1-based index)."
      zh: "/subgoal remove:<n> 必须是整数(从 1 开始计)。"
    # /subgoal remove 执行异常；{exc} 为异常文本。
    subgoal_remove_error:
      en: "/subgoal remove: {exc}"
      zh: "/subgoal remove:{exc}"
    # /subgoal remove 成功；{idx} 为序号，{removed} 为被移除子目标文本。
    subgoal_removed:
      en: "✓ Removed subgoal {idx}: {removed}"
      zh: "✓ 已移除子目标 {idx}: {removed}"
    # /subgoal clear 执行异常；{exc} 为异常文本。
    subgoal_clear_error:
      en: "/subgoal clear: {exc}"
      zh: "/subgoal clear:{exc}"
    # /subgoal clear 时没有可清除的子目标。
    subgoal_none_to_clear:
      en: "No subgoals to clear."
      zh: "没有可清除的子目标。"
    # /subgoal 添加成功；{idx} 为序号，{text} 为子目标文本。
    subgoal_added:
      en: "✓ Added subgoal {idx}: {text}"
      zh: "✓ 已添加子目标 {idx}: {text}"
    # 命令仅管理员可用的拒绝提示；{canonical_cmd} 为命令名，{suffix} 为可运行命令/提示的动态尾段。
    access_admin_only:
      en: "⛔ /{canonical_cmd} is admin-only here. {suffix}"
      zh: "⛔ /{canonical_cmd} 在此仅管理员可用。{suffix}"
    # --- 权限层级信息（/whoami；源码为多段 f-string 隐式拼接，整块经 + 显式拼接）---
    # 用户身份首行；{platform} 为平台，{scope} 为 DM/群组范围（行尾换行由调用点 + 拼接保留）。
    access_you:
      en: "**You** — {platform} ({scope})"
      zh: "**你** —— {platform} ({scope})"
    # 用户 ID 行（行尾换行由调用点保留）；{user_id} 为用户标识。
    access_user_id:
      en: "User ID: `{user_id}`"
      zh: "用户 ID:`{user_id}`"
    # 权限层级：不受限（此范围未配置管理员名单）。
    access_tier_unrestricted:
      en: "Tier: unrestricted (no admin list configured for this scope)"
      zh: "权限层级:不受限(此范围未配置管理员名单)"
    # 权限层级：管理员。
    access_tier_admin:
      en: "Tier: **admin**"
      zh: "权限层级:**管理员**"
    # 权限层级：普通用户。
    access_tier_user:
      en: "Tier: user"
      zh: "权限层级:普通用户"
    # 全部斜杠命令可用（管理员 / 不受限）。
    access_slash_all:
      en: "Slash commands: all available"
      zh: "可用斜杠命令:全部"
    # 普通用户可运行的斜杠命令清单前缀；{runnable_str} 为命令列表（行尾换行由调用点保留）。
    access_slash_you_can_run:
      en: "Slash commands you can run: {runnable_str}"
      zh: "你可运行的斜杠命令:{runnable_str}"
    # --- 技能 bundles（/bundles）---
    # Bundles 子系统不可用；{exc} 为异常文本。
    bundles_unavailable:
      en: "Bundles subsystem unavailable: {exc}"
      zh: "Bundles 子系统不可用:{exc}"
    # 尚未安装任何技能 bundle（多段隐式拼接的首段，换行为字面 \n）。
    bundles_none:
      en: "No skill bundles installed.\n"
      zh: "尚未安装任何技能 bundle。\n"
    # 创建 bundle 的引导（紧跟其后的命令行由调用点保留原文）。
    bundles_create_hint:
      en: "Create one on the host with:\n"
      zh: "请在宿主机用以下命令创建:\n"
    # bundle 目录前缀（其后 `{dir}` 由调用点保留）。
    bundles_directory:
      en: "Directory: `"
      zh: "目录:`"
    # --- 后台任务（background task）回包---
    # 后台任务因缺凭证失败；{task_id} 为任务标识。
    bgtask_failed_no_creds:
      en: "❌ Background task {task_id} failed: no provider credentials configured."
      zh: "❌ 后台任务 {task_id} 失败:未配置任何模型服务商凭证。"
    # 后台任务异常失败；{task_id} 为任务标识，{err} 为异常文本。
    bgtask_failed_err:
      en: "❌ Background task {task_id} failed: {err}"
      zh: "❌ 后台任务 {task_id} 失败:{err}"
    # 后台任务完成标题（其后 Prompt 行 / 输出由调用点保留原文）。
    bgtask_complete:
      en: "✅ Background task complete"
      zh: "✅ 后台任务完成"
    # 后台任务无回复生成（与 no_response_generated 文案不同）。
    bgtask_no_response:
      en: "(No response generated)"
      zh: "(未生成任何回复)"
    # --- 危险命令审批（/confirm；本部署 approvals=off 通常不触发，仍翻译兜底）---
    # 确认提示首段前缀（其后 `{command}**\n\n` 由调用点保留）。
    confirm_header:
      en: "⚠️ **Confirm /"
      zh: "⚠️ **确认 /"
    # 审批选项：仅本次放行。
    confirm_approve_once:
      en: "• **Approve Once** — proceed this time only"
      zh: "• **本次批准** —— 仅本次放行"
    # 审批选项：始终批准并永久静默提示。
    confirm_always:
      en: "• **Always Approve** — proceed and silence this prompt permanently"
      zh: "• **始终批准** —— 放行并永久不再提示"
    # 审批选项：取消、保持当前对话。
    confirm_cancel:
      en: "• **Cancel** — keep current conversation"
      zh: "• **取消** —— 保持当前对话不变"
    # 危险命令需要审批标题（其后命令预览代码块、Reason 行由调用点保留）。
    confirm_dangerous_header:
      en: "⚠️ **Dangerous command requires approval:**"
      zh: "⚠️ **危险命令需要审批:**"
    # 文本审批回复提示（源码两段 f-string 隐式拼接，整条合一）。
    confirm_reply_hint:
      en: "Reply `/approve` to execute, `/approve session` to approve this pattern for the session, `/approve always` to approve permanently, or `/deny` to cancel."
      zh: "回复 `/approve` 执行,`/approve session` 对本会话内该模式放行,`/approve always` 永久放行,或 `/deny` 取消。"
    # --- Hermes 自更新通知 ---
    # 更新完成（L15250 整条；L15442 作 f-string 前缀，输出代码块由调用点保留）。
    update_finished:
      en: "✅ Hermes update finished."
      zh: "✅ Hermes 更新已完成。"
    # 更新失败（带退出码）；{exit_code} 为进程退出码。
    update_failed_exit:
      en: "❌ Hermes update failed (exit code {exit_code})."
      zh: "❌ Hermes 更新失败(退出码 {exit_code})。"
    # 更新超过 30 分钟超时。
    update_timed_out:
      en: "❌ Hermes update timed out after 30 minutes."
      zh: "❌ Hermes 更新超过 30 分钟超时。"
    # 更新失败前缀（其后输出代码块由调用点保留，换行为字面 \n）。
    update_failed_output:
      en: "❌ Hermes update failed.\n\n"
      zh: "❌ Hermes 更新失败。\n\n"
    # 更新成功完成（无输出代码块时）。
    update_finished_ok:
      en: "✅ Hermes update finished successfully."
      zh: "✅ Hermes 更新成功完成。"
    # 更新失败、提示查日志或手动重试。
    update_failed_logs:
      en: "❌ Hermes update failed. Check the gateway logs or run `hermes update` manually for details."
      zh: "❌ Hermes 更新失败。详情见 gateway 日志,或手动运行 `hermes update` 查看。"
    # 网关重启成功、会话继续。
    gateway_restarted:
      en: "♻ Gateway restarted successfully. Your session continues."
      zh: "♻ 网关已成功重启,你的会话将继续。"
    # --- 代理模式（proxy mode）错误 ---
    # 代理模式缺 aiohttp 依赖。
    proxy_needs_aiohttp:
      en: "⚠️ Proxy mode requires aiohttp. Install with: pip install aiohttp"
      zh: "⚠️ 代理模式需要 aiohttp。请用 pip install aiohttp 安装。"
    # 未配置代理地址。
    proxy_url_missing:
      en: "⚠️ Proxy URL not configured (GATEWAY_PROXY_URL or gateway.proxy_url)"
      zh: "⚠️ 未配置代理地址(GATEWAY_PROXY_URL 或 gateway.proxy_url)"
    # 代理返回非 200 错误前缀（其后 `{status}): {error_text}` 由调用点保留）。
    proxy_error:
      en: "⚠️ Proxy error ("
      zh: "⚠️ 代理错误("
    # 代理连接错误前缀（其后 `{e}` 由调用点保留，保留行尾空格）。
    proxy_conn_error:
      en: "⚠️ Proxy connection error: "
      zh: "⚠️ 代理连接错误:"
    # 远端智能体无响应（proxy 兜底回包）。
    proxy_no_response:
      en: "(No response from remote agent)"
      zh: "(远端智能体无响应)"
    # --- run_agent 鉴权失败 / 通用错误（final_response 回包）---
    # 模型服务商鉴权失败前缀（其后 `{exc}` 异常文本由调用点保留）。
    provider_auth_failed_exc:
      en: "⚠️ Provider authentication failed: "
      zh: "⚠️ 模型服务商鉴权失败:"
    # 通用错误前缀（其后 `{error_type})` 由调用点保留，保留行尾左括号）。
    encountered_error:
      en: "Sorry, I encountered an error ("
      zh: "抱歉,我遇到了错误("
    # 请求被 API 拒绝（status_code==400 时追加，保留前导空格）。
    request_rejected_api:
      en: " The request was rejected by the API."
      zh: " 该请求被 API 拒绝。"
    # 无法加载配置前缀（其后 `{exc}` 异常文本由调用点保留）。
    config_load_failed:
      en: "❌ Could not load config: "
      zh: "❌ 无法加载配置:"
    # 上下文注入被拒绝（_ctx_result.warnings 为空时的兜底）。
    context_injection_refused:
      en: "Context injection refused."
      zh: "上下文注入被拒绝。"
    # --- 澄清提问送达失败 / 用户未响应 ---
    # 澄清提问无法送达（adapter 发送失败兜底哨兵）。
    clarify_not_delivered:
      en: "[clarify prompt could not be delivered]"
      zh: "[澄清提问无法送达]"
    # 用户未在超时时间内响应前缀（其后 `{int(timeout/60)}m]` 由调用点保留）。
    clarify_no_response:
      en: "[user did not respond within "
      zh: "[用户未在 "
    # --- 无活动超时提醒（源码四段 f-string 隐式拼接，整条合一）---
    # {elapsed_warn} 为已闲置分钟数，{remaining_mins} 为超时倒计时分钟数。
    inactivity_warning:
      en: "⚠️ No activity for {elapsed_warn} min. If the agent does not respond soon, it will be timed out in {remaining_mins} min. You can continue waiting or use /reset."
      zh: "⚠️ 已闲置 {elapsed_warn} 分钟。若仍无响应,超时倒计时 {remaining_mins} 分钟。你可以继续等待,或使用 /reset。"
    # --- 忙碌状态明细 status_parts（拼进 steer/queue/interrupt 与心跳）---
    # 已过 N 分钟；{elapsed_min} 为已运行分钟数。
    status_elapsed_min:
      en: "{elapsed_min} min elapsed"
      zh: "已过 {elapsed_min} 分钟"
    # 迭代进度；{iteration} 为已用迭代,{max_iter} 为最大迭代。
    status_iteration:
      en: "iteration {iteration}/{max_iter}"
      zh: "迭代 {iteration}/{max_iter}"
    # 正在运行的工具；{current_tool} 为当前工具名。
    status_running_tool:
      en: "running: {current_tool}"
      zh: "运行中: {current_tool}"
    # 迭代进度（心跳路径，下标取值在调用点）；{api} 为已用迭代,{max} 为最大迭代。
    status_iteration_api:
      en: "iteration {api}/{max}"
      zh: "迭代 {api}/{max}"
    # --- 忙时 steer / queue / interrupt 确认（源码两段 f-string 隐式拼接，整条合一）---
    # {status_detail} 为已拼好的忙碌明细尾段（可能为空），由调用点传入。
    busy_steered:
      en: "⏩ Steered into current run{status_detail}. Your message arrives after the next tool call."
      zh: "⏩ 已切入当前运行{status_detail}。你的消息将在下一次工具调用后送达。"
    busy_queued:
      en: "⏳ Queued for the next turn{status_detail}. I'll respond once the current task finishes."
      zh: "⏳ 已加入下一轮队列{status_detail}。当前任务完成后我会回复。"
    busy_interrupting:
      en: "⚡ Interrupting current task{status_detail}. I'll respond to your message shortly."
      zh: "⚡ 正在中断当前任务{status_detail}。我会尽快回复你的消息。"
    # --- Kanban 子任务通知（adapter.send，平台无关）---
    # {tag} 为前缀标签,{task_id} 为子任务标识（源码下标 sub['task_id'] 在调用点取值）。
    # 完成通知（源码两段 f-string 隐式拼接整条合一）；{title} 子任务标题,{handoff} 交接摘要。
    kanban_done:
      en: "✔ {tag}Kanban {task_id} done — {title}{handoff}"
      zh: "✔ {tag}看板 {task_id} 已完成 —— {title}{handoff}"
    # 受阻通知；{reason} 为受阻原因尾段。
    kanban_blocked:
      en: "⏸ {tag}Kanban {task_id} blocked{reason}"
      zh: "⏸ {tag}看板 {task_id} 受阻{reason}"
    # 放弃通知（源码两段 f-string 隐式拼接整条合一）；{err} 为错误尾段。
    kanban_gave_up:
      en: "✖ {tag}Kanban {task_id} gave up after repeated spawn failures{err}"
      zh: "✖ {tag}看板 {task_id} 已放弃(多次启动失败){err}"
    # worker 崩溃通知（源码两段 f-string 隐式拼接整条合一）。
    kanban_crashed:
      en: "✖ {tag}Kanban {task_id} worker crashed (pid gone); dispatcher will retry"
      zh: "✖ {tag}看板 {task_id} worker 崩溃 (进程已消失);调度器将重试"
    # 超时通知（源码两段 f-string 隐式拼接整条合一）；{limit} 为 max_runtime 秒数。
    kanban_timed_out:
      en: "⏱ {tag}Kanban {task_id} timed out (max_runtime={limit}s); will retry"
      zh: "⏱ {tag}看板 {task_id} 超时 (max_runtime={limit}s);将重试"
    # --- 语音消息无法转写（STT 未配置）---
    # 收到语音但无法转写（其后接 STT 未配置说明）。
    stt_received:
      en: "🎤 I received your voice message but can't transcribe it — "
      zh: "🎤 收到了你的语音消息,但无法转写 —— "
    # 未配置 STT 服务（换行为字面 \n）。
    stt_no_provider:
      en: "no speech-to-text provider is configured.\n\n"
      zh: "未配置语音转文字(STT)服务。\n\n"
    # 启用语音的安装提示前缀（其后 faster-whisper 安装命令变体由调用点保留原文）。
    stt_enable_install:
      en: "To enable voice: install faster-whisper "
      zh: "启用语音功能:安装 faster-whisper "
    # 设置 stt.enabled 提示（紧随安装命令变体之后）。
    stt_set_enabled:
      en: "and set `stt.enabled: true` in config.yaml, "
      zh: "并在 config.yaml 中设置 `stt.enabled: true`,"
    # 提示用 /restart 重启网关。
    stt_then_restart:
      en: "then /restart the gateway."
      zh: "然后用 /restart 重启网关。"
    # 完整配置说明指引（独立 += 追加，换行为字面 \n）。
    stt_setup_skill:
      en: "\n\nFor full setup instructions, type: `/skill hermes-agent-setup`"
      zh: "\n\n完整配置说明请输入:`/skill hermes-agent-setup`"
    # --- 会话自动重置通知（reset_reason 三分支文案 + 整段通知）---
    # 自动重置原因（suspended 分支，普通字面量）。
    reset_reason_suspended:
      en: "previous session was stopped or interrupted"
      zh: "上一会话已被停止或中断"
    # 自动重置原因（daily 分支；{at_hour} 由调用点 policy.at_hour 传入）。
    reset_reason_daily:
      en: "daily schedule at {at_hour}:00"
      zh: "每日定时 {at_hour}:00"
    # 自动重置原因（idle 分支；{duration} 由调用点拼装传入）。
    reset_reason_inactive:
      en: "inactive for {duration}"
      zh: "已闲置 {duration}"
    # 会话自动重置整段通知（4 段隐式拼接合为一条；{reason_text} 为上方原因文案）。
    session_auto_reset:
      en: "◐ Session automatically reset ({reason_text}). Conversation history cleared.\nUse /resume to browse and restore a previous session.\nAdjust reset timing in config.yaml under session_reset."
      zh: "◐ 会话已自动重置({reason_text})。对话历史已清空。\n使用 /resume 浏览并恢复此前的会话。\n可在 config.yaml 的 session_reset 下调整重置时机。"
    # --- 未设置 home channel 一次性提示（5 段隐式拼接合为一条）---
    # {platform_name} 由调用点 platform_name.title() 传入；{sethome_cmd} 由调用点传入。
    no_home_channel:
      en: "📬 No home channel is set for {platform_name}. A home channel is where Hermes delivers cron job results and cross-platform messages.\n\nType {sethome_cmd} to make this chat your home channel, or ignore to skip."
      zh: "📬 尚未为 {platform_name} 设置主频道。主频道是 Hermes 投递定时任务结果和跨平台消息的地方。\n\n输入 {sethome_cmd} 即可将本聊天设为主频道,或忽略以跳过。"
    # --- 推理过程展示 ---
    # 推理折叠省略行（{more} 由调用点 len(lines) - 15 传入）。
    reasoning_more_lines:
      en: "({more} more lines)_"
      zh: "(还有 {more} 行)_"
    # 推理过程标题。
    reasoning_header:
      en: "💭 **Reasoning:**"
      zh: "💭 **推理过程:**"
    # --- /model 会话信息（管理员诊断）---
    # 上下文长度来源提示（default 分支说明）。
    model_ctx_source_default:
      en: "default — set model.context_length in config to override"
      zh: "默认 —— 在 config 中设置 model.context_length 可覆盖"
    # 当前模型（{model} 由调用点传入）。
    model_info_model:
      en: "◆ Model: `{model}`"
      zh: "◆ 模型: `{model}`"
    # 当前服务商（{provider} 由调用点 provider or 'openrouter' 传入）。
    model_info_provider:
      en: "◆ Provider: {provider}"
      zh: "◆ 服务商: {provider}"
    # 上下文窗口（{ctx_display}/{ctx_source} 由调用点传入）。
    model_info_context:
      en: "◆ Context: {ctx_display} tokens ({ctx_source})"
      zh: "◆ 上下文: {ctx_display} tokens ({ctx_source})"
    # 自定义端点（{base_url} 由调用点传入）。
    model_info_endpoint:
      en: "◆ Endpoint: {base_url}"
      zh: "◆ 端点: {base_url}"
    # --- 非管理员斜杠访问提示 ---
    # 可运行命令清单前缀（与 /whoami 的 access_slash_you_can_run 文案不同，勿混）。
    nonadmin_you_can_run:
      en: "You can run: "
      zh: "你可以使用: "
    # 可运行命令清单后缀（提示查看完整列表）。
    nonadmin_whoami_full_list:
      en: ". Use /whoami for the full list."
      zh: "。使用 /whoami 查看完整列表。"
    # 非管理员无任何斜杠命令可用（3 段隐式拼接合为一条）。
    nonadmin_no_slash:
      en: "No slash commands are enabled for non-admins on this platform. Ask an admin to add you to allow_admin_from or to set user_allowed_commands."
      zh: "本平台未对非管理员启用任何斜杠命令。请联系管理员把你加入 allow_admin_from,或设置 user_allowed_commands。"
    # --- /platform 平台管理命令（list / pause / resume）---
    # 网关平台列表标题。
    platform_list_header:
      en: "**Gateway platforms**"
      zh: "**网关平台**"
    # 已连接平台（空）。
    platform_connected_none:
      en: "Connected: (none)"
      zh: "已连接: (无)"
    # 已连接平台前缀（{connected} 列表由调用点拼接）。
    platform_connected_prefix:
      en: "Connected: "
      zh: "已连接: "
    # 失败/暂停平台（空）。
    platform_failed_none:
      en: "Failed/paused: (none)"
      zh: "失败/暂停: (无)"
    # 列表项：某平台已暂停（{platform} 为 p.value；{reason} 暂停原因）。
    platform_list_paused:
      en: "  · {platform} — PAUSED ({reason}). Resume with `/platform resume {platform}`."
      zh: "  · {platform} —— 已暂停({reason})。用 `/platform resume {platform}` 恢复。"
    # 列表项：某平台重试中（{platform} 为 p.value；{attempts} 已尝试次数）。
    platform_list_retrying:
      en: "  · {platform} — retrying (attempt {attempts})"
      zh: "  · {platform} —— 重试中(第 {attempts} 次)"
    # 用法提示（pause/resume 缺少 name；{action} 当前子命令）。
    platform_usage_action:
      en: "Usage: /platform {action} <name>"
      zh: "用法:/platform {action} <name>"
    # 未知平台名（{target} 用户输入）。
    platform_unknown:
      en: "Unknown platform: {target}"
      zh: "未知平台:{target}"
    # pause：平台不在重试队列（2 段隐式拼接；{platform} 为 platform.value）。
    platform_pause_not_in_queue:
      en: "{platform} is not in the retry queue (it's either connected or not enabled)."
      zh: "{platform} 不在重试队列中(它要么已连接,要么未启用)。"
    # pause：平台已处于暂停（{platform} 为 platform.value）。
    platform_already_paused:
      en: "{platform} is already paused."
      zh: "{platform} 已处于暂停状态。"
    # pause：成功暂停（3 段隐式拼接；{platform} 为 platform.value）。
    platform_paused_ok:
      en: "✓ {platform} paused. Resume with `/platform resume {platform}` or `hermes gateway restart` to reset."
      zh: "✓ {platform} 已暂停。用 `/platform resume {platform}` 或 `hermes gateway restart` 重置以恢复。"
    # resume：平台不在重试队列、无可恢复（2 段隐式拼接；{platform} 为 platform.value）。
    platform_resume_not_in_queue:
      en: "{platform} is not in the retry queue — nothing to resume."
      zh: "{platform} 不在重试队列中 —— 无可恢复项。"
    # resume：平台已在重试、无需恢复（2 段隐式拼接；{platform} 为 platform.value）。
    platform_already_retrying:
      en: "{platform} is already retrying — no resume needed."
      zh: "{platform} 已在重试中 —— 无需恢复。"
    # resume：成功恢复（{platform} 为 platform.value）。
    platform_resumed_ok:
      en: "✓ {platform} resumed — retrying on next watcher tick."
      zh: "✓ {platform} 已恢复 —— 将在下次巡检时重试。"
    # /platform 总用法帮助（4 段隐式拼接，含字面 \n）。
    platform_usage_help:
      en: "Usage: /platform <list|pause|resume> [name]\n  /platform list — show platform status\n  /platform pause <name> — stop retrying a failing platform\n  /platform resume <name> — re-queue a paused platform"
      zh: "用法:/platform <list|pause|resume> [name]\n  /platform list —— 显示平台状态\n  /platform pause <name> —— 停止重试某个故障平台\n  /platform resume <name> —— 重新排队某个已暂停平台"
  base: {}
