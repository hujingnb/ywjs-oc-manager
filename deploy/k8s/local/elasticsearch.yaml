apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: ocm
spec:
  selector: { app: elasticsearch }
  ports:
    - port: 9200
      targetPort: 9200
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: ocm
spec:
  serviceName: elasticsearch
  replicas: 1
  selector: { matchLabels: { app: elasticsearch } }
  template:
    metadata:
      labels: { app: elasticsearch }
    spec:
      initContainers:
        # 数据目录换成固定 hostPath 后，节点以 root:root 0755 创建该目录；而 ES 以
        # uid 1000 运行且拒绝 root，无法写入（原 local-path provisioner 建的目录是 0777
        # 才能写）。用一次性 root 容器放开权限补上这一差异。busybox 走 docker.io（已配
        # daocloud 镜像源），与 ES 镜像同源可达。
        - name: fix-data-perms
          image: busybox:1.36
          command: ["sh", "-c", "chmod 0777 /usr/share/elasticsearch/data"]
          volumeMounts:
            - { name: data, mountPath: /usr/share/elasticsearch/data }
      containers:
        - name: elasticsearch
          # ywjs_public 未镜像 elasticsearch，走 docker.io（cluster 已配 daocloud 镜像源）
          image: elasticsearch:8.11.3
          env:
            - name: node.name
              value: elasticsearch
            - name: ELASTIC_PASSWORD
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: elastic-password } }
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "true"
            - name: xpack.security.http.ssl.enabled
              value: "false"
            - name: xpack.security.transport.ssl.enabled
              value: "false"
            - name: bootstrap.memory_lock
              value: "false"
            - name: cluster.routing.allocation.disk.watermark.low
              value: 5gb
            - name: cluster.routing.allocation.disk.watermark.high
              value: 3gb
            - name: cluster.routing.allocation.disk.watermark.flood_stage
              value: 2gb
            - name: ES_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
            - name: TZ
              value: Asia/Shanghai
          ports:
            - containerPort: 9200
          volumeMounts:
            - { name: data, mountPath: /usr/share/elasticsearch/data }
          # security 开启时 ES 对 / 返回 401，无认证 httpGet 探针会永远失败；
          # 改用 tcpSocket 探针（HTTP 端口可连即视为就绪，ragflow 用凭证连接）。
          readinessProbe:
            tcpSocket: { port: 9200 }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
      volumes:
        # 数据固定落宿主 .k3d-data/elasticsearch（映射到节点 /var/lib/rancher/k3s/storage）。
        # 改固定 hostPath 替代动态 PVC：目录名不随集群重建变化，local-down 后下次
        # local-up 复用同目录、索引数据不丢；清空用 make local-reset。写入权限由上方
        # fix-data-perms initContainer 放开。
        - name: data
          hostPath:
            path: /var/lib/rancher/k3s/storage/elasticsearch
            type: DirectoryOrCreate
