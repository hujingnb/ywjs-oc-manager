apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ocm
spec:
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: ocm
spec:
  serviceName: redis
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: crpi-nu3ibz4f07feyghi.cn-beijing.personal.cr.aliyuncs.com/ywjs_public/redis:7
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)", "--appendonly", "yes"]
          env:
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: redis-password } }
            - name: TZ
              value: Asia/Shanghai
          ports:
            - containerPort: 6379
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20
      volumes:
        # 数据固定落宿主 .k3d-data/redis（映射到节点 /var/lib/rancher/k3s/storage）。
        # 改固定 hostPath 替代动态 PVC：目录名不随集群重建变化，local-down 后下次
        # local-up 复用同目录、appendonly 数据不丢；清空用 make local-reset。redis 镜像
        # 以 root 运行 redis-server，可直接写入 root 属主的 hostPath，无需放权。
        - name: data
          hostPath:
            path: /var/lib/rancher/k3s/storage/redis
            type: DirectoryOrCreate
