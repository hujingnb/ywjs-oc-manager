apiVersion: v1
kind: Service
metadata:
  name: new-api
  namespace: ocm
spec:
  selector: { app: new-api }
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-api
  namespace: ocm
spec:
  replicas: 1
  selector: { matchLabels: { app: new-api } }
  template:
    metadata:
      labels: { app: new-api }
    spec:
      containers:
        - name: new-api
          # ywjs_public 未镜像 new-api，走 docker.io 的 calciumion/new-api（同 compose，cluster 已配 daocloud 镜像源）
          image: calciumion/new-api:latest
          args: ["--log-dir", "/app/logs"]
          env:
            # new-api 的 MySQL DSN 格式：user:pass@tcp(host:port)/dbname
            - name: SQL_DSN
              value: "ocm:ocm@tcp(mysql:3306)/new-api"
            - name: REDIS_CONN_STRING
              value: "redis://:ocm@redis:6379"
            - name: TZ
              value: Asia/Shanghai
            - name: ERROR_LOG_ENABLED
              value: "true"
            - name: BATCH_UPDATE_ENABLED
              value: "true"
            - name: NODE_NAME
              value: new-api-node-1
            - name: STREAMING_TIMEOUT
              value: "600"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet: { path: /api/status, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
