apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: ocm
spec:
  selector: { app: minio }
  ports:
    - { name: api, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: ocm
spec:
  serviceName: minio
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          # ywjs_public 未镜像 minio，走 docker.io 的 pgsty/minio（同 compose，cluster 已配 daocloud 镜像源）
          image: pgsty/minio:RELEASE.2026-03-25T00-00-00Z
          args: ["server", "--console-address", ":9001", "/data"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: minio-root-user } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: minio-root-password } }
            - name: TZ
              value: Asia/Shanghai
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 20
      volumes:
        # 数据固定落宿主 .k3d-data/minio（映射到节点 /var/lib/rancher/k3s/storage）。
        # 改固定 hostPath 替代动态 PVC：目录名不随集群重建变化，local-down 后下次
        # local-up 复用同目录、对象数据不丢；清空用 make local-reset。minio 以 root 运行，
        # 可直接写入 root 属主的 hostPath，无需放权。
        - name: data
          hostPath:
            path: /var/lib/rancher/k3s/storage/minio
            type: DirectoryOrCreate
