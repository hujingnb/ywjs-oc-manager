apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: ocm
spec:
  selector: { app: minio }
  ports:
    - { name: api, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: ocm
spec:
  serviceName: minio
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: crpi-nu3ibz4f07feyghi.cn-beijing.personal.cr.aliyuncs.com/ywjs_public/minio:RELEASE.2026-03-25T00-00-00Z
          args: ["server", "--console-address", ":9001", "/data"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: minio-root-user } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: minio-root-password } }
            - name: TZ
              value: Asia/Shanghai
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 20
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 5Gi } }
