apiVersion: v1
kind: Service
metadata:
  name: manager-web
  namespace: ocm
spec:
  selector: { app: manager-web }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager-web
  namespace: ocm
spec:
  replicas: 1
  selector: { matchLabels: { app: manager-web } }
  template:
    metadata:
      labels: { app: manager-web }
    spec:
      containers:
        - name: manager-web
          image: k3d-ocm-registry.localhost:5000/oc-manager-web:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 20
