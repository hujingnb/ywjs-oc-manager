# MySQL 8 初始化脚本：建 ocm/new-api/rag_flow 三库，并给 manager 的 ocm 用户授权。
# 通过挂载到 /docker-entrypoint-initdb.d/ 在首次初始化（数据目录为空）时执行一次。
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: ocm
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS `ocm` CHARACTER SET utf8mb4 COLLATE utf8mb4_0900_ai_ci;
    CREATE DATABASE IF NOT EXISTS `new-api` CHARACTER SET utf8mb4 COLLATE utf8mb4_0900_ai_ci;
    CREATE DATABASE IF NOT EXISTS `rag_flow` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE USER IF NOT EXISTS 'ocm'@'%' IDENTIFIED BY 'ocm';
    GRANT ALL PRIVILEGES ON `ocm`.* TO 'ocm'@'%';
    GRANT ALL PRIVILEGES ON `new-api`.* TO 'ocm'@'%';
    FLUSH PRIVILEGES;
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: ocm
spec:
  selector: { app: mysql }
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: ocm
spec:
  serviceName: mysql
  replicas: 1
  selector: { matchLabels: { app: mysql } }
  template:
    metadata:
      labels: { app: mysql }
    spec:
      containers:
        - name: mysql
          # ywjs_public 未镜像 mysql，走 docker.io（cluster 已配 daocloud 镜像源）
          image: mysql:8.0
          args:
            - "--character-set-server=utf8mb4"
            - "--collation-server=utf8mb4_0900_ai_ci"
            - "--default-authentication-plugin=mysql_native_password"
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: mysql-root-password } }
            - name: TZ
              value: Asia/Shanghai
          ports:
            - containerPort: 3306
          volumeMounts:
            - { name: data, mountPath: /var/lib/mysql }
            - { name: init, mountPath: /docker-entrypoint-initdb.d }
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h127.0.0.1 -uroot -p\"$MYSQL_ROOT_PASSWORD\" --silent"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: init
          configMap: { name: mysql-init }
        # 数据固定落宿主 .k3d-data/mysql（经 k3d --volume 映射到节点
        # /var/lib/rancher/k3s/storage）。不再用动态 PVC：local-path provisioner 的目录名
        # 含随机 PV uid，集群删除→重建后 uid 变化导致旧数据成孤儿、被判定丢失。改固定
        # hostPath 后目录名不变，local-down 删集群后下次 local-up 复用同目录、数据不丢；
        # 要彻底清空跑 make local-reset。mysql entrypoint 以 root 启动会自行 chown 数据目录，
        # 故无需额外放权。
        - name: data
          hostPath:
            path: /var/lib/rancher/k3s/storage/mysql
            type: DirectoryOrCreate
