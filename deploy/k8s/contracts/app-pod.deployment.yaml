# 契约样例（不 apply）：spec-A/B 运行时由 manager 渲染并 apply 到 oc-apps ns。
# 展示 app pod 的目标形态：单副本 + Recreate + hermes 主容器 + oc-ops 第二容器
#（spec-E）+ 共享 emptyDir + bootstrap/控制 token Secret。<APP_ID> 等为占位。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-<APP_ID>
  namespace: oc-apps
  labels:
    app: "<APP_ID>"
    app.kubernetes.io/part-of: oc-manager
spec:
  replicas: 1
  strategy:
    type: Recreate          # 先停旧再起新，保证同一 app 至多一个写者（避免 S3 脑裂）
  selector: { matchLabels: { app: "<APP_ID>" } }
  template:
    metadata:
      labels: { app: "<APP_ID>" }
    spec:
      imagePullSecrets:
        - name: acr-pull
      containers:
        # 主容器：Hermes runtime。镜像由助手版本 image_id 解析。
        - name: hermes
          image: "<HERMES_IMAGE_REF>"
          env:
            - name: HERMES_HOME
              value: /opt/data
          volumeMounts:
            - { name: data, mountPath: /opt/data }
        # 第二容器：oc-ops HTTP 服务（spec-E），基于 hermes 镜像构建、同版本标签。
        # manager 通过 per-app 控制 token 调它执行 oc-* 命令；替代旧 agent 的 pods/exec。
        - name: oc-ops
          image: "<OC_OPS_IMAGE_REF>"
          ports:
            - containerPort: 8080
          env:
            - name: OC_OPS_TOKEN
              valueFrom: { secretKeyRef: { name: app-<APP_ID>-token, key: control-token } }
          volumeMounts:
            - { name: data, mountPath: /opt/data }
      volumes:
        - name: data
          emptyDir: {}          # 零 PVC：工作区落 S3，pod 本地仅 emptyDir
---
# per-app 控制 token（manager↔pod 双向复用）。manifest(含 api_key) 不进此处，
# 由 manager bootstrap 端点内存渲染经认证通道交付，见设计 §7。
apiVersion: v1
kind: Secret
metadata:
  name: app-<APP_ID>-token
  namespace: oc-apps
type: Opaque
stringData:
  control-token: "<RANDOM_PER_APP_TOKEN>"
---
# AICC 契约样例（不 apply）：仅适用于 app_type='aicc'，由 manager 渲染并 apply 到 oc-aicc ns。
# AICC 是无状态运行时：oc-bootstrap 写入启动输入 manifest、persona、platform rule，随后由
# hermes + oc-ops 使用共享 emptyDir 启动；没有 S3 恢复或同步容器。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-<APP_ID>
  namespace: oc-aicc
  labels:
    app: "<APP_ID>"
    app.kubernetes.io/part-of: oc-manager
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector: { matchLabels: { app: "<APP_ID>" } }
  template:
    metadata:
      labels: { app: "<APP_ID>" }
    spec:
      imagePullSecrets:
        - name: acr-pull
      initContainers:
        # 只请求启动输入 manifest、persona、platform rule；响应不含 S3 credentials、
        # restore 文件或 skill，且只写入 oc-input。
        - name: oc-bootstrap
          image: "<OPS_IMAGE_REF>"
          command: ["oc-bootstrap"]
          env:
            - name: OC_CONTROL_TOKEN
              valueFrom: { secretKeyRef: { name: app-<APP_ID>-token, key: control-token } }
            - name: OC_BOOTSTRAP_URL
              value: "<OC_BOOTSTRAP_URL>"
          volumeMounts:
            - { name: oc-input, mountPath: /opt/oc-input }
      containers:
        - name: hermes
          image: "<AICC_HERMES_IMAGE_REF>"
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_KEY
              valueFrom: { secretKeyRef: { name: app-<APP_ID>-token, key: control-token } }
          volumeMounts:
            - { name: oc-input, mountPath: /opt/oc-input }
            - { name: data, mountPath: /opt/data }
        - name: oc-ops
          # 与 hermes 使用同一 AICC 镜像；ocops 包随该镜像版本发布，不能替换为独立镜像。
          image: "<AICC_HERMES_IMAGE_REF>"
          command: ["/usr/local/lib/hermes-agent/venv/bin/python", "-m", "uvicorn", "ocops.server:app", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
          env:
            - name: OC_OPS_TOKEN
              valueFrom: { secretKeyRef: { name: app-<APP_ID>-token, key: control-token } }
            - name: API_SERVER_KEY
              valueFrom: { secretKeyRef: { name: app-<APP_ID>-token, key: control-token } }
            - name: PYTHONPATH
              value: /usr/local/lib
          volumeMounts:
            - { name: data, mountPath: /opt/data }
      volumes:
        - name: oc-input
          emptyDir: {}          # bootstrap 启动输入仅在本次 Pod 生命周期内可见
        - name: data
          emptyDir: {}          # AICC 无状态运行时数据；不恢复到 S3，也不向 S3 同步
---
apiVersion: v1
kind: Secret
metadata:
  name: app-<APP_ID>-token
  namespace: oc-aicc
type: Opaque
stringData:
  control-token: "<RANDOM_PER_APP_TOKEN>"
