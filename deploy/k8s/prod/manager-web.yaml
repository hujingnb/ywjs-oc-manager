apiVersion: v1
kind: Service
metadata:
  name: manager-web
  namespace: ocm
spec:
  selector: { app: manager-web }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager-web
  namespace: ocm
spec:
  replicas: 2
  selector: { matchLabels: { app: manager-web } }
  template:
    metadata:
      labels: { app: manager-web }
    spec:
      imagePullSecrets:
        - name: acr-pull
      containers:
        - name: manager-web
          image: crpi-nu3ibz4f07feyghi.cn-beijing.personal.cr.aliyuncs.com/ywjs_app/oc-manager-web:REPLACE_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 20
