apiVersion: v1
kind: Service
metadata:
  name: manager-web
  namespace: ocm
spec:
  selector: { app: manager-web }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager-web
  namespace: ocm
spec:
  replicas: 2
  selector: { matchLabels: { app: manager-web } }
  template:
    metadata:
      labels: { app: manager-web }
    spec:
      imagePullSecrets:
        - name: secret-registry-ywjs-cc41758e.ecis.huabei-3.cmecloud.cn
      containers:
        - name: manager-web
          image: ywjs-cc41758e.ecis.huabei-3.cmecloud.cn/app/oc-manager-web:2026-06-01-18-35-24-97893d0a
          imagePullPolicy: IfNotPresent
          # 资源配额（起步值）：nginx 提供静态资源，极轻量。
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 20
