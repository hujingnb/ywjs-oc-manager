# manager-api 的 ServiceAccount。当前 server 代码尚未用 client-go，
# 预先创建并绑定 oc-apps 权限是 spec §7 的契约，供 spec-A/B 落地后直接生效。
apiVersion: v1
kind: ServiceAccount
metadata:
  name: manager-api
  namespace: ocm
---
# 对 oc-apps namespace 授予 app pod 编排所需权限；明确不含 pods/exec
# （hermes 命令走 oc-ops HTTP，见设计 §7）。
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: manager-app-orchestrator
  namespace: oc-apps
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: manager-app-orchestrator
  namespace: oc-apps
subjects:
  - kind: ServiceAccount
    name: manager-api
    namespace: ocm
roleRef:
  kind: Role
  name: manager-app-orchestrator
  apiGroup: rbac.authorization.k8s.io
