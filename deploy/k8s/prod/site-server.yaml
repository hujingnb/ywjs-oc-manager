# site-server：公网静态站点代理，部署在 oc-apps namespace，复用多 binary 镜像。
#
# 前置条件：在 oc-apps namespace 手动创建 Secret "site-server-secrets"，包含以下 key：
#   s3-access-key-id      — 对象存储访问密钥 ID
#   s3-secret-access-key  — 对象存储访问密钥
#   sync-token            — 与 manager 配置 web_publish.site_sync_token 保持一致的共享令牌
#
# 示例：
#   kubectl -n oc-apps create secret generic site-server-secrets \
#     --from-literal=s3-access-key-id=<值> \
#     --from-literal=s3-secret-access-key=<值> \
#     --from-literal=sync-token=<与 manager config 一致的值>
#
# 注意：镜像 tag 须与当次部署的 manager-api 镜像 tag 保持同步更新（同一 CI 产物）。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-server
  namespace: oc-apps
  labels:
    app: site-server
    app.kubernetes.io/part-of: oc-manager
spec:
  # 无状态服务，2 副本各自独立轮询 manager 注册表，可水平扩展
  replicas: 2
  selector:
    matchLabels:
      app: site-server
  template:
    metadata:
      labels:
        app: site-server
        app.kubernetes.io/part-of: oc-manager
    spec:
      # 从移动云私有仓库拉取镜像；该 Secret 须在 oc-apps namespace 预先创建
      imagePullSecrets:
        - name: secret-registry-ywjs-26257ea5.ecis.huabei-3.cmecloud.cn
      containers:
        - name: site-server
          # 与 manager-api 共用同一多 binary 镜像；生产部署时替换为当次实际 tag
          image: ywjs-26257ea5.ecis.huabei-3.cmecloud.cn/app/oc-manager-api:2026-06-03-18-35-28-0fd95da6
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/site-server"]
          ports:
            - containerPort: 80
          env:
            # site-server HTTP 监听地址；Service 对外暴露 80
            - name: SITE_SERVER_LISTEN
              value: ":80"
            # 生产对象存储端点：外部托管 S3 兼容服务，通过 secret.example.yaml 中
            # __FILL_S3_ENDPOINT__ 填写，此处引用 manager 同款凭证（按需替换为独立凭证）
            - name: S3_ENDPOINT
              value: "__FILL_S3_ENDPOINT__"
            - name: S3_REGION
              value: "us-east-1"
            # bucket 名与 manager storage.s3.bucket 一致
            - name: S3_BUCKET
              value: "__FILL_S3_BUCKET__"
            # 外部 S3 兼容服务视实际寻址方式而定；AWS/阿里云 OSS 虚拟主机寻址填 false
            - name: S3_USE_PATH_STYLE
              value: "true"
            # S3 凭证从 Secret 引用，避免明文落入 manifest
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: site-server-secrets
                  key: s3-access-key-id
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: site-server-secrets
                  key: s3-secret-access-key
            # 站点注册表同步端点：跨 namespace FQDN，manager-api Service 在 ocm namespace
            - name: MANAGER_SYNC_URL
              value: "http://manager-api.ocm.svc.cluster.local:8080/internal/web-publish/sites"
            # 同步令牌须与 manager 配置的 web_publish.site_sync_token 保持一致
            - name: MANAGER_SYNC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: site-server-secrets
                  key: sync-token
            # 轮询间隔（秒）；生产可适当放大减少 manager 压力
            - name: SYNC_INTERVAL_SECONDS
              value: "5"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            # site-server 为纯 TCP HTTP 服务，无专用 healthz 路由，用 tcpSocket 探活
            tcpSocket:
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: site-server
  namespace: oc-apps
  labels:
    app: site-server
spec:
  selector:
    app: site-server
  # Service 名 site-server / port 80 须与 Plan 2 通配 Ingress 后端配置对齐：
  #   site_server_service: site-server
  #   site_server_port: 80
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: site-server
  namespace: oc-apps
spec:
  podSelector:
    matchLabels:
      app: site-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 允许来自 ingress 控制器入站（生产可进一步收紧为 namespaceSelector 指向 ingress namespace）
    - {}
  egress:
    # DNS 解析（UDP + TCP 均允许，CoreDNS 默认 53）
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # 对象存储（生产外部 S3 兼容服务；HTTPS 443 或自建 HTTP 端口，按实际调整）
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 9000
    # manager-api 同步端点（8080）
    - ports:
        - protocol: TCP
          port: 8080
