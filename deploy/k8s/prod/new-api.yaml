apiVersion: v1
kind: Service
metadata:
  name: new-api
  namespace: ocm
spec:
  selector: { app: new-api }
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-api
  namespace: ocm
spec:
  replicas: 1
  selector: { matchLabels: { app: new-api } }
  template:
    metadata:
      labels: { app: new-api }
    spec:
      imagePullSecrets:
        - name: secret-registry-ywjs-26257ea5.ecis.huabei-3.cmecloud.cn
      containers:
        - name: new-api
          # 上游 new-api 镜像，转推到移动云私有仓库 public 命名空间
          image: ywjs-26257ea5.ecis.huabei-3.cmecloud.cn/public/oc-fast-mod:oc-v1.0.0-rc.10-d16bffca
          # 镜像 WORKDIR=/data 且无 /app；日志目录用 /data/logs（父目录存在）避免 mkdir 失败
          args: ["--log-dir", "/data/logs"]
          # 资源配额（起步值）：Go 服务 + LLM 代理转发。
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          env:
            # MySQL DSN / Redis 连接串统一来自 ocm-secrets，部署时只改 secret，无需改本文件。
            - name: SQL_DSN
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: new-api-sql-dsn } }
            - name: REDIS_CONN_STRING
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: new-api-redis-conn } }
            - name: TZ
              value: Asia/Shanghai
            - name: ERROR_LOG_ENABLED
              value: "true"
            - name: BATCH_UPDATE_ENABLED
              value: "true"
            - name: NODE_NAME
              value: new-api-node-1
            - name: STREAMING_TIMEOUT
              value: "600"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet: { path: /api/status, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
