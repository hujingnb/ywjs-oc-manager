# 生产 Secret 占位 —— 复制为 secret.yaml 后填真实值，切勿提交真值。
# 有状态后端（MySQL/Redis/ES/对象存储）由外部托管，这里只填连接信息。
#
# 待填项统一用 __FILL_*__ 前缀标记：复制后执行
#   grep -n '__FILL_' secret.yaml
# 即可列出所有还没替换的值；全部替换完、grep 无输出即填写完整。
# 未带该前缀的值（各类端口 3306/9200/6379、库名/db、默认用户名、各类 TTL 等）是合理默认，按需才改。
apiVersion: v1
kind: Secret
metadata:
  name: ocm-secrets
  namespace: ocm
type: Opaque
stringData:
  # manager-api 完整配置：把外部 MySQL/Redis、OSS、域名、master_key 填好。
  manager.yaml: |
    app:
      env: prod
      http_addr: ":8080"
      public_base_url: "https://__FILL_DOMAIN__"
      data_root: "/var/lib/oc-manager/data"
    logging:
      # 日志级别 debug/info/warn/error；生产默认 info，排故可临时调 debug 后改回。
      level: "info"
      # 输出格式 json（容器/ELK 可解析）| text（本地调试人眼友好）。
      format: "json"
      # SQL 慢查询阈值（毫秒）：单条查询耗时超过它即从 Debug 抬到 Warn，便于定位慢查询。
      slow_query_ms: 200
    database:
      url: "mysql://__FILL_OCM_DB_USER__:__FILL_OCM_DB_PASS__@tcp(__FILL_MYSQL_HOST__:3306)/ocm?parseTime=true&loc=UTC&charset=utf8mb4&multiStatements=true"
    redis:
      addr: "__FILL_REDIS_HOST__:6379"
      password: "__FILL_REDIS_PASSWORD__"
      db: 0
      key_prefix: "ocm:"
    auth:
      cookie_domain: "__FILL_DOMAIN__"
      access_token_ttl: "1h"
      refresh_token_ttl: "720h"
      jwt_access_secret: "__FILL_JWT_ACCESS_SECRET_32B__"
      jwt_refresh_secret: "__FILL_JWT_REFRESH_SECRET_32B__"
      csrf_secret: "__FILL_CSRF_SECRET_32B__"
    i18n:
      # 平台默认界面语言：用户未显式选择时的回退，也下发给登录页；缺省即 en，
      # 此处显式声明保持与代码默认一致、便于将来切换平台默认语言。
      default_locale: "en"
    security:
      master_key: "__FILL_MASTER_KEY_BASE64_32B__"
    captcha:
      # 登录 PoW 验证码。上线先 enabled:false 合代码，灰度时再开。
      # hmac_secret 填强随机值（openssl rand -base64 32），真实值只落 secret.yaml，
      # 该文件被 .gitignore，绝不入 git。
      enabled: false
      hmac_secret: "__FILL_CAPTCHA_HMAC_SECRET__"
      difficulty: 50000
      ttl: "5m"
    newapi:
      # 跨 namespace FQDN：此 base_url 经 bootstrap 写入 manifest.credentials.openai.base_url
      # 交付给 oc-apps 的 app pod，由 pod 内 hermes agent 调上游 LLM（new-api 代理）。短名
      # new-api:3000 只在 ocm 内解析，app pod 在 oc-apps 解析不到会 LLM 调用失败；FQDN 从
      # ocm/oc-apps 均可解析，对 manager 自身调用也无副作用。
      base_url: "http://new-api.ocm.svc.cluster.local:3000"
      admin_token: "__FILL_NEWAPI_ADMIN_TOKEN__"
      admin_user_id: 1
    ragflow:
      # 只由 manager（ocm）调用、不下发给 app pod，故短名 ragflow:9380 即可解析；
      # 这里仍用 FQDN，与其它集群内地址保持统一（FQDN 从任意 namespace 均可解析）。
      base_url: "http://ragflow.ocm.svc.cluster.local:9380"
      api_key: "__FILL_RAGFLOW_API_KEY__"
      request_timeout: "30s"
      chunk_method: "naive"
      default_embedding_model: "BAAI/bge-m3"
      embedding_models:
        - name: "BAAI/bge-m3"
          label: "BAAI/bge-m3"
          provider: "OpenAI-API-Compatible"
        - name: "netease-youdao/bce-embedding-base_v1"
          label: "netease-youdao/bce-embedding-base_v1"
          provider: "OpenAI-API-Compatible"
      # 解析异常自愈定时任务参数；整段可缺省，缺省即用下列内置默认。需调优时取消注释覆盖。
      # self_heal:
      #   interval: "10m"          # 任务运行间隔
      #   stuck_threshold: "30m"   # running 超过此时长判卡死，先 stop 再 reparse
      #   max_attempts: 3          # 单文档自愈次数上限，超限放弃
      #   batch_limit: 100         # 每轮 failed/stuck 各处理上限
    industry_knowledge:
      # 外部商业知识库上传接口固定鉴权字符串。生产必须使用强随机值，并提供给可信外部服务。
      upload_token: "__FILL_INDUSTRY_KNOWLEDGE_UPLOAD_TOKEN__"
    transfer_limit:
      # 单请求上传限速，单位字节/秒；524288 = 512KB/s，0 表示不限速。
      upload_bytes_per_sec: 524288
      # 单请求下载限速，单位字节/秒；多个并发请求会分别限速。
      download_bytes_per_sec: 524288
    hermes:
      # 跨 namespace FQDN：经 bootstrap 写入 manifest.knowledge.runtime_base_url，供 app pod 内
      # hermes（oc-kb）回调 manager 的 knowledge runtime API。短名 http://manager-api:8080 只在
      # ocm 内解析，oc-apps 解析不到；未设时 loader 兜底为短名，故生产须显式填 FQDN。
      manager_runtime_base_url: "http://manager-api.ocm.svc.cluster.local:8080"
      runtime_images:
        - id: "v2026.5.16"
          label: "Hermes v2026.5.16"
          ref: "ywjs-26257ea5.ecis.huabei-3.cmecloud.cn/app/oc-manager-hermes:v2026.5.16-2026-05-21-12-00-00"
      # 平台层系统人设已固化为代码常量 config.DefaultSystemPromptTemplate，
      # 不再由本配置提供；严格解码下请勿再添加 system_prompt_template。
      workspace:
        archive_retention_days: 14
    # —— k8s 编排（app pod 在 oc-apps；manager-api SA 经 manager-rbac 授权 oc-apps）——
    k8s:
      enabled: true
      namespace: "oc-apps"
      kubeconfig: ""
      # app pod 拉 hermes/ops 镜像所需的 imagePullSecret 名；该 Secret 由集群侧预先创建
      # 并存在于 oc-apps namespace（外部托管，不在本文件管理）。
      image_pull_secret: "secret-registry-ywjs-26257ea5.ecis.huabei-3.cmecloud.cn"
      # ops 运行时镜像（initContainer/sidecar），由 make build-ops-runtime 推送到移动云仓库。
      ops_image: "ywjs-26257ea5.ecis.huabei-3.cmecloud.cn/app/oc-manager-ops:__FILL_OPS_IMAGE_TAG__"
      # 跨 namespace：app pod（oc-apps）回调 manager-api（ocm）的 bootstrap，须用 FQDN。
      bootstrap_base_url: "http://manager-api.ocm.svc.cluster.local:8080"
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "2"
          memory: "2Gi"
      # pod_proxy：生产 app pod 有正常外网出口，留空不注入任何代理 env。若 app pod 无外网
      # 又需直连微信等外部服务，再按本地 secret 的写法填 http_proxy/https_proxy/no_proxy。
    # —— 对象存储 S3（spec-B：app pod 的 workspace/数据同步到 S3；标准 S3 协议，仅需对象读写）——
    # 注意：目标存储无需支持 STS AssumeRole。app pod 的 oc-ops sidecar 写回数据时直接复用下面这对
    # 长期凭证（manager 经 bootstrap 透传），不再签发 prefix 限定的临时凭证。取舍：sidecar 凭证拥有
    # 整个 bucket 的读写权限，per-app 隔离退化为 sidecar 只主动写自身 apps/<id>/ 前缀的「善意行为」。
    storage:
      s3:
        enabled: true
        # 外部对象存储端点（S3 兼容即可，无需 STS；不绑定 MinIO 私有扩展）。
        endpoint: "__FILL_S3_ENDPOINT__"
        # 区域：MinIO 等区域无关的可保留 us-east-1；AWS/云 OSS 改为实际区域。
        region: "us-east-1"
        bucket: "__FILL_S3_BUCKET__"
        # 长期凭证：既供 manager 自身读写，也经 bootstrap 直发给 app pod 的 sidecar 写回数据。
        access_key_id: "__FILL_S3_ACCESS_KEY_ID__"
        secret_access_key: "__FILL_S3_SECRET_ACCESS_KEY__"
        # MinIO/部分自建 S3 兼容需 true；AWS/阿里云 OSS 虚拟主机寻址用 false。
        use_path_style: true
        presign_ttl: "15m"
    # —— web-publish 静态站点发布：通配子域 + ACME 通配证书 + site-server 代理 ——
    # 注意：每个企业的 base_domain 与 DNS provider 凭证由平台管理员在「Web 发布配置」页按企业配置
    # （加密存 DB），不在此全局配置；这里只放平台级、跨企业共享的参数。
    web_publish:
      # ingress 控制器公网 IP：开通企业需把通配 A 记录 *.<base_domain> 指到它。
      ingress_public_ip: "__FILL_WEBPUBLISH_INGRESS_IP__"
      # 通配 Ingress 的 ingressClassName，跟随线上 ingress controller（如 nginx）。
      ingress_class_name: "__FILL_WEBPUBLISH_INGRESS_CLASS__"
      # ACME 账户邮箱（证书到期通知）。
      acme_email: "__FILL_WEBPUBLISH_ACME_EMAIL__"
      # ACME 目录：生产必须用 Let's Encrypt 生产目录，否则签出的是不被信任的 staging 证书。
      acme_directory_url: "https://acme-v02.api.letsencrypt.org/directory"
      # 通配 Ingress 后端 Service（site-server）名与端口，与 site-server.yaml 对齐，默认即可。
      site_server_service: "site-server"
      site_server_port: 80
      # 站点对象在对象存储中的顶层目录前缀（须以 / 结尾）：与 app 数据共用 bucket 时按目录隔离。
      # 默认 published-sites/；改这里即整体调整新站点的存储目录（site-server 按下发记录自动跟随）。
      s3_prefix: "published-sites/"
      # site-server 轮询同步端点的鉴权令牌，须与 site-server-secrets 的 sync-token 完全一致。
      site_sync_token: "__FILL_WEBPUBLISH_SYNC_TOKEN__"
      # 生产绝不能开自签证书开关（dev_self_signed_cert 默认 false，这里不设）。
  # ============================================================
  #  外部后端连接配置（new-api / ragflow）
  #  目标：部署时只改这个 secret，new-api.yaml / ragflow.yaml 不用动。
  # ============================================================
  # ── new-api：连外部 MySQL/Redis 的完整连接串（含账号口令）──
  #   MySQL DSN 格式 user:pass@tcp(host:port)/dbname；new-api 用独立的 new-api 库。
  #   Redis 连接串 redis://[:password@]host:port/db —— 末尾 /db 指定库号（省略即 db 0），
  #   new-api 用 go-redis ParseURL 解析该串、库号取自路径。若与其它服务共享同一 Redis 实例，
  #   与 manager（db 0）、ragflow（db 1）错开避免 key 冲突，这里示例给 db 2；用独立实例则随意。
  new-api-sql-dsn: "__FILL_NEWAPI_DB_USER__:__FILL_NEWAPI_DB_PASS__@tcp(__FILL_MYSQL_HOST__:3306)/new-api"
  new-api-redis-conn: "redis://:__FILL_REDIS_PASSWORD__@__FILL_REDIS_HOST__:6379/2"

  # ── ragflow：连外部 MySQL/S3/ES/Redis（拆散字段）──
  #  账号均为各自的专用普通账号，不要填 root / 超级管理员。
  #  MySQL：ragflow 用独立的 rag_flow 库，需预建库并只对该库授权（无需全局权限）：
  #    CREATE DATABASE rag_flow CHARACTER SET utf8mb4;
  #    CREATE USER 'ragflow'@'%' IDENTIFIED BY '<强密码>';
  #    GRANT ALL PRIVILEGES ON rag_flow.* TO 'ragflow'@'%';
  ragflow-mysql-host: "__FILL_MYSQL_HOST__"
  ragflow-mysql-port: "3306"
  ragflow-mysql-dbname: "rag_flow"
  ragflow-mysql-user: "ragflow"
  ragflow-mysql-password: "__FILL_RAGFLOW_MYSQL_PASSWORD__"
  #  对象存储 S3（标准 S3 协议、path 寻址；STORAGE_IMPL=AWS_S3 由 ragflow.yaml 注入）：
  #  ragflow 用独立 bucket（须预先建好），access key 仅对该 bucket 有读写权限即可，不要用超级管理员。
  #  endpoint-url 必须带 scheme（如 https://...）；region 按存储服务实际填。
  ragflow-s3-endpoint-url: "__FILL_RAGFLOW_S3_ENDPOINT_URL__"
  ragflow-s3-region: "__FILL_RAGFLOW_S3_REGION__"
  ragflow-s3-bucket: "__FILL_RAGFLOW_S3_BUCKET__"
  ragflow-s3-access-key: "__FILL_RAGFLOW_S3_ACCESS_KEY__"
  ragflow-s3-secret-key: "__FILL_RAGFLOW_S3_SECRET_KEY__"
  #  Elasticsearch：host/port/user 拆字段（默认端口 9200、用户名 elastic），password 填对应账号口令。
  ragflow-es-host: "__FILL_ES_HOST__"
  ragflow-es-port: "9200"
  ragflow-es-user: "elastic"
  elastic-password: "__FILL_ELASTIC_PASSWORD__"
  #  Redis：host/port/db/username 拆字段（ragflow 用 db 1，默认端口 6379；username 仅外部 Redis 启用 ACL 时填，否则留空），password 填对应账号口令。
  ragflow-redis-host: "__FILL_REDIS_HOST__"
  ragflow-redis-port: "6379"
  ragflow-redis-db: "1"
  ragflow-redis-username: ""
  redis-password: "__FILL_REDIS_PASSWORD__"
# 镜像拉取 Secret 不在本文件管理：移动云仓库的拉取凭证
# secret-registry-ywjs-26257ea5.ecis.huabei-3.cmecloud.cn 由集群侧预先创建，
# 并已存在于 ocm 与 oc-apps 两个 namespace（imagePullSecrets 是 namespace 级，
# 两处都需有，否则对应 namespace 的 pod ImagePullBackOff）。manifests 与
# manager.yaml 的 image_pull_secret 仅按名引用它。
---
# site-server 用的 Secret：S3 连接配置 + 同步令牌，全部收进 Secret，site-server.yaml 用
# secretKeyRef 引用，manifest 不内联任何 S3 信息。注意 namespace 是 oc-apps（site-server 部署处）。
apiVersion: v1
kind: Secret
metadata:
  name: site-server-secrets
  namespace: oc-apps
type: Opaque
stringData:
  # 与 manager storage.s3 同一套对象存储；endpoint/bucket 与 manager 配置保持一致。
  s3-endpoint: "__FILL_S3_ENDPOINT__"
  s3-region: "us-east-1"
  s3-bucket: "__FILL_S3_BUCKET__"
  # MinIO/部分自建 S3 兼容需 "true"；AWS/阿里云 OSS 虚拟主机寻址用 "false"。
  s3-use-path-style: "true"
  s3-access-key-id: "__FILL_S3_ACCESS_KEY_ID__"
  s3-secret-access-key: "__FILL_S3_SECRET_ACCESS_KEY__"
  # 须与 manager.yaml 的 web_publish.site_sync_token 完全一致，否则同步端点鉴权失败。
  sync-token: "__FILL_WEBPUBLISH_SYNC_TOKEN__"
