# 生产 Secret 占位 —— 复制为 secret.yaml 后填真实值，切勿提交真值。
# 有状态后端（MySQL/Redis/ES/对象存储）由外部托管，这里只填连接信息。
apiVersion: v1
kind: Secret
metadata:
  name: ocm-secrets
  namespace: ocm
type: Opaque
stringData:
  # manager-api 完整配置：把外部 MySQL/Redis、OSS、域名、master_key 填好。
  manager.yaml: |
    app:
      env: prod
      http_addr: ":8080"
      public_base_url: "https://REPLACE_WITH_DOMAIN"
      data_root: "/var/lib/oc-manager/data"
    database:
      url: "mysql://USER:PASS@tcp(EXTERNAL_MYSQL_HOST:3306)/ocm?parseTime=true&loc=UTC&charset=utf8mb4&multiStatements=true"
    redis:
      addr: "EXTERNAL_REDIS_HOST:6379"
      password: "REPLACE"
      db: 0
      key_prefix: "ocm:"
    auth:
      cookie_domain: "REPLACE_WITH_DOMAIN"
      access_token_ttl: "1h"
      refresh_token_ttl: "720h"
      jwt_access_secret: "REPLACE_WITH_32B_SECRET"
      jwt_refresh_secret: "REPLACE_WITH_32B_SECRET"
      csrf_secret: "REPLACE_WITH_32B_SECRET"
    security:
      master_key: "REPLACE_WITH_BASE64_32B_KEY"
    newapi:
      base_url: "http://new-api:3000"
      admin_token: "REPLACE"
      admin_user_id: 1
    ragflow:
      base_url: "http://ragflow:9380"
      api_key: "REPLACE_AFTER_RAGFLOW_PROVISION"
      request_timeout: "30s"
      chunk_method: "naive"
    hermes:
      runtime_images:
        - id: "v2026.5.16"
          label: "Hermes v2026.5.16"
          ref: "crpi-nu3ibz4f07feyghi.cn-beijing.personal.cr.aliyuncs.com/ywjs_app/oc-manager-hermes:v2026.5.16-2026-05-21-12-00-00"
      system_prompt_template: |
        ## 工作目录约定(重要)

        你的工作目录是 `/opt/data/workspace/`(绝对路径)。
        所有"创建文件 / 写文件 / 保存输出"的操作必须落在此目录,无论你用 terminal 工具
        还是文件写工具:
        - 优先使用绝对路径,如 `/opt/data/workspace/hello.txt`,而不是相对路径或 `~/hello.txt`;
        - 不要写到 `/root/`、`/tmp/` 或其他位置;
        - 若用 terminal 工具,执行命令前先 `cd /opt/data/workspace`;
        - 用户问"创建了什么"时,以该目录内的实际文件为准。
    
        这个目录通过宿主机映射,平台后台可以浏览 / 下载用户授权后的文件,放对位置才能交付。
      workspace:
        archive_retention_days: 14
      llm:
        base_url: "http://new-api:3000/v1"
        default_provider: "openai"
        default_model: "REPLACE"
    agent:
      heartbeat_interval_seconds: 30
    runtime:
      enrollment_secret: "REPLACE_WITH_BASE64_32B"
      probe:
        interval_seconds: 10
        timeout_seconds: 3
        failure_threshold: 1
        recovery_threshold: 1
  # ============================================================
  #  外部后端连接配置（new-api / ragflow）
  #  目标：部署时只改这个 secret，new-api.yaml / ragflow.yaml 不用动。
  # ============================================================
  # ── new-api：连外部 MySQL/Redis 的完整连接串（含账号口令）──
  #   DSN 格式 user:pass@tcp(host:port)/dbname；new-api 用独立的 new-api 库。
  new-api-sql-dsn: "USER:PASS@tcp(EXTERNAL_MYSQL_HOST:3306)/new-api"
  new-api-redis-conn: "redis://:PASS@EXTERNAL_REDIS_HOST:6379"

  # ── ragflow：连外部 MySQL/MinIO/ES/Redis（拆散字段）──
  #  账号均为各自的专用普通账号，不要填 root / 超级管理员。
  #  MySQL：ragflow 用独立的 rag_flow 库，需预建库并只对该库授权（无需全局权限）：
  #    CREATE DATABASE rag_flow CHARACTER SET utf8mb4;
  #    CREATE USER 'ragflow'@'%' IDENTIFIED BY '<强密码>';
  #    GRANT ALL PRIVILEGES ON rag_flow.* TO 'ragflow'@'%';
  ragflow-mysql-host: "EXTERNAL_MYSQL_HOST"
  ragflow-mysql-port: "3306"
  ragflow-mysql-dbname: "rag_flow"
  ragflow-mysql-user: "ragflow"
  ragflow-mysql-password: "REPLACE"
  #  MinIO：仅对 ragflow 使用的 bucket 有读写权限的专用 access key，不要用超级管理员。host 不带端口（容器内固定 :9000）。
  ragflow-minio-host: "EXTERNAL_MINIO_HOST"
  ragflow-minio-user: "REPLACE"
  ragflow-minio-password: "REPLACE"
  #  Elasticsearch / Redis：host 填地址（不带端口），密码填对应账号口令。
  ragflow-es-host: "EXTERNAL_ES_HOST"
  elastic-password: "REPLACE"
  ragflow-redis-host: "EXTERNAL_REDIS_HOST"
  redis-password: "REPLACE"
---
# 拉取 ACR 私有镜像的 imagePullSecret 占位。生成方式见 README。
apiVersion: v1
kind: Secret
metadata:
  name: acr-pull
  namespace: ocm
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {"auths":{"crpi-nu3ibz4f07feyghi.cn-beijing.personal.cr.aliyuncs.com":{"username":"REPLACE","password":"REPLACE","auth":"REPLACE_BASE64"}}}
