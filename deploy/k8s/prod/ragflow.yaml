# ragflow 的 service_conf 模板，挂到容器内由 ragflow 启动脚本用环境变量插值。
# 内容取自 deploy/ragflow/service_conf.yaml.template；本地指向集群内共享后端。
apiVersion: v1
kind: ConfigMap
metadata:
  name: ragflow-conf
  namespace: ocm
data:
  service_conf.yaml.template: |
    ragflow:
      host: ${RAGFLOW_HOST:-0.0.0.0}
      http_port: 9380
    admin:
      host: ${RAGFLOW_HOST:-0.0.0.0}
      http_port: 9381
    mysql:
      name: '${MYSQL_DBNAME:-rag_flow}'
      user: '${MYSQL_USER:-ragflow}'
      password: '${MYSQL_PASSWORD:-infini_rag_flow}'
      host: '${MYSQL_HOST:-mysql}'
      port: ${MYSQL_PORT:-3306}
      max_connections: 900
      stale_timeout: 300
      max_allowed_packet: ${MYSQL_MAX_PACKET:-1073741824}
    # 对象存储用标准 S3（非 MinIO）：STORAGE_IMPL=AWS_S3（见 Deployment env）选用本块。
    # bucket 设了值即走「单一固定桶 + 每个 KB id 作 key 前缀」（rag/utils/s3_conn.py 的
    # use_default_bucket/use_prefix_path），不再按 KB 动态建桶；桶须预先建好。
    s3:
      access_key: '${S3_ACCESS_KEY}'
      secret_key: '${S3_SECRET_KEY}'
      region: '${S3_REGION}'
      endpoint_url: '${S3_ENDPOINT_URL}'
      bucket: '${S3_BUCKET}'
      prefix_path: '${S3_PREFIX_PATH:-}'
      signature_version: 'v4'
      addressing_style: 'path'
    es:
      hosts: 'http://${ES_HOST:-elasticsearch}:${ES_PORT:-9200}'
      username: '${ES_USER:-elastic}'
      password: '${ELASTIC_PASSWORD:-infini_rag_flow}'
    redis:
      db: ${REDIS_DB:-1}
      username: '${REDIS_USERNAME:-}'
      password: '${REDIS_PASSWORD:-infini_rag_flow}'
      host: '${REDIS_HOST:-redis}:${REDIS_PORT:-6379}'
    user_default_llm:
      default_models:
        embedding_model:
          api_key: 'xxx'
          base_url: 'http://${TEI_HOST:-tei}:80'
    permission:
      switch: false
      component: false
      dataset: false
---
apiVersion: v1
kind: Service
metadata:
  name: ragflow
  namespace: ocm
spec:
  selector: { app: ragflow }
  ports:
    - { name: web, port: 80, targetPort: 80 }
    - { name: http-api, port: 9380, targetPort: 9380 }
    - { name: admin-api, port: 9381, targetPort: 9381 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragflow
  namespace: ocm
spec:
  replicas: 1
  selector: { matchLabels: { app: ragflow } }
  strategy: { type: Recreate }
  template:
    metadata:
      labels: { app: ragflow }
    spec:
      imagePullSecrets:
        - name: secret-registry-ywjs-26257ea5.ecis.huabei-3.cmecloud.cn
      containers:
        - name: ragflow
          # 上游 ragflow 镜像，转推到移动云私有仓库 public 命名空间
          image: ywjs-26257ea5.ecis.huabei-3.cmecloud.cn/public/ragflow:v0.25.6
          args: ["--enable-adminserver"]
          # 资源配额：RAGFlow 含 server + task_executor + DeepDOC/GraphRAG 解析，常态内存约 4Gi；
          # 生产已切到 8c32g 节点，request 提高到 6Gi，减少解析高峰期被 Evicted 的概率。
          resources:
            requests:
              cpu: "2"
              memory: "6Gi"
            limits:
              cpu: "4"
              memory: "10Gi"
          env:
            - name: DOC_ENGINE
              value: elasticsearch
            - name: DEVICE
              value: cpu
            # RAGFlow task_executor 默认最多并发 5 个解析任务；8Gi 节点内存余量有限，
            # 显式压到 1，避免多个小文件同时 OCR/DeepDOC/GraphRAG 时叠加出高内存峰值。
            - name: MAX_CONCURRENT_TASKS
              value: "2"
            # 所有外部后端连接信息（host/port/dbname/账号口令）统一来自 ocm-secrets，
            # 部署时只改 secret，无需改本文件。
            - name: ES_HOST
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-es-host } }
            - name: ES_PORT
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-es-port } }
            - name: ES_USER
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-es-user } }
            - name: ELASTIC_PASSWORD
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: elastic-password } }
            - name: MYSQL_HOST
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-mysql-host } }
            - name: MYSQL_PORT
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-mysql-port } }
            - name: MYSQL_DBNAME
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-mysql-dbname } }
            - name: MYSQL_USER
              # ragflow 专用普通账号，对 rag_flow 库有全部权限即可，不用 root。
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-mysql-user } }
            - name: MYSQL_PASSWORD
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-mysql-password } }
            - name: MYSQL_MAX_PACKET
              value: "1073741824"
            # 对象存储用标准 S3：STORAGE_IMPL=AWS_S3 + 独立 bucket + path 寻址，连接参数来自 secret。
            - name: STORAGE_IMPL
              value: AWS_S3
            - name: S3_ENDPOINT_URL
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-s3-endpoint-url } }
            - name: S3_REGION
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-s3-region } }
            - name: S3_BUCKET
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-s3-bucket } }
            - name: S3_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-s3-access-key } }
            - name: S3_SECRET_KEY
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-s3-secret-key } }
            # 单一固定桶下用 prefix 隔离对象 key：s3_conn.py 把 key 拼成
            # {prefix}/{kb_id}/{文件名}。不设则 key 仅为纯文件名、堆在桶根目录且不同知识库
            # 同名文件互相覆盖。设为 ragflow 后，各组织/应用知识库按 kb_id 自动分目录隔离。
            - name: S3_PREFIX_PATH
              value: ragflow
            # botocore≥1.36 默认对 PutObject 走 aws-chunked 流式 + CRC32 校验和 trailer、不带
            # Content-Length；移动云 EOS 不支持该方式，会返回 MissingContentLength 导致写对象失败
            # （表现为上传后 EOS 无文件、解析读不到）。改回 when_required 让普通写恢复 Content-Length。
            - name: AWS_REQUEST_CHECKSUM_CALCULATION
              value: when_required
            - name: AWS_RESPONSE_CHECKSUM_VALIDATION
              value: when_required
            - name: REDIS_HOST
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-redis-host } }
            - name: REDIS_PORT
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-redis-port } }
            - name: REDIS_DB
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-redis-db } }
            - name: REDIS_USERNAME
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: ragflow-redis-username } }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: ocm-secrets, key: redis-password } }
            - name: API_PROXY_SCHEME
              value: python
            - name: REGISTER_ENABLED
              value: "1"
            - name: TZ
              value: Asia/Shanghai
          ports:
            - containerPort: 80
            - containerPort: 9380
            - containerPort: 9381
          volumeMounts:
            - name: conf
              mountPath: /ragflow/conf/service_conf.yaml.template
              subPath: service_conf.yaml.template
              readOnly: true
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
      volumes:
        - name: conf
          configMap: { name: ragflow-conf }
