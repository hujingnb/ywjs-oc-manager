# 镜像预热 DaemonSet —— 不需要节点 SSH 的镜像缓存方案。
#
# 原理：DaemonSet 在每个（可调度的）节点各跑一个 pod，kubelet 为启动该 pod 必须先把它
# 引用的镜像拉到本节点。于是只要 apply 这个 DaemonSet，集群里每个 worker 节点就都会
# 预先拉好 app pod 要用的 hermes/ops 大镜像。容器用 sleep 常驻，镜像被 pod 持有、不会
# 被 kubelet 的镜像 GC 回收，后续新建 app pod 直接命中本节点缓存、无需现拉、秒起。
#
# 适用场景：节点到 ACR 拉镜像慢、且每次新建 app pod 可能调度到无缓存节点导致首次启动
# 等待数十分钟。预热后这一等待消除。
#
# 维护注意：hermes/ops 镜像每次发版 tag 会变。镜像升级后需把下面两个 image 同步更新为
# 新 tag（与 secret 的 hermes.runtime_images[].ref / k8s.ops_image 保持一致）再重新 apply，
# 否则预热的还是旧镜像、新 app pod 仍要现拉新镜像。
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: image-prepuller
  namespace: oc-apps
  labels:
    app: image-prepuller
spec:
  selector:
    matchLabels:
      app: image-prepuller
  template:
    metadata:
      labels:
        app: image-prepuller
    spec:
      # 私有 ACR 拉取凭证；oc-apps 内已存在同名 secret（见 secret.yaml 末尾）。
      imagePullSecrets:
        - name: acr-pull
      # 容器把镜像 entrypoint 覆盖成 sleep：只为把镜像拉到节点并常驻持有，不跑实际业务。
      # 两个容器分别持有 hermes / ops 镜像，sleep infinity 让 pod 长期 Running、镜像不被 GC。
      containers:
        - name: hermes
          image: crpi-nu3ibz4f07feyghi.cn-beijing.personal.cr.aliyuncs.com/ywjs_app/oc-manager-hermes:v2026.5.16-2026-05-31-20-46-58-40207c59-dirty
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
        - name: ops
          image: crpi-nu3ibz4f07feyghi.cn-beijing.personal.cr.aliyuncs.com/ywjs_app/oc-manager-ops:2026-05-31-21-09-32-b7ac999d
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
      # 预热 pod 无状态，删除时无需优雅等待。
      terminationGracePeriodSeconds: 1
