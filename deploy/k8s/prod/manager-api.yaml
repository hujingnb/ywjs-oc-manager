apiVersion: v1
kind: Service
metadata:
  name: manager-api
  namespace: ocm
spec:
  selector: { app: manager-api }
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager-api
  namespace: ocm
spec:
  replicas: 2
  selector: { matchLabels: { app: manager-api } }
  template:
    metadata:
      labels: { app: manager-api }
    spec:
      serviceAccountName: manager-api
      imagePullSecrets:
        - name: secret-registry-ywjs-26257ea5.ecis.huabei-3.cmecloud.cn
      containers:
        - name: manager-api
          image: ywjs-26257ea5.ecis.huabei-3.cmecloud.cn/app/oc-manager-api:2026-06-03-18-35-28-0fd95da6
          imagePullPolicy: IfNotPresent
          # 资源配额（起步值，按实际负载调整）：Go API 服务，较轻量。
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          env:
            - name: OCM_CONFIG
              value: /etc/manager/config.yaml
            - name: TZ
              value: Asia/Shanghai
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/manager
              readOnly: true
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          secret:
            secretName: ocm-secrets
            items:
              - { key: manager.yaml, path: config.yaml }
