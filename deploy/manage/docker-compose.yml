# Manager 生产部署包：包含 manager-api、manager-web、nginx、PostgreSQL 和 Redis。
# 本文件设计为可独立复制到 manager 服务器后直接启动完整管理面。

# 所有容器都注入 host.docker.internal，用于访问宿主机上的 registry、代理、
# 监控端口或其他未加入 Compose 网络的本机服务。
x-host-gateway: &host-gateway
  - "host.docker.internal:host-gateway"

services:
  # manager 专用 PostgreSQL。业务数据持久化在 ./data/postgres。
  manager-postgres:
    image: ${MANAGER_POSTGRES_IMAGE}
    restart: always
    extra_hosts: *host-gateway
    environment:
      POSTGRES_USER: ${MANAGER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MANAGER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${MANAGER_POSTGRES_DB}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${MANAGER_POSTGRES_USER}", "-d", "${MANAGER_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - manager-internal

  # manager 专用 Redis。用于缓存和异步任务状态，启用 AOF 以降低异常退出丢失风险。
  manager-redis:
    image: ${MANAGER_REDIS_IMAGE}
    restart: always
    extra_hosts: *host-gateway
    environment:
      REDISCLI_AUTH: ${MANAGER_REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${MANAGER_REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - manager-internal

  # manager-api 提供管理 API，并挂载 Docker socket 以执行镜像同步等宿主 Docker 操作。
  manager-api:
    image: ${OCM_MANAGER_IMAGE}
    restart: always
    extra_hosts: *host-gateway
    environment:
      OCM_CONFIG: /etc/manager/config.yaml
      TZ: ${TZ:-Asia/Shanghai}
    depends_on:
      manager-postgres:
        condition: service_healthy
      manager-redis:
        condition: service_healthy
    volumes:
      - ./config/manager.yaml:/etc/manager/config.yaml:ro
      - ./data/manager:/var/lib/oc-manager/data
      - ./data/knowledge:/var/lib/oc-manager/knowledge
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - manager-internal

  # manager-web 提供前端静态资源，由 nginx 统一反向代理。
  manager-web:
    image: ${OCM_WEB_IMAGE}
    restart: always
    extra_hosts: *host-gateway
    networks:
      - manager-internal

  # nginx 终止 TLS，并把 /api/* 转发到 manager-api，其余请求转发到 manager-web。
  manager-nginx:
    image: ${MANAGER_NGINX_IMAGE}
    restart: always
    extra_hosts: *host-gateway
    ports:
      - "${MANAGER_HTTP_PORT:-80}:80"
      - "${MANAGER_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./tls:/etc/nginx/tls:ro
    depends_on:
      manager-api:
        condition: service_healthy
      manager-web:
        condition: service_started
    networks:
      - manager-internal
      - manager-public

networks:
  # 内部网络承载 manager 组件与数据库、Redis 之间的通信。
  manager-internal:
    driver: bridge
  # 公共网络用于 nginx 绑定宿主 HTTP/HTTPS 端口。
  manager-public:
    driver: bridge
