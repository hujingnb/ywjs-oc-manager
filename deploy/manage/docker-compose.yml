services:
  manager-postgres:
    image: ${MANAGER_POSTGRES_IMAGE}
    restart: always
    environment:
      POSTGRES_USER: ${MANAGER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MANAGER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${MANAGER_POSTGRES_DB}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${MANAGER_POSTGRES_USER}", "-d", "${MANAGER_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - manager-internal

  manager-redis:
    image: ${MANAGER_REDIS_IMAGE}
    restart: always
    environment:
      REDISCLI_AUTH: ${MANAGER_REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${MANAGER_REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - manager-internal

  manager-api:
    image: ${OCM_MANAGER_IMAGE}
    restart: always
    environment:
      OCM_CONFIG: /etc/manager/config.yaml
      TZ: ${TZ:-Asia/Shanghai}
    depends_on:
      manager-postgres:
        condition: service_healthy
      manager-redis:
        condition: service_healthy
    volumes:
      - ./config/manager.yaml:/etc/manager/config.yaml:ro
      - ./data/manager:/var/lib/oc-manager/data
      - ./data/knowledge:/var/lib/oc-manager/knowledge
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - manager-internal

  manager-web:
    image: ${OCM_WEB_IMAGE}
    restart: always
    networks:
      - manager-internal

  manager-nginx:
    image: ${MANAGER_NGINX_IMAGE}
    restart: always
    ports:
      - "${MANAGER_HTTP_PORT:-80}:80"
      - "${MANAGER_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./tls:/etc/nginx/tls:ro
    depends_on:
      manager-api:
        condition: service_healthy
      manager-web:
        condition: service_started
    networks:
      - manager-internal
      - manager-public

networks:
  manager-internal:
    driver: bridge
  manager-public:
    driver: bridge
