# RAGFlow 生产部署包：独立启动 RAGFlow 及其 MySQL、Redis/Valkey、MinIO、Elasticsearch 依赖。
# manager 不加入该 Compose 网络，通过宿主机暴露的 RAGFlow HTTP API 访问。

services:
  # RAGFlow MySQL，保存 RAGFlow 自身账号、dataset 与任务元数据。
  ragflow-mysql:
    image: ${RAGFLOW_MYSQL_IMAGE}
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${RAGFLOW_MYSQL_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --max_connections=1000
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --tls_version=TLSv1.2,TLSv1.3
      - --init-file
      - /data/application/init.sql
      - --binlog_expire_logs_seconds=604800
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./init.sql:/data/application/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${RAGFLOW_MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 120
    networks:
      - ragflow-internal

  # RAGFlow Redis/Valkey，仅供 RAGFlow 内部队列和缓存使用。
  ragflow-redis:
    image: ${RAGFLOW_REDIS_IMAGE}
    restart: always
    command: ["redis-server", "--requirepass", "${RAGFLOW_REDIS_PASSWORD}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${RAGFLOW_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 120
    networks:
      - ragflow-internal

  # RAGFlow MinIO，保存上传到 RAGFlow 的原始文件与解析中间产物。
  ragflow-minio:
    image: ${RAGFLOW_MINIO_IMAGE}
    restart: always
    command: ["server", "--console-address", ":9001", "/data"]
    environment:
      MINIO_ROOT_USER: ${RAGFLOW_MINIO_USER}
      MINIO_ROOT_PASSWORD: ${RAGFLOW_MINIO_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 120
    networks:
      - ragflow-internal

  # RAGFlow Elasticsearch，作为默认向量/全文检索后端。
  ragflow-es:
    image: ${RAGFLOW_ELASTICSEARCH_IMAGE}
    restart: always
    environment:
      node.name: ragflow-es
      ELASTIC_PASSWORD: ${RAGFLOW_ELASTIC_PASSWORD}
      bootstrap.memory_lock: "false"
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      cluster.routing.allocation.disk.watermark.low: 5gb
      cluster.routing.allocation.disk.watermark.high: 3gb
      cluster.routing.allocation.disk.watermark.flood_stage: 2gb
      TZ: ${TZ:-Asia/Shanghai}
    mem_limit: ${RAGFLOW_MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 120
    networks:
      - ragflow-internal

  # RAGFlow 主服务。模型供应商由管理员在 RAGFlow 控制台配置 existing new-api + DeepSeek。
  ragflow:
    image: ${RAGFLOW_IMAGE}
    restart: always
    command:
      - --enable-adminserver
    environment:
      DOC_ENGINE: elasticsearch
      DEVICE: cpu
      STACK_VERSION: ${RAGFLOW_STACK_VERSION}
      ES_HOST: ragflow-es
      ELASTIC_PASSWORD: ${RAGFLOW_ELASTIC_PASSWORD}
      MYSQL_HOST: ragflow-mysql
      MYSQL_PORT: 3306
      MYSQL_DBNAME: rag_flow
      MYSQL_PASSWORD: ${RAGFLOW_MYSQL_PASSWORD}
      MYSQL_MAX_PACKET: 1073741824
      MINIO_HOST: ragflow-minio
      MINIO_USER: ${RAGFLOW_MINIO_USER}
      MINIO_PASSWORD: ${RAGFLOW_MINIO_PASSWORD}
      REDIS_HOST: ragflow-redis
      REDIS_PASSWORD: ${RAGFLOW_REDIS_PASSWORD}
      API_PROXY_SCHEME: python
      REGISTER_ENABLED: ${RAGFLOW_REGISTER_ENABLED}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${RAGFLOW_WEB_BIND:-127.0.0.1}:${RAGFLOW_WEB_HTTP_PORT}:80"
      - "${RAGFLOW_HTTP_BIND:-127.0.0.1}:${RAGFLOW_HTTP_PORT}:9380"
      - "${RAGFLOW_ADMIN_BIND:-127.0.0.1}:${RAGFLOW_ADMIN_HTTP_PORT}:9381"
    volumes:
      - ./logs:/ragflow/logs
      - ./service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template:ro
    depends_on:
      ragflow-mysql:
        condition: service_healthy
      ragflow-redis:
        condition: service_healthy
      ragflow-minio:
        condition: service_healthy
      ragflow-es:
        condition: service_healthy
    networks:
      - ragflow-internal

networks:
  # RAGFlow 独立网络只承载 RAGFlow 组件内部通信，manager 通过宿主机端口访问。
  ragflow-internal:
    driver: bridge
