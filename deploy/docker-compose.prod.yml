# 生产环境 docker compose 样例。
#
# 与 dev 版的差异：
#   - 应用镜像通过 OCM_MANAGER_IMAGE / OCM_WEB_IMAGE 环境变量传入预构建镜像，不挂源码；
#   - 数据库 / Redis / new-api / ollama 假设由独立基础设施提供，本文件仅运行 manager 进程；
#   - 敏感字段直接落入 yaml；yaml 由受控运维流程外部生成并挂载，不进 git；
#   - manager-api 容器对外仅暴露 :8080 给 nginx，不直接对外；
#   - 健康检查 + restart 策略 + 资源限额 + 只读 root filesystem。
#
# 启动：
#   docker compose -f deploy/docker-compose.prod.yml up -d

services:
  manager-api:
    image: ${OCM_MANAGER_IMAGE}
    restart: always
    environment:
      OCM_CONFIG: /etc/manager/config.yaml
    volumes:
      - ./config/manager.yaml:/etc/manager/config.yaml:ro
      - manager-knowledge:/var/lib/oc-manager/knowledge
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - manager-internal

  manager-web:
    image: ${OCM_WEB_IMAGE}
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - manager-internal

  manager-nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/tls:/etc/nginx/tls:ro
    depends_on:
      manager-api:
        condition: service_healthy
      manager-web:
        condition: service_started
    networks:
      - manager-internal
      - manager-public

volumes:
  manager-knowledge:

networks:
  manager-internal:
    driver: bridge
  manager-public:
    driver: bridge
