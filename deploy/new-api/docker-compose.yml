# new-api 生产部署包：包含 new-api、PostgreSQL、Redis 和本地 bind mount 数据目录。
# 本文件设计为可独立复制到 new-api 服务器后直接执行 `docker compose up -d`。

# 所有容器都需要能通过 host.docker.internal 访问宿主机服务，例如宿主反代、
# 调试代理或仅绑定在宿主回环地址上的运维组件。
x-host-gateway: &host-gateway
  - "host.docker.internal:host-gateway"

services:
  # new-api 专用 PostgreSQL。数据持久化在 ./data/postgres，便于单目录迁移和备份。
  new-api-postgres:
    image: ${NEWAPI_POSTGRES_IMAGE}
    restart: always
    extra_hosts: *host-gateway
    environment:
      POSTGRES_USER: ${NEWAPI_POSTGRES_USER}
      POSTGRES_PASSWORD: ${NEWAPI_POSTGRES_PASSWORD}
      POSTGRES_DB: ${NEWAPI_POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${NEWAPI_POSTGRES_USER}", "-d", "${NEWAPI_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - new-api-internal

  # new-api 专用 Redis。启用 AOF，密码由 .env 注入，健康检查复用 REDISCLI_AUTH。
  new-api-redis:
    image: ${NEWAPI_REDIS_IMAGE}
    restart: always
    extra_hosts: *host-gateway
    environment:
      REDISCLI_AUTH: ${NEWAPI_REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${NEWAPI_REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDISCLI_AUTH} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - new-api-internal

  # new-api 主服务。仅暴露 HTTP 端口，数据库和 Redis 通过内部 Docker 网络访问。
  new-api:
    image: ${NEWAPI_IMAGE}
    restart: always
    extra_hosts: *host-gateway
    command: --log-dir /app/logs
    ports:
      - "${NEWAPI_PORT:-3000}:3000"
    environment:
      SQL_DSN: postgresql://${NEWAPI_POSTGRES_USER}:${NEWAPI_POSTGRES_DSN_PASSWORD}@new-api-postgres:5432/${NEWAPI_POSTGRES_DB}
      REDIS_CONN_STRING: redis://:${NEWAPI_REDIS_URL_PASSWORD}@new-api-redis:6379
      TZ: ${TZ:-Asia/Shanghai}
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
      NODE_NAME: ${NEWAPI_NODE_NAME:-new-api-prod-1}
      STREAMING_TIMEOUT: ${NEWAPI_STREAMING_TIMEOUT:-600}
    depends_on:
      new-api-postgres:
        condition: service_healthy
      new-api-redis:
        condition: service_healthy
    volumes:
      - ./data/new-api:/data
      - ./logs:/app/logs
    networks:
      - new-api-internal
      - new-api-public

networks:
  # 内部网络只承载 new-api 与依赖组件之间的通信。
  new-api-internal:
    driver: bridge
  # 公共网络用于绑定宿主端口，方便外部反代或直接访问 new-api。
  new-api-public:
    driver: bridge
