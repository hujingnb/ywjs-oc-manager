version: "2"
sql:
  - engine: mysql
    schema:
      - internal/migrations/000001_baseline.up.sql
      - internal/migrations/000002_apps_runtime_node_nullable.up.sql
      - internal/migrations/000003_drop_node_concept.up.sql
      - internal/migrations/000004_org_max_instance_count.up.sql
    queries: internal/store/queries
    gen:
      go:
        package: sqlc
        out: internal/store/sqlc
        emit_json_tags: true
        emit_db_tags: true
        emit_empty_slices: true
        emit_interface: true
        overrides:
          # UUID 列存 CHAR(36)，Go 侧用 string（应用层生成）
          - db_type: "char"
            go_type: "string"
          - db_type: "char"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v5"
              package: "null"
              type: "String"
          # 可空文本
          - db_type: "varchar"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v5"
              package: "null"
              type: "String"
          - db_type: "text"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v5"
              package: "null"
              type: "String"
          # 可空时间
          - db_type: "datetime"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v5"
              package: "null"
              type: "Time"
          # 可空整数
          - db_type: "bigint"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v5"
              package: "null"
              type: "Int"
          - db_type: "int"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v5"
              package: "null"
              type: "Int"
          # 可空浮点（资源采样 cpu_percent 等）
          - db_type: "double"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v5"
              package: "null"
              type: "Float"
          # 可空 JSON：json.RawMessage（默认）无法扫描 SQL NULL，可空列改用 []byte
          #（NULL→nil 切片，写 nil→NULL），与 json.RawMessage 互相可赋值，不影响 service 用法。
          - db_type: "json"
            nullable: true
            go_type:
              type: "byte"
              slice: true
