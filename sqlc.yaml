version: "2"
sql:
  - engine: postgresql
    schema:
      - internal/migrations/000001_init.up.sql
      - internal/migrations/000002_core_schema.up.sql
      - internal/migrations/000003_agent_token_ciphertext.up.sql
      - internal/migrations/000004_knowledge_sync_status.up.sql
      - internal/migrations/000005_apps_runtime_snapshot.up.sql
      - internal/migrations/000006_apps_restart_policy.up.sql
      - internal/migrations/000007_runtime_nodes_max_apps.up.sql
      - internal/migrations/000008_organizations_newapi_credentials.up.sql
    queries: internal/store/queries
    gen:
      go:
        package: sqlc
        out: internal/store/sqlc
        sql_package: pgx/v5
        emit_json_tags: true
        emit_db_tags: true
        emit_empty_slices: true
        emit_interface: true
