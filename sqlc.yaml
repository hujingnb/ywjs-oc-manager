version: "2"
sql:
  - engine: postgresql
    schema:
      - migrations/000001_init.up.sql
      - migrations/000002_core_schema.up.sql
      - migrations/000003_agent_token_ciphertext.up.sql
      - migrations/000004_knowledge_sync_status.up.sql
    queries: internal/store/queries
    gen:
      go:
        package: sqlc
        out: internal/store/sqlc
        sql_package: pgx/v5
        emit_json_tags: true
        emit_db_tags: true
        emit_empty_slices: true
        emit_interface: true
