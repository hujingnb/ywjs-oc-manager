version: "2"
sql:
  - engine: mysql
    schema:
      - internal/migrations/000001_baseline.up.sql
      - internal/migrations/000002_apps_runtime_node_nullable.up.sql
      - internal/migrations/000003_drop_node_concept.up.sql
      - internal/migrations/000004_org_max_instance_count.up.sql
      - internal/migrations/000005_knowledge_quota.up.sql
      - internal/migrations/000006_skill_library.up.sql
      - internal/migrations/000007_industry_knowledge.up.sql
      - internal/migrations/000008_ragflow_auto_reparse.up.sql
      - internal/migrations/000009_drop_ragflow_auto_reparse.up.sql
      - internal/migrations/000010_custom_skill.up.sql
      - internal/migrations/000011_skill_ticket_messages.up.sql
      - internal/migrations/000012_skill_ticket_title_only.up.sql
      - internal/migrations/000013_users_locale.up.sql
      - internal/migrations/000014_apps_locale.up.sql
      - internal/migrations/000015_support_feishu_channel.up.sql
      - internal/migrations/000016_apps_restarting_status.up.sql
      - internal/migrations/000017_support_work_wechat_channel.up.sql
      - internal/migrations/000018_conversation_files.up.sql
      - internal/migrations/000019_apps_runtime_phase.up.sql
      - internal/migrations/000020_support_dingtalk_channel.up.sql
      - internal/migrations/000021_org_web_publish_config.up.sql
      - internal/migrations/000022_published_sites.up.sql
      - internal/migrations/000025_apps_web_publish_applied.up.sql
      - internal/migrations/000026_org_default_app_kb_quota.up.sql
      - internal/migrations/000027_apps_platform_prompt_hash.up.sql
    queries: internal/store/queries
    gen:
      go:
        package: sqlc
        out: internal/store/sqlc
        emit_json_tags: true
        emit_db_tags: true
        emit_empty_slices: true
        emit_interface: true
        overrides:
          # UUID 列存 CHAR(36)，Go 侧用 string（应用层生成）
          - db_type: "char"
            go_type: "string"
          - db_type: "char"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v5"
              package: "null"
              type: "String"
          # 可空文本
          - db_type: "varchar"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v5"
              package: "null"
              type: "String"
          - db_type: "text"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v5"
              package: "null"
              type: "String"
          # 可空时间
          - db_type: "datetime"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v5"
              package: "null"
              type: "Time"
          # 可空整数
          - db_type: "bigint"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v5"
              package: "null"
              type: "Int"
          - db_type: "int"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v5"
              package: "null"
              type: "Int"
          # 可空浮点（资源采样 cpu_percent 等）
          - db_type: "double"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v5"
              package: "null"
              type: "Float"
          # 可空 JSON：json.RawMessage（默认）无法扫描 SQL NULL，可空列改用 []byte
          #（NULL→nil 切片，写 nil→NULL），与 json.RawMessage 互相可赋值，不影响 service 用法。
          - db_type: "json"
            nullable: true
            go_type:
              type: "byte"
              slice: true
