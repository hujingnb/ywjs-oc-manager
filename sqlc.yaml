version: "2"
sql:
  - engine: mysql
    schema:
      - internal/migrations/000001_baseline.up.sql
    queries: internal/store/queries
    gen:
      go:
        package: sqlc
        out: internal/store/sqlc
        emit_json_tags: true
        emit_db_tags: true
        emit_empty_slices: true
        emit_interface: true
        overrides:
          # UUID 列存 CHAR(36)，Go 侧用 string（应用层生成）
          - db_type: "char"
            go_type: "string"
          - db_type: "char"
            nullable: true
            go_type: "github.com/guregu/null/v5.String"
          # 可空文本
          - db_type: "varchar"
            nullable: true
            go_type: "github.com/guregu/null/v5.String"
          - db_type: "text"
            nullable: true
            go_type: "github.com/guregu/null/v5.String"
          # 可空时间
          - db_type: "datetime"
            nullable: true
            go_type: "github.com/guregu/null/v5.Time"
          # 可空整数
          - db_type: "bigint"
            nullable: true
            go_type: "github.com/guregu/null/v5.Int"
          - db_type: "int"
            nullable: true
            go_type: "github.com/guregu/null/v5.Int"
          # 可空浮点（资源采样 cpu_percent 等）
          - db_type: "double"
            nullable: true
            go_type: "github.com/guregu/null/v5.Float"
