# manager-web 容器内层 nginx 配置:仅服务 vite 构建后的静态资源,
# 不处理 TLS 与 /api 反代(由 deploy/manage/nginx.conf 的外层 manager-nginx 统一完成)。
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 静态资源未命中时回退到 index.html,交给前端 vue-router 处理客户端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 不缓存,确保发版后浏览器立刻拉到最新的 bundle 引用,避免长时间命中旧版
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # vite 产物默认带内容 hash 文件名,assets/ 下的资源可长期强缓存
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }
}
