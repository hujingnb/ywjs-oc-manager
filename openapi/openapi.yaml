        description: 新建会话请求（title 可选）
      responses:
        "201":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/ocops.ConversationSession'
                type: object
          description: Created
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Service Unavailable
      security:
      - BearerAuth: []
      summary: 新建 web 会话
      tags:
      - hermes-conversation
  /apps/{appId}/hermes/conversations/{sid}:
    delete:
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      - description: 会话 ID
        in: path
        name: sid
        required: true
        schema:
          type: string
      responses:
        "204":
          description: 删除成功
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Service Unavailable
      security:
      - BearerAuth: []
      summary: 删除会话
      tags:
      - hermes-conversation
    patch:
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      - description: 会话 ID
        in: path
        name: sid
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handlers.RenameConversationRequest'
                description: 重命名请求
                summary: body
        description: 重命名请求
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/ocops.ConversationSession'
                type: object
          description: OK
      security:
      - BearerAuth: []
      summary: 重命名会话
      tags:
      - hermes-conversation
  /apps/{appId}/hermes/conversations/{sid}/chat:
