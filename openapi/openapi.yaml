components:
  schemas:
    handlers.AddSkillFromLibraryRequest:
      properties:
        name:
          description: Name 是 skill 在版本内的目录名；clawhub 必填（displayName），platform 可空（以
            DB 为准）。
          type: string
        source:
          description: Source 是 skill 来源类型，接受 "platform" 或 "clawhub"。
          type: string
        source_ref:
          description: SourceRef 是来源内精准标识；platform=skill name，clawhub=slug。
          type: string
        version:
          description: Version 是要配进版本的 skill 版本号。
          type: string
      required:
      - source
      - source_ref
      - version
      type: object
    handlers.AppLocaleStatusResponse:
      properties:
        current_language:
          description: CurrentLanguage 是实例实时语言（取自 oc-ops，不读 DB 快照）；实例未运行 / 不可达时为 null。
          type: string
        desired_language:
          description: DesiredLanguage 是期望语言（apps.locale 配置值）。
          type: string
        needs_restart:
          description: NeedsRestart 表示运行中实例当前语言≠期望，需重启生效。
          type: boolean
      type: object
    handlers.AssistantVersionRoutingDTO:
      properties:
        approval:
          type: string
        compression:
          type: string
        mcp:
          type: string
        session_search:
          type: string
        skills_hub:
          type: string
        title_generation:
          type: string
        vision:
          type: string
        web_extract:
          type: string
      type: object
    handlers.ChangePasswordRequest:
      properties:
        new_password:
          description: NewPassword 是新登录密码，service 层会校验长度并写入 hash。
          type: string
        old_password:
          description: OldPassword 是当前登录密码，只用于本次校验，不写日志。
          type: string
      required:
      - new_password
      - old_password
      type: object
    handlers.ConfigureWebPublishRequest:
      properties:
        base_domain:
          description: BaseDomain 是企业 web-publish 的根域名（如 apps.example.com），必填。
          type: string
        credentials:
          additionalProperties:
            type: string
          description: |-
            Credentials 是 provider 凭证明文 map（如 access_key_id / access_key_secret）；
            为空时不更新已有凭证密文，service 端加密后落库，明文不持久化。
          type: object
        dns_provider:
          description: DNSProvider 是 DNS provider 枚举值（如 aliyun），必填；service 层校验白名单。
          type: string
        max_sites:
          description: MaxSites 是企业下最大站点数；<=0 时 service 默认填 20。
          type: integer
        site_ttl_days:
          description: SiteTTLDays 是站点 TLS 证书/DNS 记录的 TTL 天数；<=0 时 service 默认填 7。
          type: integer
      required:
      - base_domain
      - dns_provider
      type: object
    handlers.ConversationChatRequest:
      properties:
        message:
          description: |-
            Message 是消息内容：文字字符串，或多模态 parts 数组
            [{type:"text",text} | {type:"input_file",file_id,filename,mime}]。
            文件 part 由 service 富化为带 file_url 的预签名引用后转发 oc-ops。
      required:
      - message
      type: object
    handlers.CreateAssistantVersionRequest:
      properties:
        description:
          type: string
        image_id:
          type: string
        industry_knowledge_base_ids:
          description: IndustryKnowledgeBaseIDs 是该助手版本运行时额外检索的行业知识库 ID 列表。
          items:
            type: string
          type: array
          uniqueItems: false
        main_model:
          type: string
        name:
          type: string
        routing:
          $ref: '#/components/schemas/handlers.AssistantVersionRoutingDTO'
        system_prompt:
          type: string
      required:
      - image_id
      - main_model
      - name
      - system_prompt
      type: object
    handlers.CreateConversationRequest:
      properties:
        title:
          description: Title 是可选会话标题；前端不填时 service 层按默认逻辑命名。
          type: string
      type: object
    handlers.CreateCronJobRequest:
      properties:
        base_url:
          description: BaseURL 是高级字段，仅平台管理员生效：任务指定 provider base URL。
          type: string
        deliver:
          description: Deliver 是任务输出投递目标，例如 wechat；为空表示不投递。
          type: string
        model:
          description: Model 是高级字段，仅平台管理员生效：任务指定模型。
          type: string
        name:
          description: Name 是任务显示名称；service 层会校验非空并生成稳定错误码。
          type: string
        no_agent:
          description: NoAgent 表示任务是否跳过 agent 执行路径。
          type: boolean
        prompt:
          description: Prompt 是任务触发时交给 Hermes 的提示词，可为空。
          type: string
        provider:
          description: Provider 是高级字段，仅平台管理员生效：任务指定模型提供方。
          type: string
        repeat:
          description: Repeat 是任务重复次数；nil 表示不限制重复次数。
          type: integer
        schedule:
          description: Schedule 是任务调度表达式，必须由调用方显式提交。
          type: string
        script:
          description: Script 是仓库内脚本文件名，由 service 层校验为单文件名。
          type: string
        skills:
          description: Skills 是高级字段，仅平台管理员生效：任务声明需要的技能列表。
          items:
            type: string
          type: array
          uniqueItems: false
        workdir:
          description: Workdir 是任务执行目录，由 service 层按 oc-cron 契约校验。
          type: string
      required:
      - schedule
      type: object
    handlers.CreateIndustryKnowledgeBaseRequest:
      properties:
        name:
          description: Name 是行业知识库展示名，在未删除行业库中必须唯一。
          type: string
      required:
      - name
      type: object
    handlers.CreateKanbanTaskRequest:
      properties:
        assignee:
          description: Assignee 是任务分配对象（hermes profile 名），必填。
          type: string
        board:
          description: Board 是目标 board slug，为空时默认 "default"。
          type: string
        body:
          description: Body 是任务描述，可为空。
          type: string
        max_retries:
          description: MaxRetries 是高级字段，仅平台管理员生效：最大重试次数。
          type: integer
        parent_id:
          description: ParentID 是高级字段，仅平台管理员生效：父任务 ID。
          type: string
        priority:
          description: Priority 是任务优先级（0-9），0 为默认。
          type: integer
        skills:
          description: Skills 是高级字段，仅平台管理员生效：指定任务所需技能列表（每项对应一个 --skill 参数）。
          items:
            type: string
          type: array
          uniqueItems: false
        title:
          description: Title 是任务标题，必填。
          type: string
        workspace:
          description: |-
            Workspace 是高级字段，仅平台管理员生效：workspace 参数，对应 --workspace，
            接受 scratch / worktree / dir:<path> 三种形式。
          type: string
      required:
      - assignee
      - title
      type: object
    handlers.CreateMemberAppRequest:
      properties:
        app_name:
          description: AppName 是新实例名称，创建时必填。
          type: string
        channel_type:
          description: ChannelType 是初始化渠道绑定的渠道标识。
          type: string
        version_id:
          description: VersionID 是实例绑定的助手版本 id，必须落在企业 allowlist 内。
          type: string
      required:
      - app_name
      - version_id
      type: object
    handlers.CreateMemberRequest:
      properties:
        display_name:
          description: DisplayName 是前端显示名，创建与更新时都不能为空。
          type: string
        password:
          description: Password 是初始密码，service 层立即 hash 后写库。
          type: string
        role:
          description: Role 允许 org_admin / org_member；空值由 service 层补默认 org_member。
          type: string
        username:
          description: Username 是企业内登录账号名，创建后不可通过成员更新接口修改。
          type: string
      required:
      - display_name
      - password
      - username
      type: object
    handlers.CreateOrganizationRequest:
      properties:
        admin_display_name:
          description: AdminDisplayName 是首个 org_admin 的显示名。
          type: string
        admin_password:
          description: AdminPassword 是首个 org_admin 的初始密码，service 层立即 hash 后写库。
          type: string
        admin_username:
          description: AdminUsername 是随企业创建的首个 org_admin 账号名。
          type: string
        assistant_version_ids:
          description: AssistantVersionIDs 是该企业可用的助手版本 id 列表（allowlist）。
          items:
            type: string
          type: array
          uniqueItems: false
        code:
          description: Code 是企业登录标识，创建后不可修改。
          type: string
        contact_name:
          description: ContactName 是业务联系人姓名，可为空。
          type: string
        contact_phone:
          description: ContactPhone 是业务联系人电话，可为空；不参与权限或登录校验。
          type: string
        credit_warning_threshold:
          description: CreditWarningThreshold 是企业余额预警阈值；nil 表示不启用余额预警或保持预警关闭。
          type: integer
        knowledge_quota_bytes:
          description: KnowledgeQuotaBytes 是企业知识库累计容量上限，单位字节；nil 表示创建时使用默认值、更新时保留旧值。
          type: integer
        max_instance_count:
          description: MaxInstanceCount 是企业最多可创建的实例（应用）数；nil 表示不限制。
          type: integer
        name:
          description: Name 是企业展示名，也是平台管理员列表中识别租户的主字段。
          type: string
        remark:
          description: Remark 是平台管理员维护的内部备注。
          type: string
      required:
      - admin_display_name
      - admin_password
      - admin_username
      - code
      - name
      type: object
    handlers.CustomSkillTargetDTO:
      properties:
        audience:
          description: all_org|org_admins|requester_only
          type: string
        org_id:
          type: string
      required:
      - audience
      - org_id
      type: object
    handlers.ErrorResponse:
      properties:
        code:
          description: Code 是稳定的接口契约标识，一旦发布只增不改。
          example: APP_NOT_FOUND
          type: string
        message:
          description: Message 是面向前端展示的安全错误文案。
          example: 应用不存在
          type: string
      type: object
    handlers.FeishuChannelAuthRequest:
      properties:
        domain:
          description: |-
            Domain 是飞书域：feishu | lark，默认 feishu；omitempty 允许留空回退，
            但显式传值时必须落在 feishu/lark 内，防御非法 domain 透传 oc-ops。
          enum:
          - feishu
          - lark
          type: string
      type: object
    handlers.InitKnowledgeUploadRequest:
      properties:
        filename:
          description: Filename 是原始文件名，服务端会取 base 后用于暂存 key 与最终文档名。
          type: string
        size:
          description: Size 是文件总字节数，用于上传前的配额预校验，必须为正。
          type: integer
      required:
      - filename
      - size
      type: object
    handlers.InstallAppSkillRequest:
      properties:
        name:
          description: Name 是 skill 在实例内的目录名（唯一键），不同 app 间可重名。
          type: string
        source:
          description: Source 是 skill 来源类型：platform（平台库）或 clawhub（ClawHub 市场）。
          type: string
        source_ref:
          description: SourceRef 是来源内精准标识：platform=name，clawhub=slug。
          type: string
        version:
          description: Version 是要安装的版本号，由来源方定义（如 semver 或日期戳）。
          type: string
      required:
      - name
      - source
      - source_ref
      - version
      type: object
    handlers.JobView:
      properties:
        attempts:
          type: integer
        created_at:
          type: string
        finished_at:
          type: string
        id:
          type: string
        last_error:
          type: string
        max_attempts:
          type: integer
        run_after:
          type: string
        status:
          type: string
        type:
          type: string
      type: object
    handlers.KanbanBlockRequest:
      properties:
        board:
          description: Board 是目标 board slug，为空时默认 "default"。
          type: string
        reason:
          description: Reason 是阻塞原因，必填。
          type: string
      required:
      - reason
      type: object
    handlers.KanbanBoardRequest:
      properties:
        board:
          description: Board 是目标 board slug，为空时默认 "default"。
          type: string
      type: object
    handlers.KanbanCommentRequest:
      properties:
        board:
          description: Board 是目标 board slug，为空时默认 "default"。
          type: string
        body:
          description: Body 是评论内容，必填。
          type: string
      required:
      - body
      type: object
    handlers.KanbanCompleteRequest:
      properties:
        board:
          description: Board 是目标 board slug，为空时默认 "default"。
          type: string
        result:
          description: Result 是可选的完成摘要。
          type: string
      type: object
    handlers.KanbanReassignRequest:
      properties:
        board:
          description: Board 是目标 board slug，为空时默认 "default"。
          type: string
        to:
          description: To 是目标分配对象（hermes profile 名），必填。
          type: string
      required:
      - to
      type: object
    handlers.LoginRequest:
      properties:
        captcha:
          description: |-
            Captcha 是 Altcha payload（base64）；验证码开启时必填，是否必填由后端按
            captcha.enabled 在 service 层判断，故此处不加 binding:"required"。
          type: string
        org_code:
          description: OrgCode 是企业用户登录时填写的企业标识；平台管理员登录时留空。
          type: string
        password:
          description: Password 是明文登录密码，仅用于本次校验，handler 不写日志。
          type: string
        username:
          description: Username 是 manager 账号名，登录失败时不区分账号不存在和密码错误。
          type: string
      required:
      - password
      - username
      type: object
    handlers.OnboardMemberRequest:
      properties:
        app_name:
          description: AppName 是随成员初始化的默认应用名称。
          type: string
        channel_type:
          description: ChannelType 是初始化渠道绑定的渠道标识。
          type: string
        display_name:
          description: DisplayName 是新成员展示名。
          type: string
        password:
          description: Password 是新成员初始密码。
          type: string
        role:
          description: Role 为空时默认为 org_member；不允许创建 platform_admin。
          type: string
        username:
          description: Username 是新成员账号名，与普通创建成员保持同一约束。
          type: string
        version_id:
          description: VersionID 是实例绑定的助手版本 id，必须落在企业 allowlist 内。
          type: string
      required:
      - app_name
      - display_name
      - password
      - username
      - version_id
      type: object
    handlers.OrganizationRequest:
      properties:
        assistant_version_ids:
          description: AssistantVersionIDs 是该企业可用的助手版本 id 列表（allowlist）。
          items:
            type: string
          type: array
          uniqueItems: false
        contact_name:
          description: ContactName 是业务联系人姓名，可置空。
          type: string
        contact_phone:
          description: ContactPhone 是业务联系人电话，可置空。
          type: string
        credit_warning_threshold:
          description: CreditWarningThreshold 是企业余额预警阈值；nil 表示清空或未设置预警阈值。
          type: integer
        knowledge_quota_bytes:
          description: KnowledgeQuotaBytes 是企业知识库累计容量上限，单位字节；nil 表示创建时使用默认值、更新时保留旧值。
          type: integer
        max_instance_count:
          description: MaxInstanceCount 是企业最多可创建的实例（应用）数；nil 表示不限制。
          type: integer
        name:
          description: Name 是企业展示名；更新时仍必填，避免空名称进入前端列表。
          type: string
        remark:
          description: Remark 是平台管理员维护的内部备注，可置空。
          type: string
      required:
      - name
      type: object
    handlers.PublicConfigResponse:
      properties:
        default_locale:
          description: DefaultLocale 是平台默认界面语言（en/zh），登录页 localStorage 为空时采用。
          type: string
        supported_locales:
          description: SupportedLocales 是平台受支持的界面语言集合，供前端渲染语言选择器。
          items:
            type: string
          type: array
          uniqueItems: false
        web_publish_dev_mode:
          description: |-
            WebPublishDevMode 表示平台是否开启 web-publish 本地/dev 自签模式（config.WebPublish.DevSelfSignedCert）。
            仅供前端决定是否在 DNS provider 下拉中展示「本地调试(local)」选项；生产恒为 false。
          type: boolean
      type: object
    handlers.RechargeRequest:
      properties:
        credit_amount:
          description: CreditAmount 是充值额度，必须为正数，service 层会同步写入 new-api。
          type: integer
        remark:
          description: Remark 是本次充值的审计备注。
          type: string
      required:
      - credit_amount
      type: object
    handlers.RefreshRequest:
      properties:
        refresh_token:
          description: RefreshToken 是长生命周期刷新令牌，service 层只保存其 hash 并在刷新时轮换。
          type: string
      required:
      - refresh_token
      type: object
    handlers.RejectSkillTicketRequest:
      properties:
        reason:
          type: string
      type: object
    handlers.RenameConversationRequest:
      properties:
        title:
          description: 新标题，必填
          type: string
      required:
      - title
      type: object
    handlers.ResetPasswordRequest:
      properties:
        password:
          description: Password 是新密码，service 层只保存 hash。
          type: string
      required:
      - password
      type: object
    handlers.RuntimeKnowledgeSearchRequest:
      properties:
        question:
          description: Question 是用户问题或检索语句。
          type: string
        top_k:
          description: TopK 是每个知识库作用域的检索 chunk 上限；0 使用 service 默认值，超过 service 上限会被截断。
          type: integer
      required:
      - question
      type: object
    handlers.SendSkillTicketMessageRequest:
      properties:
        text:
          type: string
      type: object
    handlers.SetSkillTicketQuoteRequest:
      properties:
        quote_amount_cents:
          type: integer
      type: object
    handlers.SubmitSkillTicketRequest:
      properties:
        description:
          type: string
        title:
          type: string
      type: object
    handlers.SwitchAppVersionRequest:
      properties:
        version_id:
          description: VersionID 是目标助手版本 id，必须在实例所属企业的 allowlist 内。
          type: string
      required:
      - version_id
      type: object
    handlers.UpdateAppKnowledgeQuotaRequest:
      properties:
        quota_bytes:
          description: QuotaBytes 是实例知识库累计容量上限，单位字节，必须大于 0。
          type: integer
      required:
      - quota_bytes
      type: object
    handlers.UpdateAppLocaleRequest:
      properties:
        locale:
          description: Locale 是 hermes bot 对终端用户说话的语言（en/zh）；取值集合由 service 层校验。
          type: string
      required:
      - locale
      type: object
    handlers.UpdateAppSkillRequest:
      properties:
        version:
          description: Version 是目标版本号，必须与 source 端已发布的版本对应。
          type: string
      required:
      - version
      type: object
    handlers.UpdateAssistantVersionRequest:
      properties:
        description:
          type: string
        image_id:
          type: string
        industry_knowledge_base_ids:
          description: IndustryKnowledgeBaseIDs 是该助手版本运行时额外检索的行业知识库 ID 列表；更新时未提交表示保留旧关联。
          items:
            type: string
          type: array
          uniqueItems: false
        main_model:
          type: string
        name:
          type: string
        routing:
          $ref: '#/components/schemas/handlers.AssistantVersionRoutingDTO'
        system_prompt:
          type: string
      required:
      - image_id
      - main_model
      - name
      - system_prompt
      type: object
    handlers.UpdateCronJobRequest:
      properties:
        base_url:
          description: BaseURL 是高级字段，仅平台管理员生效：任务指定 provider base URL。
          type: string
        clear_repeat:
          description: ClearRepeat 表示显式清空重复次数；当前 Hermes runtime 暂无稳定清空语义，提交 true 会返回
            400。
          type: boolean
        clear_skills:
          description: ClearSkills 是高级字段，仅平台管理员生效：显式清空任务技能列表。
          type: boolean
        deliver:
          description: Deliver 是任务投递目标；nil 表示保持原值，空字符串表示清空。
          type: string
        model:
          description: Model 是高级字段，仅平台管理员生效：任务指定模型。
          type: string
        name:
          description: Name 是任务显示名称；nil 表示保持原值。
          type: string
        no_agent:
          description: NoAgent 表示是否跳过 agent；nil 表示保持原值。
          type: boolean
        prompt:
          description: Prompt 是任务提示词；nil 表示保持原值，空字符串表示清空。
          type: string
        provider:
          description: Provider 是高级字段，仅平台管理员生效：任务指定模型提供方。
          type: string
        repeat:
          description: Repeat 是任务重复次数；nil 表示不修改重复次数。
          type: integer
        schedule:
          description: Schedule 是任务调度表达式；nil 表示保持原值。
          type: string
        script:
          description: Script 是仓库内脚本文件名；nil 表示保持原值，空字符串表示清空。
          type: string
        skills:
          description: Skills 是高级字段，仅平台管理员生效：追加或替换任务技能列表。
          items:
            type: string
          type: array
          uniqueItems: false
        workdir:
          description: Workdir 是任务执行目录；nil 表示保持原值，空字符串表示清空。
          type: string
      type: object
    handlers.UpdateCustomSkillTargetsRequest:
      properties:
        targets:
          items:
            $ref: '#/components/schemas/handlers.CustomSkillTargetDTO'
          type: array
          uniqueItems: false
      type: object
    handlers.UpdateIndustryKnowledgeBaseRequest:
      properties:
        name:
          description: Name 是更新后的行业知识库展示名，在未删除行业库中必须唯一。
          type: string
      required:
      - name
      type: object
    handlers.UpdateKnowledgeEmbeddingModelRequest:
      properties:
        name:
          description: Name 是 RAGFlow 控制台可见的模型名，不使用 RAGFlow 内部拼接 ID。
          type: string
        provider:
          description: Provider 是模型来源；为空时后端按 name 做唯一匹配。
          type: string
      required:
      - name
      type: object
    handlers.UpdateLocaleRequest:
      properties:
        locale:
          description: Locale 是目标界面语言，例如 en / zh。
          type: string
      required:
      - locale
      type: object
    handlers.UpdateMemberRequest:
      properties:
        display_name:
          description: DisplayName 是成员展示名，更新接口要求显式传入非空值。
          type: string
        role:
          description: Role 为空表示保持原角色；非空时需要管理员权限并限制在企业角色内。
          type: string
      required:
      - display_name
      type: object
    ocops.ConversationChatResult:
      properties:
        message:
          $ref: '#/components/schemas/ocops.ConversationMessage'
        session_id:
          type: string
        usage: {}
      type: object
    ocops.ConversationMessage:
      properties:
        content:
          description: 字符串或 [{type,text|image_url}]
        finish_reason:
          type: string
        role:
          description: user / assistant
          type: string
        timestamp:
          description: |-
            Timestamp 用 any 承载：api_server 的时间戳为数字（Unix 秒），用 any 避免
            「数字→字符串」解码失败（与 session 时间戳同源问题）；前端不渲染此字段。
        tool_calls:
          description: 工具调用（透传，前端可忽略）
      type: object
    ocops.ConversationSession:
      properties:
        id:
          type: string
        last_active:
          description: 最近活跃时间（Unix 秒，列表按此排序）
          type: number
        message_count:
          description: 消息数（列表展示）
          type: integer
        model:
          description: 绑定模型（可空）
          type: string
        preview:
          description: 末条消息预览（列表展示）
          type: string
        source:
          description: 渠道来源：weixin / web / api_server 等
          type: string
        started_at:
          description: |-
            StartedAt / LastActive 是 api_server 返回的 Unix 时间戳（秒，float），不是字符串——
            真机验证发现：声明成 string 会导致 json 解码「数字→字符串」失败，整条会话端点
            返回 OUTPUT_INVALID。用 float64 承载（值为 null 时解为 0）。
          type: number
        title:
          description: 会话标题（可空）
          type: string
        user_id:
          description: 会话归属用户标识（渠道侧）
          type: string
      type: object
    ocops.CronCapabilities:
      properties:
        contract_version:
          description: ContractVersion 是 oc-cron 契约版本号。
          type: string
        features:
          $ref: '#/components/schemas/ocops.CronFeatures'
        hermes_version:
          description: HermesVersion 是底层 hermes 版本或构建 ref，可为空。
          type: string
        oc_cron_version:
          description: OCCronVersion 是 oc-cron 适配层版本。
          type: string
        variant:
          description: Variant 是镜像变体标识。
          type: string
        verbs:
          description: Verbs 是本镜像支持的 manager-facing verb 清单。
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    ocops.CronFeatures:
      description: Features 是细粒度能力开关。
      properties:
        advanced_fields:
          description: AdvancedFields 表示支持 workdir/skills/model/provider/base_url
            等高级字段。
          type: boolean
        history:
          description: History 表示支持查询运行输出历史。
          type: boolean
        output:
          description: Output 表示支持读取单次运行输出。
          type: boolean
        script:
          description: Script 表示支持 script 字段。
          type: boolean
        status:
          description: Status 表示支持调度器状态查询。
          type: boolean
        write:
          description: Write 表示支持写操作（create/update/delete/toggle/run）。
          type: boolean
      type: object
    ocops.CronJob:
      properties:
        base_url:
          description: BaseURL 是任务指定 provider base URL；平台管理员高级字段。
          type: string
        created_at:
          description: CreatedAt 是任务创建时间，保持 oc-cron 输出字符串以避免时区二次解释。
          type: string
        deliver:
          description: Deliver 是任务输出投递目标，例如 wechat；为空表示不投递。
          type: string
        enabled:
          description: Enabled 表示调度器是否会自动触发该任务。
          type: boolean
        id:
          description: ID 是 Cron 任务唯一标识，最多 64 个安全字符。
          type: string
        last_delivery_error:
          description: LastDeliveryError 是最近一次投递错误摘要，可为空。
          type: string
        last_error:
          description: LastError 是最近一次执行错误摘要，可为空。
          type: string
        last_run_at:
          description: LastRunAt 是最近一次运行时间，可为空。
          type: string
        last_status:
          description: LastStatus 是最近一次运行状态，可为空。
          type: string
        model:
          description: Model 是任务指定模型；平台管理员高级字段。
          type: string
        name:
          description: Name 是任务显示名称。
          type: string
        next_run_at:
          description: NextRunAt 是下一次计划运行时间，可为空。
          type: string
        no_agent:
          description: NoAgent 表示任务是否跳过 agent 执行路径。
          type: boolean
        prompt:
          description: Prompt 是任务运行时交给 Hermes 的提示词，可为空。
          type: string
        provider:
          description: Provider 是任务指定模型提供方；平台管理员高级字段。
          type: string
        repeat:
          $ref: '#/components/schemas/ocops.CronRepeat'
        schedule:
          $ref: '#/components/schemas/ocops.CronSchedule'
        script:
          description: Script 是任务使用的仓库内脚本文件名，可为空。
          type: string
        skills:
          description: Skills 是任务声明需要的技能列表；平台管理员高级字段。
          items:
            type: string
          type: array
          uniqueItems: false
        state:
          description: State 是调度状态，如 scheduled / paused / disabled / removed。
          type: string
        workdir:
          description: Workdir 是任务运行目录；平台管理员高级字段，handler 层可按角色过滤。
          type: string
      type: object
    ocops.CronRepeat:
      description: Repeat 描述重复次数和完成次数。
      properties:
        completed:
          description: Completed 是已完成的调度次数。
          type: integer
        times:
          description: Times 是总重复次数，nil 表示不限制次数。
          type: integer
      type: object
    ocops.CronRunEntry:
      properties:
        error:
          description: Error 是运行错误摘要，可为空。
          type: string
        file_name:
          description: FileName 是输出 markdown 文件名，或 synthetic 元数据文件名。
          type: string
        has_output:
          description: HasOutput 表示是否存在真实 markdown 输出文件。
          type: boolean
        job_id:
          description: JobID 是所属 Cron 任务 ID。
          type: string
        run_time:
          description: RunTime 是本次运行时间字符串。
          type: string
        size:
          description: Size 是输出文件字节数。
          type: integer
        status:
          description: Status 是运行状态，可为空。
          type: string
        synthetic:
          description: Synthetic 表示该记录是否由调度元数据合成。
          type: boolean
      type: object
    ocops.CronRunOutput:
      properties:
        content:
          description: Content 是 markdown 文本内容，oc-cron 限制最大 1 MiB。
          type: string
        file_name:
          description: FileName 是输出 markdown 文件名。
          type: string
        job_id:
          description: JobID 是所属 Cron 任务 ID。
          type: string
        run_time:
          description: RunTime 是本次运行时间字符串。
          type: string
      type: object
    ocops.CronSchedule:
      description: Schedule 是规整后的调度表达式。
      properties:
        display:
          description: Display 是面向用户展示的调度描述。
          type: string
        expr:
          description: Expr 是机器可读表达式；oc-cron 可返回 null，service 层用空字符串承接。
          type: string
        kind:
          description: Kind 是调度表达式类别，例如 cron / every / at；旧数据可能为空。
          type: string
      type: object
    ocops.CronStatus:
      properties:
        active_jobs:
          description: ActiveJobs 是启用且未移除的任务数量。
          type: integer
        available:
          description: Available 表示 oc-cron 能读取 Cron 状态。
          type: boolean
        gateway_running:
          description: GatewayRunning 表示 hermes cron status 命令当前是否成功。
          type: boolean
        last_error:
          description: LastError 是最近的调度错误摘要，可为空。
          type: string
        last_error_job_id:
          description: LastErrorJobID 是最近错误对应的任务 ID，可为空。
          type: string
        message:
          description: Message 是底层 hermes cron status 的人类可读摘要。
          type: string
        next_job_id:
          description: NextJobID 是最近计划运行的任务 ID，可为空。
          type: string
        next_run_at:
          description: NextRunAt 是最近一次计划运行时间，可为空。
          type: string
        pid:
          description: PID 是调度器进程 ID；nil 表示当前镜像未暴露。
          type: integer
        tick_seconds:
          description: TickSeconds 是调度器 tick 间隔；nil 表示当前镜像未暴露。
          type: integer
      type: object
    ocops.KanbanBoard:
      properties:
        archived:
          description: Archived 标记 board 是否已归档。
          type: boolean
        color:
          description: Color 是 board 颜色标识，可为空。
          type: string
        counts:
          additionalProperties:
            type: integer
          description: Counts 是 board 内各状态的任务计数，key 为状态名，value 为数量。
          type: object
        description:
          description: Description 是 board 描述，可为空。
          type: string
        icon:
          description: Icon 是 board 图标字符串，可为空。
          type: string
        is_current:
          description: IsCurrent 标记是否为当前活动 board。
          type: boolean
        name:
          description: Name 是 board 显示名称。
          type: string
        slug:
          description: Slug 是 board 唯一标识，形如 "default"。
          type: string
        total:
          description: Total 是 board 内任务总数。
          type: integer
      type: object
    ocops.KanbanCapabilities:
      properties:
        contract_version:
          description: ContractVersion 是 oc-kanban 契约版本号（MAJOR.MINOR）。
          type: string
        features:
          $ref: '#/components/schemas/ocops.KanbanFeatures'
        hermes_version:
          description: HermesVersion 是底层 hermes 版本（信息性，可能为空）。
          type: string
        oc_kanban_version:
          description: OCKanbanVersion 是 oc-kanban 实现版本。
          type: string
        variant:
          description: Variant 是镜像变体标识。
          type: string
        verbs:
          description: Verbs 是本镜像实际支持的功能 verb 清单。
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    ocops.KanbanComment:
      properties:
        author:
          description: Author 是评论作者（hermes profile 名）。
          type: string
        body:
          description: Body 是评论内容。
          type: string
        created_at:
          description: CreatedAt 是评论创建时间戳（Unix 秒）。
          type: integer
      type: object
    ocops.KanbanEvent:
      properties:
        created_at:
          description: CreatedAt 是事件创建时间戳（Unix 秒）。
          type: integer
        kind:
          description: Kind 是事件类型，如 "created"、"status_changed" 等。
          type: string
        payload:
          description: |-
            Payload 是事件附加数据，结构随 Kind 变化（任意对象）。
            用 any 类型（swag 可正确解析为 object），json.Unmarshal 会把 JSON 对象解为 map[string]any。
        run_id:
          description: |-
            RunID 是关联的执行 ID，可为 null。真实环境多为 null，类型未经实测确定，
            用 any 容忍 hermes 任意输出（整数 / 字符串 / null），manager 仅透传不解析。
        task_id:
          description: |-
            TaskID 是事件所属任务 ID。watch 流的事件必带（前端按 task 分组依赖它）；
            TaskDetail.events 单任务上下文里可为空，故 omitempty。
          type: string
      type: object
    ocops.KanbanFeatures:
      description: Features 是细粒度能力开关。
      properties:
        runs:
          description: Runs 表示是否支持查询执行历史。
          type: boolean
        stats:
          description: Stats 表示是否支持统计。
          type: boolean
        watch:
          description: Watch 表示是否支持实时事件流。
          type: boolean
        write:
          description: Write 表示是否支持写操作（create/comment/...）。
          type: boolean
      type: object
    ocops.KanbanStats:
      properties:
        by_assignee:
          additionalProperties:
            additionalProperties:
              type: integer
            type: object
          description: ByAssignee 是各 assignee 下各状态的任务计数，外层 key 为 assignee，内层 key 为状态名。
          type: object
        by_status:
          additionalProperties:
            type: integer
          description: ByStatus 是各状态的任务计数，key 为状态名，value 为任务数量。
          type: object
        now:
          description: Now 是 stats 生成时的 Unix 时间戳（秒），用于客户端计算相对时间。
          type: integer
        oldest_ready_age_seconds:
          description: OldestReadyAgeSeconds 是最老的 ready 状态任务已等待的秒数。
          type: integer
      type: object
    ocops.KanbanTask:
      description: Task 是任务核心字段，对应 show 输出的顶层 "task" 子对象。
      properties:
        assignee:
          description: Assignee 是当前分配的 hermes profile 名称。
          type: string
        body:
          description: Body 是任务描述，可为 null（零值为空字符串）。
          type: string
        completed_at:
          description: CompletedAt 是任务完成时间戳（Unix 秒），可为 null（零值为 0）。
          type: integer
        created_at:
          description: CreatedAt 是任务创建时间戳（Unix 秒）。
          type: integer
        created_by:
          description: CreatedBy 是任务创建方（"user" 或 profile 名）。
          type: string
        id:
          description: ID 是任务唯一标识，形如 "t_85620ed7"。
          type: string
        max_retries:
          description: MaxRetries 是最大重试次数，可为 null（零值为 0）。
          type: integer
        priority:
          description: Priority 是任务优先级（0-9）。
          type: integer
        result:
          description: Result 是任务完成结果摘要，可为 null（零值为空字符串）。
          type: string
        skills:
          description: Skills 是任务所需技能列表，为字符串数组（空任务时为 []）。
          items:
            type: string
          type: array
          uniqueItems: false
        started_at:
          description: StartedAt 是任务开始执行时间戳（Unix 秒），可为 null（零值为 0）。
          type: integer
        status:
          description: Status 是任务状态（triage|todo|ready|running|blocked|done|archived）。
          type: string
        tenant:
          description: Tenant 是多租户标识，可为 null（零值为空字符串）。
          type: string
        title:
          description: Title 是任务标题。
          type: string
        workspace_kind:
          description: WorkspaceKind 是 workspace 类型（scratch|dir|worktree）。
          type: string
        workspace_path:
          description: WorkspacePath 是 workspace 路径，可为 null（零值为空字符串）。
          type: string
      type: object
    ocops.KanbanTaskDetail:
      properties:
        children:
          description: Children 是子任务 ID 列表（task id 字符串数组）。
          items:
            type: string
          type: array
          uniqueItems: false
        comments:
          description: Comments 是任务评论列表。
          items:
            $ref: '#/components/schemas/ocops.KanbanComment'
          type: array
          uniqueItems: false
        events:
          description: Events 是任务事件流列表。
          items:
            $ref: '#/components/schemas/ocops.KanbanEvent'
          type: array
          uniqueItems: false
        latest_summary:
          description: LatestSummary 是最新执行摘要，可为 null（零值为空字符串）。
          type: string
        parents:
          description: Parents 是父任务 ID 列表（task id 字符串数组）。
          items:
            type: string
          type: array
          uniqueItems: false
        task:
          $ref: '#/components/schemas/ocops.KanbanTask'
      type: object
    ocops.KanbanTaskRun:
      properties:
        ended_at:
          description: EndedAt 是执行结束时间戳（Unix 秒），0 表示尚未结束。
          type: integer
        error:
          description: Error 是执行失败时的错误信息。
          type: string
        outcome:
          description: Outcome 是执行结果（如 "success"/"failure"）。
          type: string
        profile:
          description: Profile 是执行该任务的 hermes profile 名称。
          type: string
        started_at:
          description: StartedAt 是执行开始时间戳（Unix 秒）。
          type: integer
        status:
          description: Status 是本次执行状态。
          type: string
        summary:
          description: Summary 是执行摘要文本。
          type: string
        worker_pid:
          description: WorkerPID 是 worker 进程 ID，0 表示未知或已退出。
          type: integer
      type: object
    service.AppResult:
      properties:
        api_key_status:
          type: string
        description:
          type: string
        id:
          type: string
        knowledge_quota_bytes:
          description: KnowledgeQuotaBytes 是实例知识库累计容量上限，单位字节。
          type: integer
        last_error_message:
          description: LastErrorMessage 上次进入 error 时的错误原始文本;供前端直接展示给用户。
          type: string
        last_error_status:
          description: LastErrorStatus 上次进入 error 时所在的状态值;前端用 formatAppStatus 转中文文案。
          type: string
        locale:
          description: |-
            Locale 是 hermes bot 对终端用户说话的语言（en/zh）；
            空表示使用平台默认语言（历史数据或未设置）。
          type: string
        name:
          type: string
        newapi_key_id:
          description: |-
            NewapiKeyID 是 new-api 中 token 的数值 id；schema 上是 text 列存的字符串，
            这里解析成 int64 方便 usage service 直接调 GetAPIKey。0 表示未绑定。
          type: integer
        org_id:
          type: string
        owner_user_id:
          type: string
        progress_current:
          description: |-
            ProgressCurrent 当前 status 阶段的已完成量,单位由 status 决定(字节 / 秒);
            0 或缺省表示未知 / 不显示进度条。
          type: integer
        progress_total:
          description: ProgressTotal 当前 status 阶段的总量;0 或缺省时前端展示为不定进度。
          type: integer
        runtime_image_ref:
          description: |-
            RuntimeImageRef 是 phasePullRuntimeImage 拉取的镜像引用（如 ghcr.io/foo/hermes:v1.2.3）。
            仅平台管理员可见，用于运维排障和版本溯源。
          type: string
        runtime_image_sha256:
          description: |-
            RuntimeImageSha256 是 docker inspect 返回的镜像 config digest（sha256:...）。
            仅平台管理员可见；与 RuntimeImageRef 共同标识节点上运行的精确镜像版本。
          type: string
        runtime_phase:
          description: |-
            RuntimePhase 是运行时就绪维度(与 status 正交):ready/starting/restarting/unknown。
            前端发起闸门 = status allowlist 且 runtime_phase==ready;非 ready 时按 phase 展示
            正在启动 / 重启中 / 状态确认中。
          type: string
        status:
          type: string
        version_id:
          description: VersionID 是实例绑定的助手版本 id；空表示未绑定（仅历史数据）。
          type: string
        version_synced:
          description: |-
            VersionSynced 标记实例运行时是否已与绑定版本对齐（修订 + 镜像都一致）；
            false 表示版本被编辑过，需重启实例生效。
          type: boolean
        web_publish_pending_restart:
          description: |-
            WebPublishPendingRestart 标记「企业已开通 web-publish，但本实例尚未注入发布能力」——
            即实例在企业开通前就已运行，需重启重新 bootstrap 才能获得发布能力。
            true 时前端在概览页提示「能力已开通，需重启实例生效」并提供重启入口。
          type: boolean
      type: object
    service.AppSkillResult:
      properties:
        category:
          type: string
        description:
