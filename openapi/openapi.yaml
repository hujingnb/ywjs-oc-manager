openapi: 3.0.3
info:
  title: OpenClaw Manager API
  version: 0.1.0
  description: OpenClaw Manager 后端 API 契约基线。
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: 健康检查
      operationId: getHealthz
      responses:
        "200":
          description: 服务运行正常。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/auth/login:
    post:
      summary: 用户登录
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功，返回用户信息和 token pair。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: 请求参数不完整。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 用户名或密码错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/refresh:
    post:
      summary: 刷新登录凭证
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: 刷新成功，返回新的 token pair。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: refresh token 无效、已撤销或已过期。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/logout:
    post:
      summary: 退出登录
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: refresh token 已撤销或原本不存在。
        "400":
          description: 请求参数不完整。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/me:
    get:
      summary: 获取当前登录用户
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 当前登录用户信息。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: 未登录或访问令牌无效。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/organizations:
    get:
      summary: 查询组织列表
      operationId: listOrganizations
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: 组织列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListResponse"
        "403":
          description: 无权访问组织列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: 创建组织
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationRequest"
      responses:
        "201":
          description: 组织创建成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "400":
          description: 请求参数不完整。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 无权创建组织。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/organizations/{orgId}:
    get:
      summary: 获取组织详情
      operationId: getOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "200":
          description: 组织详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "403":
          description: 无权访问该组织。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 组织不存在。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: 更新组织资料
      operationId: updateOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationRequest"
      responses:
        "200":
          description: 组织资料已更新。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "403":
          description: 无权更新组织。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 组织不存在。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/organizations/{orgId}/disable:
    post:
      summary: 禁用组织
      operationId: disableOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "200":
          description: 组织已禁用。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
  /api/v1/organizations/{orgId}/enable:
    post:
      summary: 启用组织
      operationId: enableOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "200":
          description: 组织已启用。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
  /api/v1/organizations/{orgId}/members:
    get:
      summary: 列出组织成员
      operationId: listMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: 成员列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberListResponse"
        "403":
          description: 无权访问该组织。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: 创建组织成员
      operationId: createMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberCreateRequest"
      responses:
        "201":
          description: 成员创建成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
        "400":
          description: 请求参数不合法。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 无权创建成员。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/members/{userId}:
    get:
      summary: 获取成员详情
      operationId: getMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: 成员详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
        "403":
          description: 无权访问该成员。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 成员不存在。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: 更新成员资料
      operationId: updateMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberUpdateRequest"
      responses:
        "200":
          description: 成员资料已更新。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
  /api/v1/members/{userId}/disable:
    post:
      summary: 禁用成员
      operationId: disableMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: 成员已禁用。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
  /api/v1/members/{userId}/enable:
    post:
      summary: 启用成员
      operationId: enableMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: 成员已启用。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
  /api/v1/members/{userId}/password:
    post:
      summary: 由管理员重置成员密码
      operationId: resetMemberPassword
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "204":
          description: 密码已重置。
        "400":
          description: 请求参数不完整。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 无权重置该成员密码。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/organizations/{orgId}/audit-logs:
    get:
      summary: 列出组织审计日志
      operationId: listOrgAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: 审计日志列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
  /api/v1/audit-logs:
    get:
      summary: 按目标资源列出审计日志
      operationId: listTargetAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - name: target_type
          in: query
          required: true
          schema:
            type: string
        - name: target_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: 审计日志列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
components:
  parameters:
    OrgId:
      name: orgId
      in: path
      required: true
      schema:
        type: string
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - time
      properties:
        status:
          type: string
          example: ok
        time:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    LoginResponse:
      type: object
      required:
        - user
        - tokens
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        tokens:
          $ref: "#/components/schemas/TokenPair"
    CurrentUserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
    AuthUser:
      type: object
      required:
        - id
        - username
        - display_name
        - role
        - status
      properties:
        id:
          type: string
        org_id:
          type: string
          nullable: true
        username:
          type: string
        display_name:
          type: string
        role:
          type: string
          enum:
            - platform_admin
            - org_admin
            - org_member
        status:
          type: string
          enum:
            - active
            - disabled
    TokenPair:
      type: object
      required:
        - access_token
        - refresh_token
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    OrganizationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        contact_name:
          type: string
        contact_phone:
          type: string
        remark:
          type: string
        newapi_user_id:
          type: string
        credit_warning_threshold:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
    OrganizationResponse:
      type: object
      required:
        - organization
      properties:
        organization:
          $ref: "#/components/schemas/Organization"
    OrganizationListResponse:
      type: object
      required:
        - organizations
      properties:
        organizations:
          type: array
          items:
            $ref: "#/components/schemas/Organization"
    Organization:
      type: object
      required:
        - id
        - name
        - status
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum:
            - active
            - disabled
            - deleted
        contact_name:
          type: string
        contact_phone:
          type: string
        remark:
          type: string
        newapi_user_id:
          type: string
        credit_warning_threshold:
          type: integer
          nullable: true
    Member:
      type: object
      required:
        - id
        - username
        - display_name
        - role
        - status
      properties:
        id:
          type: string
        org_id:
          type: string
        username:
          type: string
        display_name:
          type: string
        role:
          type: string
          enum:
            - platform_admin
            - org_admin
            - org_member
        status:
          type: string
          enum:
            - active
            - disabled
    MemberCreateRequest:
      type: object
      required:
        - username
        - display_name
        - password
      properties:
        username:
          type: string
        display_name:
          type: string
        password:
          type: string
          format: password
        role:
          type: string
          enum:
            - org_admin
            - org_member
    MemberUpdateRequest:
      type: object
      required:
        - display_name
      properties:
        display_name:
          type: string
        role:
          type: string
          enum:
            - org_admin
            - org_member
    PasswordResetRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          format: password
    MemberResponse:
      type: object
      required:
        - member
      properties:
        member:
          $ref: "#/components/schemas/Member"
    MemberListResponse:
      type: object
      required:
        - members
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/Member"
    AuditLog:
      type: object
      required:
        - id
        - actor_role
        - target_type
        - target_id
        - action
        - result
        - created_at
      properties:
        id:
          type: string
        actor_id:
          type: string
        actor_role:
          type: string
        org_id:
          type: string
        target_type:
          type: string
        target_id:
          type: string
        action:
          type: string
        result:
          type: string
        error_message:
          type: string
        ip_address:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    AuditLogListResponse:
      type: object
      required:
        - audit_logs
      properties:
        audit_logs:
          type: array
          items:
            $ref: "#/components/schemas/AuditLog"
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
