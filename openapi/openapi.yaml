      - hermes-conversations
  /apps/{appId}/hermes/conversations/{sid}/messages:
    get:
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      - description: 会话 ID
        in: path
        name: sid
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  items:
                    $ref: '#/components/schemas/ocops.ConversationMessage'
                  type: array
                type: object
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Service Unavailable
      security:
      - BearerAuth: []
      summary: 读会话历史
      tags:
      - hermes-conversation
