components:
  schemas:
    handlers.AgentHeartbeatRequest:
      properties:
        agent_token:
          type: string
        agent_version:
          type: string
        metadata:
          additionalProperties: {}
          type: object
        resource_snapshot:
          additionalProperties: {}
          type: object
      required:
      - agent_token
      type: object
    handlers.AgentRegisterRequest:
      properties:
        agent_docker_endpoint:
          type: string
        agent_file_endpoint:
          type: string
        agent_tls_ca_cert:
          type: string
        agent_version:
          type: string
        bootstrap_token:
          type: string
        metadata:
          additionalProperties: {}
          type: object
        node_data_root:
          type: string
        resource_snapshot:
          additionalProperties: {}
          type: object
      required:
      - bootstrap_token
      type: object
    handlers.CreateMemberRequest:
      properties:
        display_name:
          type: string
        password:
          type: string
        role:
          type: string
        username:
          type: string
      required:
      - display_name
      - password
      - username
      type: object
    handlers.CreateRuntimeNodeRequest:
      properties:
        heartbeat_interval_seconds:
          type: integer
        name:
          type: string
        node_data_root:
          type: string
      required:
      - name
      type: object
    handlers.ErrorResponse:
      properties:
        error:
          type: string
      type: object
    handlers.JobView:
      properties:
        attempts:
          type: integer
        created_at:
          type: string
        finished_at:
          type: string
        id:
          type: string
        last_error:
          type: string
        max_attempts:
          type: integer
        run_after:
          type: string
        status:
          type: string
        type:
          type: string
      type: object
    handlers.LoginRequest:
      properties:
        password:
          type: string
        username:
          type: string
      required:
      - password
      - username
      type: object
    handlers.OnboardMemberRequest:
      properties:
        app_name:
          type: string
        app_prompt:
          type: string
        channel_type:
          type: string
        display_name:
          type: string
        password:
          type: string
        persona_mode:
          type: string
        role:
          type: string
        runtime_node_id:
          type: string
        username:
          type: string
      required:
      - app_name
      - display_name
      - password
      - username
      type: object
    handlers.OrganizationRequest:
      properties:
        contact_name:
          type: string
        contact_phone:
          type: string
        credit_warning_threshold:
          type: integer
        name:
          type: string
        remark:
          type: string
      required:
      - name
      type: object
    handlers.PatchRuntimeNodeRequest:
      properties:
        max_apps:
          type: integer
      type: object
    handlers.PersonaRequest:
      properties:
        allow_member_override:
          type: boolean
        conversation_rules:
          type: string
        forbidden_rules:
          type: string
        reply_style:
          type: string
        system_prompt:
          type: string
      required:
      - system_prompt
      type: object
    handlers.RechargeRequest:
      properties:
        credit_amount:
          type: integer
        remark:
          type: string
      required:
      - credit_amount
      type: object
    handlers.RefreshRequest:
      properties:
        refresh_token:
          type: string
      required:
      - refresh_token
      type: object
    handlers.ResetPasswordRequest:
      properties:
        password:
          type: string
      required:
      - password
      type: object
    handlers.RetryOrgSyncRequest:
      properties:
        node_id:
          type: string
      required:
      - node_id
      type: object
    handlers.UpdateMemberRequest:
      properties:
        display_name:
          type: string
        role:
          type: string
      required:
      - display_name
      type: object
    service.AgentRegisterResult:
      properties:
        agent_token:
          type: string
        heartbeat_interval_seconds:
          type: integer
        node_id:
          type: string
      type: object
    service.AppResult:
      properties:
        api_key_status:
          type: string
        app_prompt:
          type: string
        container_id:
          type: string
        description:
          type: string
        id:
          type: string
        name:
          type: string
        newapi_key_id:
          description: |-
            NewapiKeyID 是 new-api 中 token 的数值 id；schema 上是 text 列存的字符串，
            这里解析成 int64 方便 usage service 直接调 GetAPIKey。0 表示未绑定。
          type: integer
        org_id:
          type: string
        owner_user_id:
          type: string
        persona_mode:
          type: string
        runtime_node_id:
          type: string
        status:
          type: string
      type: object
    service.AuditResult:
      properties:
        action:
          type: string
        actor_id:
          type: string
        actor_role:
          type: string
        created_at:
          format: date-time
          type: string
        error_message:
          type: string
        id:
          type: string
        ip_address:
          type: string
        metadata:
          additionalProperties: {}
          type: object
        org_id:
          type: string
        result:
          type: string
        target_id:
          type: string
        target_type:
          type: string
      type: object
    service.AuthUser:
      properties:
        display_name:
          type: string
        id:
          type: string
        org_id:
          type: string
        role:
          type: string
        status:
          type: string
        username:
          type: string
      type: object
    service.BalanceView:
      properties:
        newapi_user_id:
          type: integer
        remain_quota:
          type: integer
        used_quota:
          type: integer
      type: object
    service.ChallengeResult:
      properties:
        challenge_type:
          type: string
        channel_type:
          type: string
        code:
          type: string
        expires_at:
          type: string
        hints:
          additionalProperties:
            type: string
          type: object
        job_id:
          type: string
        qrcode:
          type: string
        status:
          type: string
      type: object
    service.KnowledgeEntryResult:
      properties:
        is_dir:
          type: boolean
        name:
          type: string
        path:
          type: string
        size:
          type: integer
      type: object
    service.KnowledgeListResult:
      properties:
        entries:
          items:
            $ref: '#/components/schemas/service.KnowledgeEntryResult'
          type: array
          uniqueItems: false
        path:
          type: string
      type: object
    service.LoginResult:
      properties:
        tokens:
          $ref: '#/components/schemas/service.TokenPair'
        user:
          $ref: '#/components/schemas/service.AuthUser'
      type: object
    service.LogsPage:
      properties:
        scope:
          type: string
        scope_id:
          type: string
        total:
          type: integer
        updated_at:
          type: string
      type: object
    service.MemberResult:
      properties:
        display_name:
          type: string
        id:
          type: string
        org_id:
          type: string
        role:
          type: string
        status:
          type: string
        username:
          type: string
      type: object
    service.OnboardMemberResult:
      properties:
        app:
          $ref: '#/components/schemas/service.AppResult'
        job_id:
          type: string
        member:
          $ref: '#/components/schemas/service.MemberResult'
      type: object
    service.OrganizationResult:
      properties:
        contact_name:
          type: string
        contact_phone:
          type: string
        credit_warning_threshold:
          type: integer
        id:
          type: string
        name:
          type: string
        newapi_user_id:
          type: string
        remark:
          type: string
        status:
          type: string
      type: object
    service.PersonaResult:
      properties:
        allow_member_override:
          type: boolean
        conversation_rules:
          type: string
        forbidden_rules:
          type: string
        org_id:
          type: string
        reply_style:
          type: string
        system_prompt:
          type: string
        version:
          type: integer
      type: object
    service.PlatformOverview:
      properties:
        app_count:
          type: integer
        error_app_count:
          type: integer
        member_count:
          type: integer
        organization_count:
          type: integer
        running_app_count:
          type: integer
        total_remain_quota:
          type: integer
        usage_available:
          type: boolean
      type: object
    service.ProgressResult:
      properties:
        bound_identity:
          type: string
        channel_name:
          type: string
        error_message:
          type: string
        metadata:
          additionalProperties:
            type: string
          type: object
        status:
          type: string
        updated_at:
          type: string
      type: object
    service.QuotaSeries:
      properties:
        scope:
          type: string
        scope_id:
          type: string
        updated_at:
          type: string
      type: object
    service.RechargeRecordResult:
      properties:
        created_at:
          type: string
        credit_amount:
          type: integer
        error_message:
          type: string
        id:
          type: string
        newapi_ref_id:
          type: string
        operator_id:
          type: string
        org_id:
          type: string
        remark:
          type: string
        status:
          type: string
      type: object
    service.RuntimeContainerInfo:
      properties:
        id:
          type: string
        image:
          type: string
        name:
          type: string
        status:
          type: string
      type: object
    service.RuntimeNodeResult:
      properties:
        agent_docker_endpoint:
          type: string
        agent_file_endpoint:
          type: string
        agent_version:
          type: string
        bootstrap_token:
          type: string
        bootstrap_token_expires_at:
          type: string
        has_agent_token:
          type: boolean
        heartbeat_interval_seconds:
          type: integer
        id:
          type: string
        max_apps:
          type: integer
        name:
          type: string
        node_data_root:
          type: string
        status:
          type: string
      type: object
    service.RuntimeOperation:
      enum:
      - start
      - stop
      - restart
      - delete
      - disable_api_key
      - restore_api_key
      type: string
      x-enum-varnames:
      - RuntimeOperationStart
      - RuntimeOperationStop
      - RuntimeOperationRestart
      - RuntimeOperationDelete
      - RuntimeOperationDisableAPIKey
      - RuntimeOperationRestoreAPIKey
    service.RuntimeOperationResult:
      properties:
        job_id:
          type: string
        operation:
          $ref: '#/components/schemas/service.RuntimeOperation'
      type: object
    service.RuntimeSnapshotView:
      properties:
        collected_at:
          type: string
        cpu_percent:
          type: number
        last_error:
          type: string
        memory_limit_bytes:
          type: integer
        memory_usage_bytes:
          type: integer
        network_rx_bytes:
          type: integer
        network_tx_bytes:
          type: integer
      type: object
    service.RuntimeView:
      properties:
        container:
          $ref: '#/components/schemas/service.RuntimeContainerInfo'
        snapshot:
          $ref: '#/components/schemas/service.RuntimeSnapshotView'
        status:
          type: string
      type: object
    service.SyncStatusResult:
      properties:
        last_error:
          type: string
        last_success_at:
          type: string
        node_id:
          type: string
        org_id:
          type: string
        status:
          type: string
        updated_at:
          type: string
      type: object
    service.TokenPair:
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
      type: object
    service.WorkspaceEntryResult:
      properties:
        is_dir:
          type: boolean
        name:
          type: string
        path:
          type: string
        size:
          type: integer
      type: object
    service.WorkspaceListing:
      properties:
        entries:
          items:
            $ref: '#/components/schemas/service.WorkspaceEntryResult'
          type: array
          uniqueItems: false
        path:
          type: string
      type: object
  securitySchemes:
    BearerAuth:
      description: 登录后获得的 JWT access token，前缀 "Bearer "。
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  description: OpenClaw 多组织管理后台 API。
  title: OpenClaw Manager API
  version: "1.0"
openapi: 3.1.0
paths:
  /agent/heartbeat:
    post:
      description: runtime agent 定期上报心跳及资源快照；鉴权通过请求体中的 agent_token 字段完成
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handlers.AgentHeartbeatRequest'
                description: 心跳请求（含 agent_token）
                summary: body
        description: 心跳请求（含 agent_token）
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.RuntimeNodeResult'
                type: object
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      summary: Agent 心跳
      tags:
      - agent
  /agent/register:
    post:
      description: runtime agent 用一次性 bootstrap token 注册并换取长效 agent token；鉴权通过请求体中的
        bootstrap_token 字段完成
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handlers.AgentRegisterRequest'
                description: 注册请求（含 bootstrap_token）
                summary: body
        description: 注册请求（含 bootstrap_token）
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/service.AgentRegisterResult'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      summary: Agent 注册
      tags:
      - agent
  /apps/{appId}:
    get:
      description: 按 appId 获取单个应用信息；org_member 只能查询自己的应用
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.AppResult'
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 应用详情
      tags:
      - apps
  /apps/{appId}/api-key/disable:
    post:
      description: 异步触发禁用应用关联的 new-api token，仅平台或组织管理员可操作
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.RuntimeOperationResult'
                type: object
          description: Accepted
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 禁用应用 API Key
      tags:
      - runtime-operations
  /apps/{appId}/api-key/restore:
    post:
      description: 异步触发恢复应用关联的 new-api token，仅平台或组织管理员可操作
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.RuntimeOperationResult'
                type: object
          description: Accepted
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 恢复应用 API Key
      tags:
      - runtime-operations
  /apps/{appId}/channels/{channelType}/auth:
    get:
      description: 轮询指定应用渠道的登录授权进度，返回当前状态
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      - description: 渠道类型（如 wechat）
        in: path
        name: channelType
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.ProgressResult'
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Service Unavailable
      security:
      - BearerAuth: []
      summary: 查询渠道登录进度
      tags:
      - channels
    post:
      description: 为指定应用和渠道类型发起登录授权流程，返回挑战信息（如二维码 URL）
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      - description: 渠道类型（如 wechat）
        in: path
        name: channelType
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.ChallengeResult'
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Service Unavailable
      security:
      - BearerAuth: []
      summary: 触发渠道登录挑战
      tags:
      - channels
  /apps/{appId}/channels/{channelType}/unbind:
    post:
      description: 解除指定应用与渠道类型的绑定关系
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      - description: 渠道类型（如 wechat）
        in: path
        name: channelType
        required: true
        schema:
          type: string
      responses:
        "204":
          description: 解绑成功，无响应体
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Service Unavailable
      security:
      - BearerAuth: []
      summary: 解绑渠道
      tags:
      - channels
  /apps/{appId}/initialize:
    post:
      description: 触发应用初始化重试；仅当应用状态为 error 或 draft 时允许，其它状态返回 409
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.RuntimeOperationResult'
                type: object
          description: Accepted
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 重新初始化应用
      tags:
      - runtime-operations
  /apps/{appId}/knowledge:
    delete:
      description: 通过 path query 参数指定目标路径，从应用知识库中删除对应文件；需同时提供 org_id/owner_user_id/path
      parameters:
      - description: 应用 ID
