openapi: 3.0.3
info:
  title: OpenClaw Manager API
  version: 0.1.0
  description: OpenClaw Manager 后端 API 契约基线。
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: 健康检查
      operationId: getHealthz
      responses:
        "200":
          description: 服务运行正常。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/auth/login:
    post:
      summary: 用户登录
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功，返回用户信息和 token pair。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: 请求参数不完整。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 用户名或密码错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/refresh:
    post:
      summary: 刷新登录凭证
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: 刷新成功，返回新的 token pair。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: refresh token 无效、已撤销或已过期。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/logout:
    post:
      summary: 退出登录
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: refresh token 已撤销或原本不存在。
        "400":
          description: 请求参数不完整。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/me:
    get:
      summary: 获取当前登录用户
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 当前登录用户信息。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: 未登录或访问令牌无效。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/organizations:
    get:
      summary: 查询组织列表
      operationId: listOrganizations
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: 组织列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListResponse"
        "403":
          description: 无权访问组织列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: 创建组织
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationRequest"
      responses:
        "201":
          description: 组织创建成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "400":
          description: 请求参数不完整。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 无权创建组织。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/organizations/{orgId}:
    get:
      summary: 获取组织详情
      operationId: getOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "200":
          description: 组织详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "403":
          description: 无权访问该组织。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 组织不存在。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: 更新组织资料
      operationId: updateOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationRequest"
      responses:
        "200":
          description: 组织资料已更新。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "403":
          description: 无权更新组织。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 组织不存在。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/organizations/{orgId}/disable:
    post:
      summary: 禁用组织
      operationId: disableOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "200":
          description: 组织已禁用。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
  /api/v1/organizations/{orgId}/enable:
    post:
      summary: 启用组织
      operationId: enableOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "200":
          description: 组织已启用。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
  /api/v1/organizations/{orgId}/members:
    get:
      summary: 列出组织成员
      operationId: listMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: 成员列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberListResponse"
        "403":
          description: 无权访问该组织。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: 创建组织成员
      operationId: createMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberCreateRequest"
      responses:
        "201":
          description: 成员创建成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
        "400":
          description: 请求参数不合法。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 无权创建成员。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/members/{userId}:
    get:
      summary: 获取成员详情
      operationId: getMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: 成员详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
        "403":
          description: 无权访问该成员。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 成员不存在。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: 更新成员资料
      operationId: updateMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberUpdateRequest"
      responses:
        "200":
          description: 成员资料已更新。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
  /api/v1/members/{userId}/disable:
    post:
      summary: 禁用成员
      operationId: disableMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: 成员已禁用。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
  /api/v1/members/{userId}/enable:
    post:
      summary: 启用成员
      operationId: enableMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: 成员已启用。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
  /api/v1/members/{userId}/password:
    post:
      summary: 由管理员重置成员密码
      operationId: resetMemberPassword
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "204":
          description: 密码已重置。
        "400":
          description: 请求参数不完整。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 无权重置该成员密码。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/organizations/{orgId}/audit-logs:
    get:
      summary: 列出组织审计日志
      operationId: listOrgAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: 审计日志列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
  /api/v1/runtime-nodes:
    get:
      summary: 列出 runtime 节点
      operationId: listRuntimeNodes
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: runtime 节点列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNodeListResponse"
    post:
      summary: 注册 runtime 节点并发放 bootstrap token
      operationId: createRuntimeNode
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeNodeCreateRequest"
      responses:
        "201":
          description: 节点已创建。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNodeResponse"
  /api/v1/runtime-nodes/{nodeId}:
    get:
      summary: 获取节点详情
      operationId: getRuntimeNode
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: 节点详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNodeResponse"
  /api/v1/runtime-nodes/{nodeId}/rotate-bootstrap:
    post:
      summary: 轮换 bootstrap token
      operationId: rotateRuntimeNodeBootstrap
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: bootstrap token 已重新发放。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNodeResponse"
        "409":
          description: 节点处于 active 状态，需先禁用再轮换。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/runtime-nodes/{nodeId}/disable:
    post:
      summary: 禁用 runtime 节点
      operationId: disableRuntimeNode
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: 节点已禁用。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNodeResponse"
  /api/v1/runtime-nodes/{nodeId}/enable:
    post:
      summary: 启用 runtime 节点
      operationId: enableRuntimeNode
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: 节点已启用。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNodeResponse"
  /api/v1/agent/register:
    post:
      summary: agent 用 bootstrap token 注册
      operationId: agentRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRegisterRequest"
      responses:
        "200":
          description: 注册成功，返回 agent token。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRegisterResponse"
        "401":
          description: bootstrap token 无效或已过期。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/agent/heartbeat:
    post:
      summary: agent 心跳
      operationId: agentHeartbeat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentHeartbeatRequest"
      responses:
        "200":
          description: 心跳已记录。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNodeResponse"
        "401":
          description: agent token 无效或节点已禁用。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/audit-logs:
    get:
      summary: 按目标资源列出审计日志
      operationId: listTargetAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - name: target_type
          in: query
          required: true
          schema:
            type: string
        - name: target_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: 审计日志列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"

  /api/v1/members/{userId}:
    delete:
      summary: 删除成员（联动其名下应用软删 + app_delete 入队）
      operationId: deleteMember
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: 成员已禁用，应用删除任务已入队。

  /api/v1/orgs/{orgId}/persona:
    get:
      summary: 查询组织当前生效的 AI 人设
      operationId: getOrgPersona
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 当前生效人设。
          content:
            application/json:
              schema:
                type: object
                properties:
                  persona:
                    $ref: "#/components/schemas/OrgPersona"
        "404":
          description: 尚未配置。
    put:
      summary: 写入新版本人设（旧版本保留）
      operationId: putOrgPersona
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrgPersonaInput"
      responses:
        "200":
          description: 已写入新版本。
          content:
            application/json:
              schema:
                type: object
                properties:
                  persona:
                    $ref: "#/components/schemas/OrgPersona"

  /api/v1/organizations/{orgId}/recharge:
    post:
      summary: 给组织充值
      operationId: rechargeOrg
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credit_amount]
              properties:
                credit_amount: { type: integer }
                remark: { type: string }
      responses:
        "200":
          description: 充值成功记录。
        "502":
          description: new-api 上游错误（仍写 failed 记录）。

  /api/v1/organizations/{orgId}/recharges:
    get:
      summary: 列出组织充值历史
      operationId: listRecharges
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 充值记录列表。

  /api/v1/organizations/{orgId}/balance:
    get:
      summary: 查询组织当前余额（透传 new-api）
      operationId: getOrgBalance
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 当前余额。

  /api/v1/apps/{appId}:
    get:
      summary: 应用详情
      operationId: getApp
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 应用详情。

  /api/v1/apps/{appId}/initialize:
    post:
      summary: 重新触发初始化（仅 status ∈ {error, draft}）
      operationId: initializeApp
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema: { type: string }
      responses:
        "202":
          description: 初始化任务已入队。
        "409":
          description: 当前状态不允许重新初始化。

  /api/v1/apps/{appId}/runtime:
    get:
      summary: 透传容器 inspect
      operationId: getAppRuntime
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 运行时视图。

  /api/v1/apps/{appId}/runtime/start:
    post:
      summary: 启动应用容器
      operationId: startApp
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema: { type: string }
      responses:
        "202":
          description: 启动任务已入队。

  /api/v1/apps/{appId}/runtime/stop:
    post:
      summary: 停止应用容器
      operationId: stopApp
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema: { type: string }
      responses:
        "202":
          description: 停止任务已入队。

  /api/v1/apps/{appId}/runtime/restart:
    post:
      summary: 重启应用容器
      operationId: restartApp
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema: { type: string }
      responses:
        "202":
          description: 重启任务已入队。

  /api/v1/apps/{appId}/runtime/delete:
    post:
      summary: 删除应用（容器 + api_key + 工作目录回收）
      operationId: deleteApp
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema: { type: string }
      responses:
        "202":
          description: 删除任务已入队。

  /api/v1/usage/members/{userId}:
    get:
      summary: 单个成员名下应用的用量聚合
      operationId: getMemberUsage
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: org_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 聚合用量。

  /api/v1/usage/organizations/{orgId}:
    get:
      summary: 组织维度的用量聚合
      operationId: getOrgUsage
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 聚合用量。

  /api/v1/usage/platform:
    get:
      summary: 平台维度的用量聚合（仅 platform_admin）
      operationId: getPlatformUsage
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 聚合用量。

components:
  parameters:
    OrgId:
      name: orgId
      in: path
      required: true
      schema:
        type: string
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
    NodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OrgPersona:
      type: object
      required:
        - org_id
        - system_prompt
        - allow_member_override
        - version
      properties:
        org_id: { type: string }
        system_prompt: { type: string }
        conversation_rules: { type: string }
        forbidden_rules: { type: string }
        reply_style: { type: string }
        allow_member_override: { type: boolean }
        version: { type: integer }
    OrgPersonaInput:
