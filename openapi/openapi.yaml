components:
  schemas:
    handlers.ErrorResponse:
      properties:
        error:
          type: string
      type: object
    handlers.LoginRequest:
      properties:
        password:
          type: string
        username:
          type: string
      required:
      - password
      - username
      type: object
    handlers.OrganizationRequest:
      properties:
        contact_name:
          type: string
        contact_phone:
          type: string
        credit_warning_threshold:
          type: integer
        name:
          type: string
        remark:
          type: string
      required:
      - name
      type: object
    handlers.RefreshRequest:
      properties:
        refresh_token:
          type: string
      required:
      - refresh_token
      type: object
    service.AuthUser:
      properties:
        display_name:
          type: string
        id:
          type: string
        org_id:
          type: string
        role:
          type: string
        status:
          type: string
        username:
          type: string
      type: object
    service.LoginResult:
      properties:
        tokens:
          $ref: '#/components/schemas/service.TokenPair'
        user:
          $ref: '#/components/schemas/service.AuthUser'
      type: object
    service.OrganizationResult:
      properties:
        contact_name:
          type: string
        contact_phone:
          type: string
        credit_warning_threshold:
          type: integer
        id:
          type: string
        name:
          type: string
        newapi_user_id:
          type: string
        remark:
          type: string
        status:
          type: string
      type: object
    service.TokenPair:
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
      type: object
  securitySchemes:
    BearerAuth:
      description: 登录后获得的 JWT access token，前缀 "Bearer "。
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  description: OpenClaw 多组织管理后台 API。
  title: OpenClaw Manager API
  version: "1.0"
openapi: 3.1.0
paths:
  /auth/login:
    post:
      description: 返回 access_token + refresh_token + 用户信息快照
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handlers.LoginRequest'
                description: 登录请求
                summary: body
        description: 登录请求
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/service.LoginResult'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
      summary: 登录
      tags:
      - auth
  /auth/logout:
    post:
      description: 撤销 refresh_token，使其不可再续期
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handlers.RefreshRequest'
                description: 包含 refresh_token 的请求体
                summary: body
        description: 包含 refresh_token 的请求体
        required: true
      responses:
        "204":
          description: No Content
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
      summary: 登出
      tags:
      - auth
  /auth/me:
    get:
      description: 返回当前 access token 对应的用户档案
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.AuthUser'
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
      security:
      - BearerAuth: []
      summary: 当前用户信息
      tags:
      - auth
  /auth/refresh:
    post:
      description: 使用 refresh_token 换取新的 access_token + refresh_token
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handlers.RefreshRequest'
                description: 刷新请求
                summary: body
        description: 刷新请求
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/service.LoginResult'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
      summary: 刷新令牌
      tags:
      - auth
  /organizations:
    get:
      description: 平台管理员获取所有组织；org_admin 只能看到自己所属组织
      parameters:
      - description: 每页条数（默认 50）
        in: query
        name: limit
        schema:
          type: integer
      - description: 分页偏移（默认 0）
        in: query
        name: offset
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  items:
                    $ref: '#/components/schemas/service.OrganizationResult'
                  type: array
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 组织列表
      tags:
      - organizations
    post:
      description: 平台管理员创建新组织，并同步在 new-api 侧完成账户 provisioning
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handlers.OrganizationRequest'
                description: 创建组织请求
                summary: body
        description: 创建组织请求
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.OrganizationResult'
                type: object
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 创建组织
      tags:
      - organizations
  /organizations/{orgId}:
    get:
      description: 按 orgId 获取单个组织信息
      parameters:
      - description: 组织 ID
        in: path
        name: orgId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.OrganizationResult'
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 组织详情
      tags:
      - organizations
    patch:
      description: 更新组织名称、联系人、备注等基础字段
      parameters:
      - description: 组织 ID
        in: path
        name: orgId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handlers.OrganizationRequest'
                description: 更新组织请求
                summary: body
        description: 更新组织请求
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.OrganizationResult'
                type: object
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 更新组织
      tags:
      - organizations
  /organizations/{orgId}/disable:
    post:
      description: 将组织状态设为 disabled，成员登录时将被拒绝
      parameters:
      - description: 组织 ID
        in: path
        name: orgId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.OrganizationResult'
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 禁用组织
      tags:
      - organizations
  /organizations/{orgId}/enable:
    post:
      description: 将组织状态从 disabled 恢复为 active
      parameters:
      - description: 组织 ID
        in: path
        name: orgId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.OrganizationResult'
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 启用组织
      tags:
      - organizations
servers:
- url: /api/v1
