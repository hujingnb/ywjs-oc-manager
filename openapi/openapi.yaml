        custom_skill_name:
          type: string
        id:
          type: string
        messages:
          items:
            $ref: '#/components/schemas/service.SkillTicketMessageResult'
          type: array
          uniqueItems: false
        org_id:
          type: string
        org_name:
          type: string
        quote_amount_cents:
          type: integer
        reject_reason:
          type: string
        requester_name:
          type: string
        requester_role:
          type: string
        requester_user_id:
          type: string
        status:
          type: string
        targets:
          items:
            $ref: '#/components/schemas/service.CustomSkillTargetResult'
          type: array
          uniqueItems: false
        title:
          type: string
        updated_at:
          type: string
      type: object
    service.SkillTicketMessageResult:
      properties:
        author_user_id:
          type: string
        content_type:
          type: string
        created_at:
          type: string
        file_name:
          type: string
        file_size:
          type: integer
        id:
          type: string
        kind:
          type: string
        text:
          type: string
      type: object
    service.SkillTicketResult:
      properties:
        created_at:
          type: string
        custom_skill_name:
          type: string
        id:
          type: string
        org_id:
          type: string
        quote_amount_cents:
          type: integer
        reject_reason:
          type: string
        requester_role:
          type: string
        requester_user_id:
          type: string
        status:
          type: string
        title:
          type: string
        updated_at:
          type: string
      type: object
    service.TokenPair:
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
      type: object
    service.WebPublishConfigResult:
      properties:
        base_domain:
          description: BaseDomain 是企业 web-publish 根域名（如 apps.example.com）。
          type: string
        cert_last_issued_at:
          description: CertLastIssuedAt 是最近一次首签成功时间；尚未首签时为 nil。
          type: string
        cert_last_renewed_at:
          description: CertLastRenewedAt 是最近一次续签成功时间；从未续签时为 nil。
          type: string
        cert_message:
          description: CertMessage 是证书签发失败时的错误摘要，正常时为空串。
          type: string
        cert_not_after:
          description: CertNotAfter 是证书到期时间；尚未签发时为 nil。
          type: string
        cert_status:
          description: CertStatus 是通配证书的当前状态（none/issuing/renewing/issued/failed）。
          type: string
        dns_provider:
          description: DNSProvider 是 DNS 服务商标识，如 alidns/tencentcloud。
          type: string
        enabled:
          description: Enabled 表示 web-publish 能力是否已由平台管理员开启。
          type: boolean
        max_sites:
          description: MaxSites 是企业下最大站点数配额。
          type: integer
        org_id:
          description: OrgID 是企业 ID。
          type: string
        provisioning_message:
          description: ProvisioningMessage 是开通失败时的错误摘要，正常时为空串。
          type: string
        provisioning_status:
          description: ProvisioningStatus 是当前开通流程状态（provisioning/ready/failed/disabled
            等）。
          type: string
        site_ttl_days:
          description: SiteTTLDays 是站点存活天数配额。
          type: integer
        wildcard_domain:
          description: WildcardDomain 是通配域名，值为 "*." + BaseDomain。
          type: string
      type: object
    service.WorkspaceEntryResult:
      properties:
        is_dir:
          type: boolean
        mod_time:
          description: |-
            ModTime 为文件创建时间。来源是 S3 对象的 LastModified——S3 无独立创建时间字段，
            而工作目录产物写入后基本不再变更，故以最后修改时间等同创建时间对外展示。
            目录由对象层级推断、无对应对象，保持零值，前端按 IsDir 不予展示。
          type: string
        name:
          type: string
        path:
          type: string
        size:
          type: integer
      type: object
    service.WorkspaceListing:
      properties:
        entries:
          items:
            $ref: '#/components/schemas/service.WorkspaceEntryResult'
          type: array
          uniqueItems: false
        path:
          type: string
      type: object
  securitySchemes:
    BearerAuth:
      description: 登录后获得的 JWT access token，前缀 "Bearer "。
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  description: 基于 Hermes Agent runtime 的多企业管理后台 API。
  title: Agent Runtime Manager API
  version: "1.0"
openapi: 3.1.0
paths:
  /admin/skill-tickets:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  items:
                    $ref: '#/components/schemas/service.SkillTicketResult'
                  type: array
                type: object
          description: OK
      security:
      - BearerAuth: []
      summary: 定制技能工单队列(平台管理员)
      tags:
      - skill-tickets
  /admin/skill-tickets/badge:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: integer
                type: object
          description: OK
      security:
      - BearerAuth: []
      summary: 待处理工单数角标
      tags:
      - skill-tickets
  /apps/{appId}:
    get:
      description: 按 appId 获取单个应用信息；org_member 只能查询自己的应用
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.AppResult'
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 应用详情
      tags:
      - apps
  /apps/{appId}/api-key/disable:
    post:
      description: 异步触发禁用应用关联的 new-api token，仅应用所属企业管理员可操作
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.RuntimeOperationResult'
                type: object
          description: Accepted
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 禁用应用 API Key
      tags:
      - runtime-operations
  /apps/{appId}/api-key/restore:
    post:
      description: 异步触发恢复应用关联的 new-api token，仅应用所属企业管理员可操作
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.RuntimeOperationResult'
                type: object
          description: Accepted
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 恢复应用 API Key
      tags:
      - runtime-operations
  /apps/{appId}/channels/{channelType}/auth:
    get:
      description: 轮询指定应用渠道的登录授权进度，返回当前状态
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      - description: 渠道类型（如 wechat）
        in: path
        name: channelType
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.ProgressResult'
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Service Unavailable
      security:
      - BearerAuth: []
      summary: 查询渠道登录进度
      tags:
      - channels
    post:
      description: 为指定应用和渠道类型发起登录授权流程，返回挑战信息（如二维码 URL）。feishu / work_wechat / dingtalk
        渠道需传请求体，其他渠道（如 wechat）无需请求体。
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      - description: 渠道类型（如 wechat、feishu）
        in: path
        name: channelType
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handlers.FeishuChannelAuthRequest'
                description: 飞书渠道发起请求体（仅 feishu 渠道）
                summary: body
        description: 飞书渠道发起请求体（仅 feishu 渠道）
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.ChallengeResult'
                type: object
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Service Unavailable
      security:
      - BearerAuth: []
      summary: 触发渠道登录挑战
      tags:
      - channels
  /apps/{appId}/channels/{channelType}/unbind:
    post:
      description: 解除指定应用与渠道类型的绑定关系
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      - description: 渠道类型（如 wechat）
        in: path
        name: channelType
        required: true
        schema:
          type: string
      responses:
        "204":
          description: 解绑成功，无响应体
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Service Unavailable
      security:
      - BearerAuth: []
      summary: 解绑渠道
      tags:
      - channels
  /apps/{appId}/hermes/conversations:
    get:
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      - description: 渠道来源过滤，如 weixin
        in: query
        name: source
        schema:
          type: string
      - description: 分页大小，0 使用 service 默认值
        in: query
        name: limit
        schema:
          type: integer
      - description: 分页偏移
        in: query
        name: offset
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  items:
                    $ref: '#/components/schemas/ocops.ConversationSession'
                  type: array
                type: object
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Service Unavailable
      security:
      - BearerAuth: []
      summary: 列出实例会话
      tags:
      - hermes-conversation
    post:
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handlers.CreateConversationRequest'
