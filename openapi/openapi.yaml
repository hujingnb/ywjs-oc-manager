components:
  schemas:
    handlers.AgentEnrollRequest:
      properties:
        agent_docker_endpoint:
          description: AgentDockerEndpoint 是 manager 访问该 agent Docker 代理的地址。
          type: string
        agent_file_endpoint:
          description: AgentFileEndpoint 是 manager 访问该 agent 文件代理的地址。
          type: string
        agent_id:
          description: AgentID 是 agent 自报的稳定外部 ID，用于幂等 enroll 与节点复用。
          type: string
        agent_tls_ca_cert:
          description: AgentTLSCACert 是 agent 代理 TLS CA 证书内容，可为空。
          type: string
        agent_version:
          description: AgentVersion 是 agent 当前版本，用于节点巡检与升级判断。
          type: string
        max_apps:
          description: MaxApps 是节点可承载应用数量上限；nil 表示不限。
          type: integer
        metadata:
          additionalProperties: {}
          description: Metadata 是 agent 附加元数据，原样保存为 JSON。
          type: object
        name:
          description: Name 是节点展示名，空值由 service 使用 AgentID 兜底。
          type: string
        node_data_root:
          description: NodeDataRoot 是 agent 侧应用数据根目录。
          type: string
        node_resource:
          $ref: '#/components/schemas/handlers.AgentNodeResourceRequest'
        resource_snapshot:
          additionalProperties: {}
          description: ResourceSnapshot 是 agent enroll 时上报的资源快照，原样保存为 JSON。
          type: object
        sampled_at:
          description: SampledAt 是资源采样时间；为空时 handler 使用当前 UTC 时间兼容旧 agent。
          type: string
      required:
      - agent_id
      type: object
    handlers.AgentHeartbeatRequest:
      properties:
        agent_token:
          description: AgentToken 是 enroll 后签发的节点令牌，用于认证心跳来源。
          type: string
        agent_version:
          description: AgentVersion 是心跳时的 agent 版本。
          type: string
        metadata:
          additionalProperties: {}
          description: Metadata 是心跳时的附加元数据，覆盖节点当前元数据。
          type: object
        node_resource:
          $ref: '#/components/schemas/handlers.AgentNodeResourceRequest'
        resource_snapshot:
          additionalProperties: {}
          description: ResourceSnapshot 是心跳时的资源快照，覆盖节点当前快照。
          type: object
        sampled_at:
          description: SampledAt 是资源采样时间；为空时 handler 使用当前 UTC 时间兼容旧 agent。
          type: string
      required:
      - agent_token
      type: object
    handlers.AgentNodeResourceRequest:
      description: NodeResource 是 agent 心跳时可选的节点资源采样。
      properties:
        cpu_percent:
          description: CPUPercent 是节点 CPU 使用百分比；nil 表示 agent 未采集该指标。
          type: number
        disk_total_bytes:
          description: DiskTotalBytes 是节点磁盘总字节数。
          type: integer
        disk_used_bytes:
          description: DiskUsedBytes 是节点磁盘已用字节数。
          type: integer
        instance_count:
          description: InstanceCount 是采样时节点承载的实例数量。
          type: integer
        last_error:
          description: LastError 是 agent 侧采样失败原因；空字符串表示本次采样未报告错误。
          type: string
        memory_total_bytes:
          description: MemoryTotalBytes 是节点内存总字节数。
          type: integer
        memory_used_bytes:
          description: MemoryUsedBytes 是节点内存已用字节数。
          type: integer
        network_rx_bytes:
          description: NetworkRxBytes 是节点网络累计接收字节数。
          type: integer
        network_tx_bytes:
          description: NetworkTxBytes 是节点网络累计发送字节数。
          type: integer
      type: object
    handlers.CreateMemberAppRequest:
      properties:
        app_name:
          description: AppName 是新实例名称，创建时必填。
          type: string
        app_prompt:
          description: AppPrompt 是新实例提示词，可为空。
          type: string
        channel_type:
          description: ChannelType 是初始化渠道绑定的渠道标识。
          type: string
        model_id:
          description: ModelID 是新实例使用的模型，必须属于组织 enabled_models。
          type: string
        persona_mode:
          description: PersonaMode 控制新实例是否继承组织人设或使用独立人设。
          type: string
        runtime_node_id:
          description: NodeID 是指定 runtime 节点；为空时 service 自动选择可用节点。
          type: string
      required:
      - app_name
      - model_id
      type: object
    handlers.CreateMemberRequest:
      properties:
        display_name:
          description: DisplayName 是前端显示名，创建与更新时都不能为空。
          type: string
        password:
          description: Password 是初始密码，service 层立即 hash 后写库。
          type: string
        role:
          description: Role 允许 org_admin / org_member；空值由 service 层补默认 org_member。
          type: string
        username:
          description: Username 是组织内登录账号名，创建后不可通过成员更新接口修改。
          type: string
      required:
      - display_name
      - password
      - username
      type: object
    handlers.CreateOrganizationRequest:
      properties:
        admin_display_name:
          description: AdminDisplayName 是首个 org_admin 的显示名。
          type: string
        admin_password:
          description: AdminPassword 是首个 org_admin 的初始密码，service 层立即 hash 后写库。
          type: string
        admin_username:
          description: AdminUsername 是随组织创建的首个 org_admin 账号名。
          type: string
        code:
          description: Code 是组织登录标识，创建后不可修改。
          type: string
        contact_name:
          description: ContactName 是业务联系人姓名，可为空。
          type: string
        contact_phone:
          description: ContactPhone 是业务联系人电话，可为空；不参与权限或登录校验。
          type: string
        credit_warning_threshold:
          description: CreditWarningThreshold 是组织余额预警阈值；nil 表示不启用余额预警或保持预警关闭。
          type: integer
        enabled_models:
          description: EnabledModels 是该组织允许在 manager 内选择的模型列表；new-api token 不使用该字段限权。
          items:
            type: string
          type: array
          uniqueItems: false
        name:
          description: Name 是组织展示名，也是平台管理员列表中识别租户的主字段。
          type: string
        remark:
          description: Remark 是平台管理员维护的内部备注。
          type: string
      required:
      - admin_display_name
      - admin_password
      - admin_username
      - code
      - name
      type: object
    handlers.ErrorResponse:
      properties:
        code:
          description: Code 是稳定的接口契约标识，一旦发布只增不改。
          example: APP_NOT_FOUND
          type: string
        message:
          description: Message 是面向前端展示的安全错误文案。
          example: 应用不存在
          type: string
      type: object
    handlers.InstanceResourceSamplesResponse:
      properties:
        samples:
          description: Samples 是按时间升序返回的实例资源采样或聚合桶。
          items:
            $ref: '#/components/schemas/service.InstanceResourceSampleResult'
          type: array
          uniqueItems: false
      type: object
    handlers.JobView:
      properties:
        attempts:
          type: integer
        created_at:
          type: string
        finished_at:
          type: string
        id:
          type: string
        last_error:
          type: string
        max_attempts:
          type: integer
        run_after:
          type: string
        status:
          type: string
        type:
          type: string
      type: object
    handlers.LoginRequest:
      properties:
        org_code:
          description: OrgCode 是组织用户登录时填写的组织标识；平台管理员登录时留空。
          type: string
        password:
          description: Password 是明文登录密码，仅用于本次校验，handler 不写日志。
          type: string
        username:
          description: Username 是 manager 账号名，登录失败时不区分账号不存在和密码错误。
          type: string
      required:
      - password
      - username
      type: object
    handlers.NodeInstancesResponse:
      properties:
        instances:
          description: Instances 是节点上承载的应用实例摘要。
          items:
            $ref: '#/components/schemas/service.NodeInstanceResult'
          type: array
          uniqueItems: false
      type: object
    handlers.NodeResourceSamplesResponse:
      properties:
        samples:
          description: Samples 是按时间升序返回的节点资源采样或聚合桶。
          items:
            $ref: '#/components/schemas/service.NodeResourceSampleResult'
          type: array
          uniqueItems: false
      type: object
    handlers.OnboardMemberRequest:
      properties:
        app_name:
          description: AppName 是随成员初始化的默认应用名称。
          type: string
        app_prompt:
          description: AppPrompt 是默认应用的初始提示词，可为空。
          type: string
        channel_type:
          description: ChannelType 是初始化渠道绑定的渠道标识。
          type: string
        display_name:
          description: DisplayName 是新成员展示名。
          type: string
        model_id:
          description: ModelID 是新实例使用的模型，必须属于组织 enabled_models。
          type: string
        password:
          description: Password 是新成员初始密码。
          type: string
        persona_mode:
          description: PersonaMode 控制新应用是否继承组织人设或使用独立人设。
          type: string
        role:
          description: Role 为空时默认为 org_member；不允许创建 platform_admin。
          type: string
        runtime_node_id:
          description: NodeID 是指定 runtime 节点；为空时 service 自动选择可用节点。
          type: string
        username:
          description: Username 是新成员账号名，与普通创建成员保持同一约束。
          type: string
      required:
      - app_name
      - display_name
      - model_id
      - password
      - username
      type: object
    handlers.OrganizationRequest:
      properties:
        contact_name:
          description: ContactName 是业务联系人姓名，可置空。
          type: string
        contact_phone:
          description: ContactPhone 是业务联系人电话，可置空。
          type: string
        credit_warning_threshold:
          description: CreditWarningThreshold 是组织余额预警阈值；nil 表示清空或未设置预警阈值。
          type: integer
        enabled_models:
          description: |-
            EnabledModels 是该组织允许在 manager 内选择的模型列表；new-api token 不使用该字段限权。
            nil 表示本次只更新基础资料并保留原模型列表；显式空数组会由 service 拒绝。
          items:
            type: string
          type: array
          uniqueItems: false
        name:
          description: Name 是组织展示名；更新时仍必填，避免空名称进入前端列表。
          type: string
        remark:
          description: Remark 是平台管理员维护的内部备注，可置空。
          type: string
      required:
      - name
      type: object
    handlers.PersonaRequest:
      properties:
        allow_member_override:
          description: AllowMemberOverride 表示成员应用是否允许覆盖组织默认人设。
          type: boolean
        conversation_rules:
          description: ConversationRules 是会话行为约束，可为空。
          type: string
        forbidden_rules:
          description: ForbiddenRules 是组织层禁止规则，可为空。
          type: string
        reply_style:
          description: ReplyStyle 是默认回复风格描述，可为空。
          type: string
        system_prompt:
          description: SystemPrompt 是组织默认系统提示词，不能为空。
          type: string
      required:
      - system_prompt
      type: object
    handlers.RechargeRequest:
      properties:
        credit_amount:
          description: CreditAmount 是充值额度，必须为正数，service 层会同步写入 new-api。
          type: integer
        remark:
          description: Remark 是本次充值的审计备注。
          type: string
      required:
      - credit_amount
      type: object
    handlers.RefreshRequest:
      properties:
        refresh_token:
          description: RefreshToken 是长生命周期刷新令牌，service 层只保存其 hash 并在刷新时轮换。
          type: string
      required:
      - refresh_token
      type: object
    handlers.ResetPasswordRequest:
      properties:
        password:
          description: Password 是新密码，service 层只保存 hash。
          type: string
      required:
      - password
      type: object
    handlers.RetryOrgSyncRequest:
      properties:
        node_id:
          description: NodeID 是需要重试同步的 runtime 节点 ID。
          type: string
      required:
      - node_id
      type: object
    handlers.UpdateAppModelRequest:
      properties:
        model_id:
          description: ModelID 是目标模型，必须属于实例所属组织的 enabled_models。
          type: string
      required:
      - model_id
      type: object
    handlers.UpdateMemberRequest:
      properties:
        display_name:
          description: DisplayName 是成员展示名，更新接口要求显式传入非空值。
          type: string
        role:
          description: Role 为空表示保持原角色；非空时需要管理员权限并限制在组织角色内。
          type: string
      required:
      - display_name
      type: object
    service.AgentEnrollResult:
      properties:
        agent_token:
          description: AgentToken 是新签发的 agent 明文 token，仅在 enroll 响应中返回一次。
          type: string
        heartbeat_interval_seconds:
          description: HeartbeatIntervalSeconds 是 agent 后续上报心跳的建议间隔。
          type: integer
        node_id:
          description: NodeID 是 manager 为该 agent 分配或复用的 runtime node ID。
          type: string
      type: object
    service.AppModelUpdateResult:
      properties:
        app:
          $ref: '#/components/schemas/service.AppResult'
        requires_restart:
          description: RequiresRestart 表示本次模型修改是否需要通过重启容器生效。
          type: boolean
        restart_job_id:
          description: RestartJobID 是已有容器实例提交的重启任务 ID；无容器时为空。
          type: string
      type: object
    service.AppResult:
      properties:
        api_key_status:
          type: string
        app_prompt:
          type: string
        container_id:
          type: string
        description:
          type: string
        id:
          type: string
        last_error_message:
          description: LastErrorMessage 上次进入 error 时的错误原始文本;供前端直接展示给用户。
          type: string
        last_error_status:
          description: LastErrorStatus 上次进入 error 时所在的状态值;前端用 formatAppStatus 转中文文案。
          type: string
        model_id:
          type: string
        name:
          type: string
        newapi_key_id:
          description: |-
            NewapiKeyID 是 new-api 中 token 的数值 id；schema 上是 text 列存的字符串，
            这里解析成 int64 方便 usage service 直接调 GetAPIKey。0 表示未绑定。
          type: integer
        org_id:
          type: string
        owner_user_id:
          type: string
        persona_mode:
          type: string
        progress_current:
          description: |-
            ProgressCurrent 当前 status 阶段的已完成量,单位由 status 决定(字节 / 秒);
            0 或缺省表示未知 / 不显示进度条。
          type: integer
        progress_total:
          description: ProgressTotal 当前 status 阶段的总量;0 或缺省时前端展示为不定进度。
          type: integer
        runtime_node_id:
          type: string
        status:
          type: string
      type: object
    service.AuditResult:
      properties:
        action:
          type: string
        actor_id:
          type: string
        actor_role:
          type: string
        created_at:
          format: date-time
          type: string
        error_message:
          type: string
        id:
          type: string
        ip_address:
          type: string
        metadata:
          additionalProperties: {}
          type: object
        org_id:
          type: string
        result:
          type: string
        target_id:
          type: string
        target_type:
          type: string
      type: object
    service.AuthUser:
      properties:
        display_name:
          type: string
        id:
          type: string
        org_id:
          type: string
        role:
          type: string
        status:
          type: string
        username:
          type: string
      type: object
    service.BalanceView:
      properties:
        newapi_user_id:
          type: integer
        remain_quota:
          type: integer
        used_quota:
          type: integer
      type: object
    service.BillingStatusView:
      properties:
        custom_currency_exchange_rate:
          description: CustomCurrencyExchangeRate 是自定义货币汇率。
          type: number
        custom_currency_symbol:
          description: CustomCurrencySymbol 是自定义货币符号。
          type: string
        display_in_currency:
          description: DisplayInCurrency 表示 new-api 是否按货币口径展示额度。
          type: boolean
        price:
          description: Price 是 new-api 配置的计价参数，manager 只透传给前端展示层。
          type: number
        quota_display_type:
          description: QuotaDisplayType 是 new-api 当前配置的额度显示类型，例如 USD。
          type: string
        quota_per_unit:
          description: QuotaPerUnit 是 new-api 展示额度与内部 quota 的换算比例。
          type: integer
        usd_exchange_rate:
          description: USDExchangeRate 是 new-api 配置的美元汇率。
          type: number
      type: object
    service.ChallengeResult:
      properties:
        challenge_type:
          description: ChallengeType 是登录挑战类型，例如 qrcode 或 code；异步 worker 未生成时为空。
          type: string
        channel_type:
          description: ChannelType 是渠道标识，例如 wechat。
          type: string
        code:
          description: Code 是非二维码登录场景的一次性验证码。
          type: string
        expires_at:
          description: ExpiresAt 是挑战过期时间；零值表示当前响应没有同步挑战。
          type: string
        hints:
          additionalProperties:
            type: string
          description: Hints 是 adapter 返回的展示提示，key/value 均为前端可直接展示的安全文本。
          type: object
        job_id:
          description: JobID 是异步 channel_start_login job ID，前端可据此追踪后台任务。
          type: string
        qrcode:
          description: QRCode 是二维码内容或 URL，具体格式由 channel adapter 决定。
          type: string
        status:
          description: Status 是渠道绑定状态，pending_auth 表示后台 job 正在发起登录挑战。
          type: string
      type: object
    service.CreateAppForMemberResult:
      properties:
        app:
          $ref: '#/components/schemas/service.AppResult'
        job_id:
          type: string
      type: object
    service.InstanceResourceSampleResult:
      description: CurrentResource 是该应用在节点上的最近一次实例资源采样。
      properties:
        container_status:
          description: ContainerStatus 是容器采样时状态；bucket 查询取桶内最新非空状态。
          type: string
        cpu_percent:
          description: CPUPercent 是实例 CPU 使用百分比；nil 表示该次采样缺失。
          type: number
        disk_read_bytes:
          description: DiskReadBytes 是实例磁盘读取累计字节数。
          type: integer
        disk_write_bytes:
          description: DiskWriteBytes 是实例磁盘写入累计字节数。
          type: integer
        last_error:
          description: LastError 是采样过程的最近错误，空字符串表示没有错误或无采样值。
          type: string
        memory_limit_bytes:
          description: MemoryLimitBytes 是实例内存限制字节数。
          type: integer
        memory_used_bytes:
          description: MemoryUsedBytes 是实例内存已用字节数。
          type: integer
        network_rx_bytes:
          description: NetworkRxBytes 是实例网络接收累计字节数。
          type: integer
        network_tx_bytes:
          description: NetworkTxBytes 是实例网络发送累计字节数。
          type: integer
        sampled_at:
          description: SampledAt 是采样或聚合桶时间，统一输出 UTC RFC3339。
          type: string
      type: object
    service.KnowledgeEntryResult:
      properties:
        is_dir:
          type: boolean
        name:
          type: string
        path:
          type: string
        size:
          type: integer
      type: object
    service.KnowledgeListResult:
      properties:
        entries:
          items:
            $ref: '#/components/schemas/service.KnowledgeEntryResult'
          type: array
          uniqueItems: false
        path:
          type: string
      type: object
    service.LoginResult:
      properties:
        tokens:
          $ref: '#/components/schemas/service.TokenPair'
        user:
          $ref: '#/components/schemas/service.AuthUser'
      type: object
    service.LogsPage:
      properties:
        scope:
          description: Scope 标识日志所属维度，当前为 app 或 member。
          type: string
        scope_id:
          description: ScopeID 是对应维度的 manager UUID，便于前端复核查询上下文。
          type: string
        total:
          description: Total 是 new-api 返回的分页总数。
          type: integer
        updated_at:
          description: UpdatedAt 是 manager 代理完成时刻，不代表 new-api 内部采集时间。
          type: string
      type: object
    service.MemberResult:
      properties:
        active_app_id:
          description: |-
            ActiveAppID 是该成员当前未软删实例的 UUID；nil 表示成员名下没有活跃实例。
            仅在 ListMembers 列表返回里有值，单条 GetMember 等接口保持 nil。
          type: string
        active_app_name:
          description: ActiveAppName 是该成员当前活跃实例的展示名；nil 与 ActiveAppID 同步。
          type: string
        display_name:
          description: DisplayName 是前端展示名。
          type: string
        id:
          description: ID 是成员用户 UUID。
          type: string
        org_id:
          description: OrgID 是成员所属组织 UUID；platform_admin 可能为空。
          type: string
        role:
          description: Role 是成员角色，限定为 org_admin 或 org_member。
          type: string
        status:
          description: Status 是成员状态；disabled 会阻止登录并设置 users.deleted_at。
          type: string
        username:
          description: Username 是登录账号名。
          type: string
      type: object
    service.ModelResult:
      properties:
        id:
          description: ID 是后续组织 allowlist 和实例模型字段使用的模型标识。
          type: string
        name:
          description: Name 是前端展示名称；new-api 缺省时与 ID 一致。
          type: string
      type: object
    service.NodeCurrentResourceResult:
      description: CurrentResource 是节点最近一次资源采样摘要；列表页用于展示当前资源状态。
      properties:
        cpu_percent:
          description: CPUPercent 是节点 CPU 使用百分比；nil 表示最近采样缺少该指标。
          type: number
        disk_total_bytes:
          description: DiskTotalBytes 是节点磁盘总字节数。
          type: integer
        disk_used_bytes:
          description: DiskUsedBytes 是节点磁盘已用字节数。
          type: integer
        instance_count:
          description: InstanceCount 是采样时节点承载的实例数量。
          type: integer
        last_error:
          description: LastError 是最近一次节点资源采样错误，空字符串表示无错误或未上报。
          type: string
        memory_total_bytes:
          description: MemoryTotalBytes 是节点内存总字节数。
          type: integer
        memory_used_bytes:
          description: MemoryUsedBytes 是节点内存已用字节数。
          type: integer
        sampled_at:
          description: SampledAt 是最近一次采样时间，统一输出 UTC RFC3339。
          type: string
      type: object
    service.NodeInstanceResult:
      properties:
        app_id:
          description: AppID 是实例所属应用 ID。
          type: string
        container_id:
          description: ContainerID 是 runtime 侧容器 ID；未创建容器时为空。
          type: string
        current_resource:
          $ref: '#/components/schemas/service.InstanceResourceSampleResult'
        name:
          description: Name 是应用名称。
          type: string
        org_id:
          description: OrgID 是应用所属组织 ID，用于后续前端跳转和权限上下文。
          type: string
        owner_user_id:
          description: OwnerUserID 是应用所有者用户 ID。
          type: string
        runtime_node_id:
          description: RuntimeNodeID 是实例所在 runtime 节点 ID。
          type: string
        status:
          description: Status 是应用生命周期状态。
          type: string
      type: object
    service.NodeResourceSampleResult:
      properties:
        cpu_percent:
          description: CPUPercent 是节点 CPU 使用百分比；nil 表示该次采样缺失。
          type: number
        disk_total_bytes:
          description: DiskTotalBytes 是节点磁盘总字节数。
          type: integer
        disk_used_bytes:
          description: DiskUsedBytes 是节点磁盘已用字节数。
          type: integer
        instance_count:
          description: InstanceCount 是采样时节点承载的实例数量。
          type: integer
        last_error:
          description: LastError 是采样过程的最近错误，空字符串表示没有错误或无采样值。
          type: string
        memory_total_bytes:
          description: MemoryTotalBytes 是节点内存总字节数。
          type: integer
        memory_used_bytes:
          description: MemoryUsedBytes 是节点内存已用字节数。
          type: integer
        network_rx_bytes:
          description: NetworkRxBytes 是节点网络接收累计字节数。
          type: integer
        network_tx_bytes:
          description: NetworkTxBytes 是节点网络发送累计字节数。
          type: integer
        sampled_at:
          description: SampledAt 是采样或聚合桶时间，统一输出 UTC RFC3339。
          type: string
      type: object
    service.OnboardMemberResult:
      properties:
        app:
          $ref: '#/components/schemas/service.AppResult'
        job_id:
          type: string
        member:
          $ref: '#/components/schemas/service.MemberResult'
      type: object
    service.OrganizationResult:
      properties:
        admin_username:
          description: AdminUsername 是组织首个可用管理员账号名，用于平台管理员复制登录信息。
          type: string
        code:
          description: Code 是组织登录标识，用于组织用户登录时定位租户。
          type: string
        contact_name:
          description: ContactName 是业务联系人姓名。
          type: string
        contact_phone:
          description: ContactPhone 是业务联系人电话。
          type: string
        credit_warning_threshold:
          description: CreditWarningThreshold 是组织余额预警阈值。
          type: integer
        enabled_models:
          description: EnabledModels 是组织在 manager 层允许创建实例时选择的模型列表。
          items:
            type: string
          type: array
          uniqueItems: false
        id:
          description: ID 是 manager 组织 UUID。
          type: string
        name:
          description: Name 是组织展示名。
          type: string
        newapi_user_id:
          description: NewAPIUserID 是组织在 new-api 侧的用户 ID，缺失时充值和用量接口不可用。
          type: string
        remark:
          description: Remark 是平台管理员维护的内部备注。
          type: string
        status:
          description: Status 是组织状态，active / disabled 决定成员是否可登录。
          type: string
      type: object
    service.PersonaResult:
      properties:
        allow_member_override:
          type: boolean
        conversation_rules:
          type: string
        forbidden_rules:
          type: string
        org_id:
          type: string
        reply_style:
          type: string
        system_prompt:
          type: string
        version:
          type: integer
      type: object
    service.PlatformOverview:
      properties:
        app_count:
          type: integer
        error_app_count:
          type: integer
        member_count:
          type: integer
        organization_count:
          type: integer
        running_app_count:
          type: integer
        total_remain_quota:
          type: integer
        usage_available:
          type: boolean
      type: object
    service.ProgressResult:
      properties:
        bound_identity:
          description: BoundIdentity 是渠道侧已绑定身份，如微信号或 OpenID 的展示值。
          type: string
        channel_name:
          description: ChannelName 是渠道侧账号或会话名称。
          type: string
        error_message:
          description: ErrorMessage 是最近一次绑定失败原因，已由 worker 写入安全错误文本。
          type: string
        metadata:
          additionalProperties:
            type: string
          description: Metadata 是绑定过程产生的附加展示信息，会经过 channelBindingMetadata 归一化。
          type: object
        status:
          description: Status 是当前渠道绑定状态，直接来自 channel_bindings.status。
          type: string
        updated_at:
          description: UpdatedAt 是绑定记录最近更新时间，用于前端判断轮询新鲜度。
          type: string
      type: object
    service.QuotaSeries:
      properties:
        scope:
          description: Scope 标识配额序列所属维度，当前为 organization 或 platform。
          type: string
        scope_id:
          description: ScopeID 是组织维度的 manager org UUID；平台维度为空。
          type: string
        updated_at:
          description: UpdatedAt 是 manager 代理完成时刻，不代表 new-api 内部采集时间。
          type: string
      type: object
    service.RechargeRecordResult:
      properties:
        created_at:
          type: string
        credit_amount:
          type: integer
        error_message:
          type: string
        id:
          type: string
        newapi_ref_id:
          type: string
        operator_id:
          type: string
        org_id:
          type: string
        remark:
          type: string
        status:
          type: string
      type: object
    service.RuntimeContainerInfo:
      properties:
        id:
          type: string
        image:
          type: string
        name:
          type: string
        status:
          type: string
      type: object
    service.RuntimeNodeResult:
      properties:
        agent_docker_endpoint:
          description: AgentDockerEndpoint 是 manager 访问该节点 Docker 代理的 HTTPS 地址。
          type: string
        agent_file_endpoint:
          description: AgentFileEndpoint 是 manager 访问该节点文件代理的 HTTPS 地址。
          type: string
        agent_id:
          description: AgentID 是 agent 自报的外部稳定 ID，用于幂等 enroll。
          type: string
        agent_version:
          description: AgentVersion 是最近一次 enroll 或 heartbeat 上报的 agent 版本。
          type: string
        current_resource:
          $ref: '#/components/schemas/service.NodeCurrentResourceResult'
        has_agent_token:
          description: HasAgentToken 表示节点是否已保存 agent token hash；不会返回 token 明文。
          type: boolean
        heartbeat_interval_seconds:
          description: HeartbeatIntervalSeconds 是 manager 告知 agent 的心跳间隔秒数。
          type: integer
        id:
          description: ID 是 manager 侧 runtime_nodes 主键。
          type: string
        last_probe_attempted_at:
          description: LastProbeAttemptedAt 是最近一次探测开始时间，空值表示尚未探测。
          type: string
        last_probe_error:
          description: LastProbeError 是最近一次探测失败原因，已由探测流程写入安全错误文本。
          type: string
        last_probe_failed_at:
          description: LastProbeFailedAt 是最近一次探测失败时间。
          type: string
        last_probe_ok_at:
          description: LastProbeOKAt 是最近一次探测成功时间。
          type: string
        max_apps:
          description: MaxApps 是节点可承载应用上限；nil 表示不限制。
          type: integer
        name:
          description: Name 是管理员后台展示的节点名称。
          type: string
        node_data_root:
          description: NodeDataRoot 是 agent 侧应用数据根目录。
          type: string
        probe_failure_streak:
          description: ProbeFailureStreak 是连续探测失败次数，用于前端展示节点健康风险。
          type: integer
        probe_success_streak:
          description: ProbeSuccessStreak 是连续探测成功次数，用于判断节点恢复稳定性。
          type: integer
        status:
          description: Status 是节点管理状态，active 才允许 agent 心跳继续更新。
          type: string
      type: object
    service.RuntimeOperation:
      description: Operation 是本次实际入队的操作枚举。
      enum:
      - start
      - stop
      - restart
      - delete
      - disable_api_key
      - restore_api_key
      type: string
      x-enum-varnames:
      - RuntimeOperationStart
      - RuntimeOperationStop
      - RuntimeOperationRestart
      - RuntimeOperationDelete
      - RuntimeOperationDisableAPIKey
      - RuntimeOperationRestoreAPIKey
    service.RuntimeOperationResult:
      properties:
        job_id:
          description: JobID 是写入 jobs 表后的异步任务 ID，前端用它查询执行进度。
          type: string
        operation:
          $ref: '#/components/schemas/service.RuntimeOperation'
      type: object
    service.RuntimeSnapshotView:
      properties:
        collected_at:
          type: string
        cpu_percent:
          type: number
        last_error:
          type: string
        memory_limit_bytes:
          type: integer
        memory_usage_bytes:
          type: integer
        network_rx_bytes:
          type: integer
        network_tx_bytes:
          type: integer
      type: object
    service.RuntimeView:
      properties:
        container:
          $ref: '#/components/schemas/service.RuntimeContainerInfo'
        snapshot:
          $ref: '#/components/schemas/service.RuntimeSnapshotView'
        status:
          type: string
      type: object
    service.SyncStatusResult:
      properties:
        last_error:
          type: string
        last_success_at:
          type: string
        node_id:
          type: string
        org_id:
          type: string
        status:
          type: string
        updated_at:
          type: string
      type: object
    service.TokenPair:
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
      type: object
    service.WorkspaceEntryResult:
      properties:
        is_dir:
          type: boolean
        name:
          type: string
        path:
          type: string
        size:
          type: integer
      type: object
    service.WorkspaceListing:
      properties:
        entries:
          items:
            $ref: '#/components/schemas/service.WorkspaceEntryResult'
          type: array
          uniqueItems: false
        path:
          type: string
      type: object
  securitySchemes:
    BearerAuth:
      description: 登录后获得的 JWT access token，前缀 "Bearer "。
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  description: 基于 Hermes Agent runtime 的多组织管理后台 API。
  title: Agent Runtime Manager API
  version: "1.0"
openapi: 3.1.0
paths:
  /agent/enroll:
    post:
      description: runtime agent 使用共享 enrollment secret 自动注册或刷新节点信息，并换取长效 agent token
      parameters:
      - description: Bearer enrollment_secret
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handlers.AgentEnrollRequest'
                description: 自动注册请求
                summary: body
        description: 自动注册请求
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/service.AgentEnrollResult'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      summary: Agent 自动注册
      tags:
      - agent
  /agent/heartbeat:
    post:
      description: runtime agent 定期上报心跳及资源快照；鉴权通过请求体中的 agent_token 字段完成
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handlers.AgentHeartbeatRequest'
                description: 心跳请求（含 agent_token）
                summary: body
        description: 心跳请求（含 agent_token）
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.RuntimeNodeResult'
                type: object
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      summary: Agent 心跳
      tags:
      - agent
  /apps/{appId}:
    get:
      description: 按 appId 获取单个应用信息；org_member 只能查询自己的应用
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.AppResult'
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 应用详情
      tags:
      - apps
  /apps/{appId}/api-key/disable:
    post:
      description: 异步触发禁用应用关联的 new-api token，仅应用所属组织管理员可操作
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.RuntimeOperationResult'
                type: object
          description: Accepted
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 禁用应用 API Key
      tags:
      - runtime-operations
  /apps/{appId}/api-key/restore:
    post:
      description: 异步触发恢复应用关联的 new-api token，仅应用所属组织管理员可操作
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.RuntimeOperationResult'
                type: object
          description: Accepted
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 恢复应用 API Key
      tags:
      - runtime-operations
  /apps/{appId}/channels/{channelType}/auth:
    get:
      description: 轮询指定应用渠道的登录授权进度，返回当前状态
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      - description: 渠道类型（如 wechat）
        in: path
        name: channelType
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.ProgressResult'
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Service Unavailable
      security:
      - BearerAuth: []
      summary: 查询渠道登录进度
      tags:
      - channels
    post:
      description: 为指定应用和渠道类型发起登录授权流程，返回挑战信息（如二维码 URL）
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      - description: 渠道类型（如 wechat）
        in: path
        name: channelType
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.ChallengeResult'
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Service Unavailable
      security:
      - BearerAuth: []
      summary: 触发渠道登录挑战
      tags:
      - channels
  /apps/{appId}/channels/{channelType}/unbind:
    post:
      description: 解除指定应用与渠道类型的绑定关系
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      - description: 渠道类型（如 wechat）
        in: path
        name: channelType
        required: true
        schema:
          type: string
      responses:
        "204":
          description: 解绑成功，无响应体
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Service Unavailable
      security:
      - BearerAuth: []
      summary: 解绑渠道
      tags:
      - channels
  /apps/{appId}/initialize:
    post:
      description: 触发应用初始化重试；仅当应用状态为 error 或 draft 时允许，其它状态返回 409
      parameters:
      - description: 应用 ID
        in: path
        name: appId
        required: true
        schema:
          type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/service.RuntimeOperationResult'
                type: object
          description: Accepted
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ErrorResponse'
          description: Not Found
        "409":
          content:
