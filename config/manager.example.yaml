# manager-api 进程及关联 binary（cmd/server / cmd/migrate / cmd/seed-admin）
# 共用的配置文件。整个文件被 .gitignore 屏蔽，禁止把真实值提交到仓库。
# 部署时由运维基于 manager.example.yaml 复制并改写真实值。

app:
  # 运行环境标签，仅用于日志 / metrics / 报错上下文识别；不参与逻辑分支。
  # 取值约定：dev / staging / prod。
  env: dev

  # HTTP server 监听地址。必须显式配置；为空启动时 fail-fast。
  # 形如 ":8080"（监听全部网卡）或 "127.0.0.1:8080"（仅本机）。
  http_addr: ":8080"

  # 对外可访问的 base URL，用于：
  #   1. CORS 白名单（当前只把它作为唯一允许 origin）；
  #   2. 业务回调 / 邮件通知里拼绝对链接。
  # 留空时不开启 CORS。本地开发常填 "http://localhost:8080"。
  public_base_url: "http://localhost:8080"

  # manager 进程持久化业务数据的根目录（应用工作目录归档等）。
  # 必须显式配置；为空启动时 fail-fast。
  # 容器部署一般指向 docker volume 挂载点，本地开发指向项目相对路径。
  data_root: "./data/manager"

  # 知识库主副本根目录（manager 端"主拷贝"，由 worker 同步到各 runtime node）。
  # 此前由 OCM_KNOWLEDGE_ROOT 环境变量提供，统一收口到 yaml。
  # 必须显式配置；为空启动时 fail-fast。
  # 路径下结构：orgs/<org_id>/...、apps/<app_id>/...，由 files.SafeRoot 沙箱化。
  knowledge_root: "/var/lib/oc-manager/knowledge"

database:
  # 业务 PostgreSQL 连接 DSN，形如
  #   postgres://<user>:<pwd>@<host>:<port>/<db>?sslmode=disable
  # 含明文密码，必须落到 gitignored 的 manager.yaml；example 文件保持脱敏占位。
  # 必填；为空启动 fail-fast。
  url: "postgres://ocm:CHANGE_ME@manager-postgres:5432/ocm?sslmode=disable"

redis:
  # Redis 连接地址，形如 "host:port"。必填；为空启动 fail-fast。
  addr: "manager-redis:6379"

  # Redis 鉴权密码；未启用 ACL/密码时填空串。
  password: "CHANGE_ME"

  # 选用的 Redis DB 编号；标准 Redis 部署 0..15。
  db: 0

  # manager 写入 Redis 的所有 key 统一前缀，避免和共享 Redis 的 new-api 等服务键空间冲突。
  # 推荐 "ocm:" 这类带分隔符的形式。
  key_prefix: "ocm:"

auth:
  # 登录 / refresh cookie 的 Domain 属性；本地开发填 "localhost"，
  # 生产填可被前端访问的域名（如 "manager.example.com"）。
  cookie_domain: "localhost"

  # access token 有效期，Go time.Duration 字符串（"15m"、"1h"、"30s"）。
  # 必填且必须 > 0;为空或非法字符串启动 fail-fast。
  access_token_ttl: "15m"

  # refresh token 有效期；约定值 "720h"（30 天）。
  # 必填且必须 > 0;为空或非法字符串启动 fail-fast。
  refresh_token_ttl: "720h"

  # JWT access token 签名密钥；任意高熵字符串，长度建议 ≥ 32 字节。
  # 必填；为空启动 fail-fast。泄漏后必须立刻轮换。
  jwt_access_secret: "CHANGE_ME_ACCESS_SECRET"

  # JWT refresh token 签名密钥；与 access secret 不能复用同一个值。
  # 必填；为空启动 fail-fast。
  jwt_refresh_secret: "CHANGE_ME_REFRESH_SECRET"

  # CSRF double-submit cookie HMAC 密钥；任意高熵字符串。
  # 必填；为空启动 fail-fast。
  csrf_secret: "CHANGE_ME_CSRF_SECRET"

security:
  # 敏感字段加解密根密钥；用于 agent token、third-party API key 等列加密。
  # 必须是 base64 编码的 32 字节随机数，对应 AES-256-GCM key 长度。
  # 生成示例：openssl rand -base64 32
  # 必填；为空或解码后非 32 字节启动 fail-fast。轮换需配合密钥版本迁移流程。
  master_key: "CHANGE_ME_BASE64_32_BYTES"

newapi:
  # new-api 网关 base URL，含 scheme，不含尾斜杠。
  # 留空表示本部署不接入 new-api：cmd/server 不会创建 newapi client，
  # CreateAPIKey / 充值 / 用量统计相关接口会报错或降级，仅适合纯本地调试。
  base_url: "http://new-api:3000"

  # new-api「个人设置 → 安全设置 → 系统访问令牌」生成的 access_token。
  # 注意：不是「令牌」页的 sk- 形式 API token（那个只能调模型推理）。
  # base_url 非空时必填；缺失会让 admin API 401。
  admin_token: "CHANGE_ME_NEWAPI_ADMIN_TOKEN"

  # 可选：new-api「令牌」页创建的 sk- 形式 API token。
  # 仅在 /api/models 管理接口不可用时，用于降级查询 OpenAI 兼容 /v1/models。
  # 留空时不会尝试 /v1/models，避免把 admin_token 当成推理 token 使用。
  model_relay_token: ""

  # admin_token 持有者用户 ID，对应 new-api 的 New-Api-User header 校验。
  # 默认账号 admin/admin123! 的 id=1。base_url 非空时必填；类型为整数。
  admin_user_id: 1

hermes:
  # Hermes 容器的镜像引用（name:tag 或 digest）。runtime node 上必须存在该镜像；
  # imagesync 会用 docker save / load 把宿主镜像分发到节点。
  runtime_image: "hermes-runtime:dev"

  # Hermes 容器平台级系统人设模板（SOUL.md PlatformPrompt 层）。
  # 模板内可写任意中文 / 英文 prompt。
  system_prompt_template: |
    你是 Hermes 智能助手。

  workspace:
    # agent 端归档目录保留天数；0 表示不清理（仅本地调试场景使用）。
    # 取值整数，单位天。
    archive_retention_days: 14

  llm:
    # Hermes 容器从 docker network 看到的 new-api OpenAI 兼容 endpoint，
    # 必须含 /v1 后缀；写入容器内 config.yaml base_url 与 .env OPENAI_BASE_URL。
    base_url: "http://new-api:3000/v1"

    # 默认 provider 名称，写入容器内 config.yaml model.provider。
    # 常用 "openai"（兼容 new-api OpenAI 兼容协议）。
    default_provider: "openai"

    # 默认模型名，必须是 new-api 渠道里实际可路由的名字
    # （如 ollama 部署的 "qwen2.5:0.5b"）。
    default_model: "qwen2.5:0.5b"

    # 注入容器 OPENAI_API_KEY 的完整 sk- 由 manager 替每个应用通过 new-api
    # `POST /api/token/:id/key` 自动拉取并加密落 apps.newapi_key_ciphertext，
    # 不再需要在配置里手填全局 sk-。

  # Hermes 容器要连接的 docker network 列表；必须包含 new-api 所在 network，
  # 否则容器无法解析 "new-api" hostname → chat completions Connection error。
  # docker compose project 默认派生 "<project>_default"，本仓库 project 名 oc-manager。
  container_networks:
    - "oc-manager_default"

agent:
  # runtime-agent 注册成功后回写并按此频率上报心跳；
  # manager 用 90s 阈值判定节点离线（NodeHealthReconciler）。
  heartbeat_interval_seconds: 30

runtime:
  # runtime-agent 自动注册共享密钥；manager 与所有 agent 必须一致。
  # 必须是 base64 编码的 32 字节随机数，生成示例：openssl rand -base64 32
  enrollment_secret: "CHANGE_ME_BASE64_32_BYTES"

  probe:
    # manager 主动探测 runtime-agent docker/file 两个 TLS 端口的间隔。
    interval_seconds: 60
    # 单次 HTTP 探测超时秒数。
    timeout_seconds: 3
    # active 节点连续失败达到该次数后进入 degraded。
    failure_threshold: 3
    # degraded 节点连续成功达到该次数后恢复 active。
    recovery_threshold: 2
